<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shibuya Crossings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 0.15em;
        }
        .links {
            margin-top: 3rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            transition: all 0.3s;
        }
        .links a:hover {
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shibuya Crossings</h1>
        <p class="tagline">Coming soon</p>
        <div class="links">
            <!-- Update these with actual links -->
            <a href="#">Listen</a>
            <a href="#">Contact</a>
        </div>
    </div>
</body>
</html>
