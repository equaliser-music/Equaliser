# VPS override - remap port so host nginx owns 80/443
# Copy to content_node/ on the VPS alongside docker-compose.yml
# Docker Compose automatically merges this with docker-compose.yml
services:
  web:
    ports: !override
      - "127.0.0.1:8080:80"
  equaliser-relay:
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-equaliser}:${POSTGRES_PASSWORD:-equaliser}@postgres:5432/${POSTGRES_DB:-equaliser}
      - WS_PORT=8080
      - RELAY_NAME=Equaliser Content Node Relay
      - RELAY_DESCRIPTION=A NOSTR relay for the Equaliser music platform content node
      - REST_API_PORT=8008
      - EVENT_POLICY=equaliser_only
      - PEER_RELAYS=wss://test2.equaliser.app/relay
      - STANDARD_RELAYS=wss://relay1.equaliser.app,wss://relay2.equaliser.app
      - SYNC_INTERVAL=3600
  orchestrator:
    environment:
      - IPFS_API_URL=http://ipfs:5001
      - NOSTR_RELAY_URL=ws://equaliser-relay:8080
      - RELAY_API_URL=http://equaliser-relay:8008
      - BLOSSOM_URL=http://blossom:3000
      - PUBLIC_BASE_URL=https://test1.equaliser.app
      - STANDARD_RELAYS=wss://relay1.equaliser.app,wss://relay2.equaliser.app
      - ALLOWED_ORIGINS=https://test1.equaliser.app
      - DATABASE_PATH=/data/drafts.db
  nostr-rs-relay:
    ports: !override
      - "127.0.0.1:7700:8080"
