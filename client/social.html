<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social - Equaliser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; overflow-y: auto; display: flex; justify-content: center; }
        .social-column { width: 100%; max-width: 800px; padding: 0; }

        /* ===== Page Header & Top Tabs ===== */
        .social-page-header {
            padding: 24px 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .social-page-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .social-top-tabs { display: flex; gap: 0; padding: 0; }
        .social-top-tab {
            flex: 1; padding: 12px 0; background: none; border: none; border-bottom: 2px solid transparent;
            color: rgba(255, 255, 255, 0.35); font-size: 15px; font-weight: 600;
            cursor: pointer; transition: color 0.2s; text-align: center;
        }
        .social-top-tab:hover { color: rgba(255, 255, 255, 0.7); }
        .social-top-tab.active { color: #a855f7; border-bottom-color: #a855f7; }

        /* ===== Feed Section ===== */
        .feed-section { display: block; }
        .feed-section.hidden { display: none; }

        .feed-sub-tabs { display: flex; gap: 0; overflow-x: auto; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-top: 12px; }
        .feed-sub-tab {
            padding: 12px 16px; background: none; border: none;
            border-bottom: 2px solid transparent; color: rgba(255, 255, 255, 0.4);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .feed-sub-tab:hover { color: rgba(255, 255, 255, 0.7); }
        .feed-sub-tab.active { color: #ffffff; }

        /* Composer */
        .composer { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .composer-inner { display: flex; gap: 12px; }
        .composer-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 600; flex-shrink: 0; overflow: hidden;
        }
        .composer-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .composer-body { flex: 1; min-width: 0; }
        .composer textarea {
            width: 100%; min-height: 80px; padding: 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; color: #ffffff; font-size: 15px; font-family: inherit;
            line-height: 1.5; resize: vertical; outline: none; transition: border-color 0.2s;
        }
        .composer textarea::placeholder { color: rgba(255, 255, 255, 0.3); }
        .composer textarea:focus { border-color: rgba(168, 85, 247, 0.4); }
        .composer-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .char-count { font-size: 12px; color: rgba(255, 255, 255, 0.3); }
        .char-count.warn { color: #fbbf24; }
        .char-count.over { color: #ef4444; }
        .post-btn {
            padding: 8px 24px; background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none; border-radius: 20px; color: #ffffff; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .post-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4); }
        .post-btn:disabled { opacity: 0.4; cursor: default; }
        .composer-login {
            padding: 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5); font-size: 14px;
        }
        .composer-login a { color: #a855f7; text-decoration: none; font-weight: 600; }
        .composer-login a:hover { text-decoration: underline; }
        .post-success { color: #22c55e; font-size: 13px; opacity: 0; transition: opacity 0.3s; }
        .post-success.show { opacity: 1; }

        /* Feed List */
        .feed-list { padding: 0; }
        .feed-post { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: background 0.2s; }
        .feed-post:hover { background: rgba(255, 255, 255, 0.02); }
        .feed-post-inner { display: flex; gap: 12px; }
        .feed-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 600; flex-shrink: 0; overflow: hidden;
        }
        .feed-avatar a { display: contents; }
        .feed-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .feed-post-body { flex: 1; min-width: 0; }
        .feed-post-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
        .feed-display-name { font-size: 15px; font-weight: 700; }
        .feed-display-name a { color: inherit; text-decoration: none; }
        .feed-display-name a:hover { color: #a855f7; }
        .feed-handle { font-size: 13px; color: rgba(255, 255, 255, 0.4); }
        .feed-time { font-size: 13px; color: rgba(255, 255, 255, 0.4); margin-left: auto; }
        .feed-content { font-size: 15px; line-height: 1.6; color: rgba(255, 255, 255, 0.9); margin-bottom: 12px; word-wrap: break-word; overflow-wrap: break-word; }
        .feed-content a { color: #60a5fa; text-decoration: none; }
        .feed-content a:hover { text-decoration: underline; }
        .feed-playlist-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            font-weight: 500;
            color: #c084fc;
        }
        .feed-playlist-card:hover { background: rgba(139, 92, 246, 0.15); }
        .feed-actions { display: flex; align-items: center; gap: 24px; margin-left: -6px; }
        .feed-action {
            display: flex; align-items: center; gap: 6px; font-size: 13px;
            color: rgba(255, 255, 255, 0.4); cursor: pointer; padding: 6px;
            border-radius: 20px; transition: all 0.2s;
        }
        .feed-action:hover { color: rgba(255, 255, 255, 0.7); background: rgba(255, 255, 255, 0.05); }
        .feed-action svg { width: 18px; height: 18px; }
        .feed-action.like-btn.liked { color: #ef4444; }
        .feed-action.like-btn.liked svg { color: #ef4444; }
        .feed-action.repost-btn.reposted { color: #22c55e; }
        .feed-action.repost-btn.reposted svg { color: #22c55e; }
        .feed-action.reply-btn:hover { color: #60a5fa; }
        .feed-post-clickable { cursor: pointer; }

        /* ===== Community Section ===== */
        .community-section { display: none; }
        .community-section.visible { display: block; }

        .board-tabs { display: flex; gap: 0; overflow-x: auto; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .board-tab {
            padding: 12px 16px; background: none; border: none;
            border-bottom: 2px solid transparent; color: rgba(255, 255, 255, 0.4);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .board-tab:hover { color: rgba(255, 255, 255, 0.7); }
        .board-tab.active { color: #ffffff; }

        .community-toolbar {
            display: flex; align-items: center; justify-content: flex-end;
            padding: 12px 20px 0;
        }
        .new-thread-btn {
            padding: 8px 20px; background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none; border-radius: 20px; color: #ffffff; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .new-thread-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4); }

        /* Thread List */
        .thread-list { padding: 0; }
        .thread-item {
            padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer; transition: background 0.2s;
        }
        .thread-item:hover { background: rgba(255, 255, 255, 0.02); }
        .thread-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .thread-subject { font-size: 16px; font-weight: 700; flex: 1; }
        .board-badge {
            padding: 2px 10px; border-radius: 12px; font-size: 11px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
        }
        .board-badge.general { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
        .board-badge.music { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .board-badge.production { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .board-badge.gigs { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        .thread-meta {
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; color: rgba(255, 255, 255, 0.4);
        }
        .thread-author { display: flex; align-items: center; gap: 6px; }
        .thread-author-avatar {
            width: 20px; height: 20px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 600; overflow: hidden;
        }
        .thread-author-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .thread-preview {
            font-size: 14px; color: rgba(255, 255, 255, 0.5); margin-top: 6px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 600px;
        }

        /* New Thread Form */
        .new-thread-form { padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: none; }
        .new-thread-form.visible { display: block; }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; font-size: 13px; font-weight: 600; color: rgba(255, 255, 255, 0.6); margin-bottom: 6px; }
        .form-row select, .form-row input, .form-row textarea {
            width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px;
            color: #ffffff; font-size: 14px; font-family: inherit; outline: none;
            transition: border-color 0.2s;
        }
        .form-row select:focus, .form-row input:focus, .form-row textarea:focus { border-color: rgba(168, 85, 247, 0.4); }
        .form-row textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
        .form-row select { appearance: none; cursor: pointer; }
        .form-row select option { background: #1a1a2e; color: #ffffff; }
        .form-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .form-cancel {
            padding: 8px 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; color: rgba(255, 255, 255, 0.7); font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .form-cancel:hover { background: rgba(255, 255, 255, 0.1); }
        .form-submit {
            padding: 8px 24px; background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none; border-radius: 20px; color: #ffffff; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .form-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4); }
        .form-submit:disabled { opacity: 0.4; cursor: default; }

        /* Thread Detail View */
        .thread-detail { display: none; }
        .thread-detail.visible { display: block; }
        .thread-detail-back { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .thread-detail-back a {
            color: rgba(255, 255, 255, 0.6); text-decoration: none; font-size: 14px;
            display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s;
        }
        .thread-detail-back a:hover { color: #a855f7; }
        .thread-detail-back svg { width: 16px; height: 16px; }
        .thread-op { padding: 24px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .thread-op-subject { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .thread-op-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .thread-op-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 600; overflow: hidden; flex-shrink: 0;
        }
        .thread-op-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .thread-op-author-name { font-weight: 700; font-size: 15px; }
        .thread-op-author-name a { color: inherit; text-decoration: none; }
        .thread-op-author-name a:hover { color: #a855f7; }
        .thread-op-time { font-size: 13px; color: rgba(255, 255, 255, 0.4); }
        .thread-op-content { font-size: 15px; line-height: 1.7; color: rgba(255, 255, 255, 0.9); word-wrap: break-word; }
        .thread-op-content a { color: #60a5fa; text-decoration: none; }
        .thread-op-content a:hover { text-decoration: underline; }

        .thread-reply-composer { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .thread-reply-composer textarea {
            width: 100%; min-height: 60px; padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; color: #ffffff; font-size: 14px; font-family: inherit;
            line-height: 1.5; resize: vertical; outline: none; transition: border-color 0.2s;
        }
        .thread-reply-composer textarea::placeholder { color: rgba(255, 255, 255, 0.3); }
        .thread-reply-composer textarea:focus { border-color: rgba(168, 85, 247, 0.4); }
        .thread-reply-composer-footer { display: flex; justify-content: flex-end; margin-top: 8px; }

        .thread-replies-header {
            padding: 16px 20px 12px; font-size: 15px; font-weight: 700;
            color: rgba(255, 255, 255, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .thread-reply-item { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .thread-reply-inner { display: flex; gap: 12px; }
        .thread-reply-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; overflow: hidden; flex-shrink: 0;
        }
        .thread-reply-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .thread-reply-body { flex: 1; min-width: 0; }
        .thread-reply-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
        .thread-reply-name { font-size: 14px; font-weight: 700; }
        .thread-reply-name a { color: inherit; text-decoration: none; }
        .thread-reply-name a:hover { color: #a855f7; }
        .thread-reply-time { font-size: 12px; color: rgba(255, 255, 255, 0.4); margin-left: auto; }
        .thread-reply-content { font-size: 14px; line-height: 1.5; color: rgba(255, 255, 255, 0.85); word-wrap: break-word; }
        .thread-reply-content a { color: #60a5fa; text-decoration: none; }

        .reply-login { padding: 16px 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.5); font-size: 14px; }
        .reply-login a { color: #a855f7; text-decoration: none; font-weight: 600; }
        .thread-replies-empty { padding: 40px 20px; text-align: center; color: rgba(255, 255, 255, 0.3); font-size: 14px; }

        /* ===== Shared ===== */
        .loading-area { text-align: center; padding: 60px 20px; color: rgba(255, 255, 255, 0.5); font-size: 14px; }
        .loading-spinner {
            display: inline-block; width: 32px; height: 32px;
            border: 3px solid rgba(139, 92, 246, 0.3); border-top-color: #a855f7;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-area { text-align: center; padding: 60px 20px; color: rgba(255, 255, 255, 0.4); }
        .empty-area svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.5; }
        .empty-area p { font-size: 15px; margin-bottom: 6px; }
        .empty-area .sub { font-size: 13px; color: rgba(255, 255, 255, 0.3); }
        .empty-area a { color: #a855f7; text-decoration: none; }
        .empty-area a:hover { text-decoration: underline; }

        @media (max-width: 768px) { .social-column { max-width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="social-column">
                <!-- Page Header + Top Tabs -->
                <div class="social-page-header">
                    <h1 class="social-page-title">Social</h1>
                    <div class="social-top-tabs">
                        <button class="social-top-tab active" data-tab="feed" onclick="switchTopTab('feed')">Timeline</button>
                        <button class="social-top-tab" data-tab="community" onclick="switchTopTab('community')">Community Threads</button>
                    </div>
                </div>

                <!-- ===== FEED TAB ===== -->
                <div class="feed-section" id="feed-section">
                    <!-- Feed sub-tabs -->
                    <div class="feed-sub-tabs" id="feed-sub-tabs"></div>

                    <!-- Composer (logged in) -->
                    <div class="composer" id="composer" style="display: none;">
                        <div class="composer-inner">
                            <div class="composer-avatar" id="composer-avatar">
                                <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                            <div class="composer-body">
                                <textarea id="compose-text" placeholder="What's on your mind?" maxlength="1000"></textarea>
                                <div class="composer-image-preview" id="composer-image-preview" style="display:none;"></div>
                                <div class="composer-upload-status" id="composer-upload-status"></div>
                                <div class="composer-footer">
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        <div class="composer-actions">
                                            <button class="composer-attach-btn" id="composer-attach-btn" title="Attach image" type="button">
                                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                                    <rect x="2" y="2" width="16" height="16" rx="3"/>
                                                    <circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/>
                                                    <path d="M2 14l4-4 3 3 4-5 5 6"/>
                                                </svg>
                                            </button>
                                            <input type="file" id="composer-image-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">
                                        </div>
                                        <span class="char-count" id="char-count">0 / 1000</span>
                                        <span class="post-success" id="post-success">Posted!</span>
                                    </div>
                                    <button class="post-btn" id="post-btn" disabled>Post</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Composer (guest) -->
                    <div class="composer-login" id="composer-guest" style="display: none;">
                        <a href="/login.html?return=/social.html">Log in</a> to post notes and interact with the community
                    </div>

                    <!-- Feed List -->
                    <div class="feed-list" id="feed-list">
                        <div class="loading-area">
                            <div class="loading-spinner"></div>
                            <div>Loading feed...</div>
                        </div>
                    </div>
                </div>

                <!-- ===== COMMUNITY TAB ===== -->
                <div class="community-section" id="community-section">
                    <!-- Community List View -->
                    <div id="community-list-view">
                        <div class="board-tabs" id="board-tabs">
                            <button class="board-tab active" data-board="all" onclick="switchBoard('all')">All</button>
                            <button class="board-tab" data-board="general" onclick="switchBoard('general')">General</button>
                            <button class="board-tab" data-board="music" onclick="switchBoard('music')">Music</button>
                            <button class="board-tab" data-board="production" onclick="switchBoard('production')">Production</button>
                            <button class="board-tab" data-board="gigs" onclick="switchBoard('gigs')">Gigs</button>
                        </div>

                        <div class="community-toolbar" id="community-toolbar" style="display:none;">
                            <button class="new-thread-btn" onclick="toggleNewThreadForm()">New Thread</button>
                        </div>

                        <div class="new-thread-form" id="new-thread-form">
                            <div class="form-row">
                                <label>Board</label>
                                <select id="thread-board">
                                    <option value="general">General</option>
                                    <option value="music">Music</option>
                                    <option value="production">Production</option>
                                    <option value="gigs">Gigs</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <label>Subject</label>
                                <input type="text" id="thread-subject" placeholder="Thread subject..." maxlength="200">
                            </div>
                            <div class="form-row">
                                <label>Content</label>
                                <textarea id="thread-content" placeholder="Write your post..." maxlength="5000"></textarea>
                            </div>
                            <div class="form-actions">
                                <button class="form-cancel" onclick="toggleNewThreadForm()">Cancel</button>
                                <button class="form-submit" id="submit-thread-btn" onclick="submitThread()" disabled>Post Thread</button>
                            </div>
                        </div>

                        <div id="thread-list">
                            <div class="loading-area">
                                <div class="loading-spinner"></div>
                                <div>Loading threads...</div>
                            </div>
                        </div>
                    </div>

                    <!-- Thread Detail View -->
                    <div id="community-detail-view" class="thread-detail">
                        <div class="thread-detail-back">
                            <a href="#" onclick="showCommunityListView(); return false;">
                                <svg viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
                                </svg>
                                Back to threads
                            </a>
                        </div>
                        <div id="thread-detail-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/nostr-tools@2.1.4/lib/nostr.bundle.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/nostr-social.js"></script>

    <script>
        // ===== Shared State =====
        let activeTopTab = 'feed';
        const escapeHtml = NostrSocial.escapeHtml;

        // ===== Top Tab Switching =====

        function switchTopTab(tab) {
            if (tab === activeTopTab) return;
            activeTopTab = tab;

            document.querySelectorAll('.social-top-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            const feedSection = document.getElementById('feed-section');
            const communitySection = document.getElementById('community-section');

            if (tab === 'feed') {
                feedSection.classList.remove('hidden');
                communitySection.classList.remove('visible');
            } else {
                feedSection.classList.add('hidden');
                communitySection.classList.add('visible');
                // Load community threads if not already loaded
                if (!communityLoaded) {
                    loadThreads();
                    communityLoaded = true;
                }
            }

            // Update URL
            const url = new URL(window.location);
            if (tab === 'feed') {
                url.searchParams.delete('tab');
                url.searchParams.delete('board');
                url.searchParams.delete('thread');
            } else {
                url.searchParams.set('tab', 'community');
            }
            history.replaceState({}, '', url);
        }

        // ================================================
        // FEED FUNCTIONALITY
        // ================================================

        let feedNotes = [];
        let feedReactionData = { likes: {}, reposts: {}, userLiked: new Set(), userReposted: new Set() };
        let currentFeedTab = 'equaliser';
        let feedProfiles = new Map();
        let isPosting = false;
        let attachedImageUrl = null;

        // ===== Composer =====

        function initComposer() {
            const session = SessionManager.getSession();
            if (session) {
                document.getElementById('composer').style.display = 'block';
                document.getElementById('composer-guest').style.display = 'none';

                NostrSocial.fetchProfiles([session.publicKey]).then(profiles => {
                    const p = profiles.get(session.publicKey);
                    if (p && p.picture) {
                        const el = document.getElementById('composer-avatar');
                        el.innerHTML = `<img src="${escapeHtml(p.picture)}" alt="" onerror="this.style.display='none'">`;
                    } else if (p && p.name) {
                        const initials = p.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
                        document.getElementById('composer-avatar').textContent = initials;
                    }
                });
            } else {
                document.getElementById('composer').style.display = 'none';
                document.getElementById('composer-guest').style.display = 'block';
            }
        }

        function setupComposerEvents() {
            const textarea = document.getElementById('compose-text');
            const charCount = document.getElementById('char-count');
            const postBtn = document.getElementById('post-btn');

            textarea.addEventListener('input', () => {
                const len = textarea.value.length;
                charCount.textContent = `${len} / 1000`;
                charCount.className = 'char-count' + (len > 900 ? (len > 1000 ? ' over' : ' warn') : '');
                postBtn.disabled = (len === 0 && !attachedImageUrl) || len > 1000 || isPosting;
            });

            postBtn.addEventListener('click', submitPost);

            textarea.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    if (!postBtn.disabled) submitPost();
                }
            });

            // Image attach button
            const attachBtn = document.getElementById('composer-attach-btn');
            const imageInput = document.getElementById('composer-image-input');
            if (attachBtn && imageInput) {
                attachBtn.addEventListener('click', () => imageInput.click());
                imageInput.addEventListener('change', handleImageAttach);
            }
        }

        async function handleImageAttach(event) {
            const file = event.target.files[0];
            if (!file) return;

            const previewEl = document.getElementById('composer-image-preview');
            const statusEl = document.getElementById('composer-upload-status');
            const postBtn = document.getElementById('post-btn');

            const localUrl = URL.createObjectURL(file);
            if (previewEl) {
                previewEl.style.display = 'block';
                previewEl.innerHTML = `<img src="${localUrl}" alt=""><button class="composer-image-remove" onclick="event.preventDefault(); removeAttachedImage()">&times;</button>`;
            }
            if (statusEl) { statusEl.textContent = 'Uploading...'; statusEl.className = 'composer-upload-status uploading'; }

            try {
                const formData = new FormData();
                formData.append('file', file);
                const response = await fetch('/api/upload/image', { method: 'POST', body: formData });
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.detail || `Upload failed: ${response.status}`);
                }
                const result = await response.json();
                attachedImageUrl = result.blossom_url;
                URL.revokeObjectURL(localUrl);

                if (previewEl) {
                    previewEl.innerHTML = `<img src="${attachedImageUrl}" alt=""><button class="composer-image-remove" onclick="event.preventDefault(); removeAttachedImage()">&times;</button>`;
                }
                if (statusEl) { statusEl.textContent = ''; statusEl.className = 'composer-upload-status'; }
                if (postBtn) postBtn.disabled = false;
            } catch (error) {
                console.error('Image upload error:', error);
                if (statusEl) { statusEl.textContent = 'Upload failed: ' + error.message; statusEl.className = 'composer-upload-status error'; }
                removeAttachedImage();
            }

            event.target.value = '';
        }

        function removeAttachedImage() {
            attachedImageUrl = null;
            const previewEl = document.getElementById('composer-image-preview');
            const statusEl = document.getElementById('composer-upload-status');
            const postBtn = document.getElementById('post-btn');
            const textarea = document.getElementById('compose-text');
            if (previewEl) { previewEl.style.display = 'none'; previewEl.innerHTML = ''; }
            if (statusEl) { statusEl.textContent = ''; statusEl.className = 'composer-upload-status'; }
            if (postBtn && textarea) postBtn.disabled = textarea.value.trim().length === 0;
        }

        async function submitPost() {
            const textarea = document.getElementById('compose-text');
            const postBtn = document.getElementById('post-btn');
            let content = textarea.value.trim();

            if (attachedImageUrl) {
                content = content ? content + '\n' + attachedImageUrl : attachedImageUrl;
            }

            if (!content || isPosting) return;

            const session = SessionManager.getSession();
            if (!session) return;

            isPosting = true;
            postBtn.disabled = true;
            postBtn.textContent = 'Posting...';

            try {
                const event = {
                    kind: 1,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [['app', 'Equaliser'], ['content-type', 'post']],
                    content: content
                };

                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                textarea.value = '';
                removeAttachedImage();
                document.getElementById('char-count').textContent = '0 / 1000';
                document.getElementById('char-count').className = 'char-count';

                const successEl = document.getElementById('post-success');
                successEl.classList.add('show');
                setTimeout(() => successEl.classList.remove('show'), 2000);

                feedNotes.unshift(signedEvent);

                if (!feedProfiles.has(signedEvent.pubkey)) {
                    const profiles = await NostrSocial.fetchProfiles([signedEvent.pubkey]);
                    profiles.forEach((v, k) => feedProfiles.set(k, v));
                }

                renderFeed();
            } catch (error) {
                console.error('Post failed:', error);
                alert('Failed to post. Please try again.');
            } finally {
                isPosting = false;
                postBtn.disabled = textarea.value.trim().length === 0;
                postBtn.textContent = 'Post';
            }
        }

        // ===== Feed Loading =====

        async function loadFeed(tab) {
            tab = tab || currentFeedTab;
            const feedEl = document.getElementById('feed-list');

            feedEl.innerHTML = `<div class="loading-area"><div class="loading-spinner"></div><div>Loading feed...</div></div>`;

            let filter;
            let emptyMessage;

            if (tab === 'equaliser') {
                filter = { kinds: [1], limit: 50 };
                emptyMessage = `<p>No posts yet</p><p class="sub">Community posts will appear here</p>`;
            } else {
                const followedPubkeys = await NostrSocial.fetchContactList();
                const session = SessionManager.getSession();
                const feedAuthors = session ? [session.publicKey, ...followedPubkeys] : [...followedPubkeys];
                if (feedAuthors.length > 0) {
                    filter = { kinds: [1], authors: feedAuthors, limit: 50 };
                    emptyMessage = `<p>No posts yet</p><p class="sub">Follow some artists to see their posts here</p>`;
                } else {
                    feedEl.innerHTML = `
                        <div class="empty-area">
                            <svg fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
                            </svg>
                            <p>Your feed is empty</p>
                            <p class="sub">Follow some artists to see their posts here</p>
                        </div>`;
                    feedNotes = [];
                    return;
                }
            }

            let allNotes = await NostrSocial.fetchNotes(filter);
            allNotes = allNotes.filter(n => NostrSocial.isTopLevelPost(n));

            if (allNotes.length === 0) {
                feedEl.innerHTML = `
                    <div class="empty-area">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
                        </svg>
                        ${emptyMessage}
                    </div>`;
                feedNotes = [];
                return;
            }

            feedNotes = allNotes;

            const authorPubkeys = [...new Set(allNotes.map(n => n.pubkey))];
            feedProfiles = await NostrSocial.fetchProfiles(authorPubkeys);

            renderFeed();

            feedReactionData = { likes: {}, reposts: {}, userLiked: new Set(), userReposted: new Set() };
            const noteIds = allNotes.map(n => n.id);
            loadFeedReactions(noteIds);
            loadFeedReplyCounts(noteIds);
        }

        function navigateToThread(noteId) {
            window.location.href = `/thread.html?id=${noteId}`;
        }

        async function loadFeedReplyCounts(noteIds) {
            if (noteIds.length === 0) return;
            const counts = await NostrSocial.fetchReplyCounts(noteIds);
            counts.forEach((count, noteId) => {
                const el = document.querySelector(`.reply-count[data-reply-note-id="${noteId}"]`);
                if (el && count > 0) el.textContent = count;
            });
        }

        function switchFeedTab(tab) {
            if (tab === currentFeedTab) return;
            currentFeedTab = tab;

            document.querySelectorAll('.feed-sub-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            loadFeed(tab).catch(err => {
                console.error('Failed to load feed:', err);
                document.getElementById('feed-list').innerHTML = `
                    <div class="empty-area">
                        <p>Could not load feed</p>
                        <p class="sub"><a href="#" onclick="loadFeed('${tab}'); return false;">Retry</a></p>
                    </div>`;
            });
        }

        // ===== Feed Rendering =====

        function renderFeed() {
            const feedEl = document.getElementById('feed-list');

            feedEl.innerHTML = feedNotes.map(note => {
                const profile = feedProfiles.get(note.pubkey) || {};
                const name = profile.name || 'Nostr User';
                const initial = name.charAt(0).toUpperCase();
                const time = NostrSocial.relativeTime(note.created_at);
                const content = NostrSocial.linkifyContent(escapeHtml(note.content));
                const likeCount = feedReactionData.likes[note.id] || 0;
                const repostCount = feedReactionData.reposts[note.id] || 0;
                const userLiked = feedReactionData.userLiked.has(note.id);
                const userReposted = feedReactionData.userReposted.has(note.id);

                let npub = '';
                try { npub = window.NostrTools.nip19.npubEncode(note.pubkey); } catch (e) {}

                const avatarLink = npub ? `<a href="user.html?npub=${npub}">` : '';
                const avatarLinkEnd = npub ? '</a>' : '';

                return `
                    <div class="feed-post" data-note-id="${note.id}">
                        <div class="feed-post-inner">
                            <div class="feed-avatar">
                                ${avatarLink}
                                ${profile.picture
                                    ? `<img src="${escapeHtml(profile.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${initial}'">`
                                    : initial
                                }
                                ${avatarLinkEnd}
                            </div>
                            <div class="feed-post-body">
                                <div class="feed-post-header">
                                    <span class="feed-display-name">${npub ? `<a href="user.html?npub=${npub}">${escapeHtml(name)}</a>` : escapeHtml(name)}</span>
                                    ${!NostrSocial.isEqualiiserEvent(note) ? '<span class="feed-nostr-badge">via NOSTR</span>' : ''}
                                    <span class="feed-handle">${npub ? npub.substring(0, 16) + '...' : ''}</span>
                                    <span class="feed-time">${time}</span>
                                </div>
                                <div class="feed-content feed-post-clickable" onclick="navigateToThread('${note.id}')">${content}</div>
                                ${NostrSocial.generateLinkPreviews(note.content)}
                                ${NostrSocial.generateReleaseAnnouncementCard(note)}
                                <div class="feed-actions">
                                    <div class="feed-action reply-btn" onclick="navigateToThread('${note.id}')">
                                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                            <path d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7z"/>
                                        </svg>
                                        <span class="reply-count" data-reply-note-id="${note.id}"></span>
                                    </div>
                                    <div class="feed-action like-btn${userLiked ? ' liked' : ''}" onclick="handleFeedLike('${note.id}', '${note.pubkey}')">
                                        <svg viewBox="0 0 20 20" fill="${userLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5">
                                            <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>
                                        </svg>
                                        <span class="like-count">${likeCount || ''}</span>
                                    </div>
                                    <div class="feed-action repost-btn${userReposted ? ' reposted' : ''}" onclick="handleFeedRepost('${note.id}', '${note.pubkey}')">
                                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                            <path d="M7 16V4m0 0L3 8m4-4l4 4M13 4v12m0 0l4-4m-4 4l-4-4"/>
                                        </svg>
                                        <span class="repost-count">${repostCount || ''}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // ===== Feed Reactions =====

        async function loadFeedReactions(noteIds) {
            if (noteIds.length === 0) return;
            feedReactionData = await NostrSocial.fetchReactions(noteIds);
            updateFeedReactionUI();
        }

        function updateFeedReactionUI() {
            document.querySelectorAll('#feed-list .feed-post').forEach(post => {
                const noteId = post.dataset.noteId;
                if (!noteId) return;

                const likeBtn = post.querySelector('.like-btn');
                const repostBtn = post.querySelector('.repost-btn');

                if (likeBtn) {
                    const count = feedReactionData.likes[noteId] || 0;
                    likeBtn.querySelector('.like-count').textContent = count || '';
                    const liked = feedReactionData.userLiked.has(noteId);
                    likeBtn.classList.toggle('liked', liked);
                    likeBtn.querySelector('svg').setAttribute('fill', liked ? 'currentColor' : 'none');
                }

                if (repostBtn) {
                    const count = feedReactionData.reposts[noteId] || 0;
                    repostBtn.querySelector('.repost-count').textContent = count || '';
                    repostBtn.classList.toggle('reposted', feedReactionData.userReposted.has(noteId));
                }
            });
        }

        async function handleFeedLike(noteId, authorPubkey) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }
            if (feedReactionData.userLiked.has(noteId)) return;

            try {
                const event = {
                    kind: 7,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [['e', noteId], ['p', authorPubkey]],
                    content: '+'
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                feedReactionData.likes[noteId] = (feedReactionData.likes[noteId] || 0) + 1;
                feedReactionData.userLiked.add(noteId);
                updateFeedReactionUI();
            } catch (error) {
                console.error('Like failed:', error);
            }
        }

        async function handleFeedRepost(noteId, authorPubkey) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }
            if (feedReactionData.userReposted.has(noteId)) return;

            try {
                const originalNote = feedNotes.find(n => n.id === noteId);
                const event = {
                    kind: 6,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [['e', noteId, NostrSocial.DEFAULT_RELAYS[0]], ['p', authorPubkey]],
                    content: originalNote ? JSON.stringify(originalNote) : ''
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                feedReactionData.reposts[noteId] = (feedReactionData.reposts[noteId] || 0) + 1;
                feedReactionData.userReposted.add(noteId);
                updateFeedReactionUI();
            } catch (error) {
                console.error('Repost failed:', error);
            }
        }

        // ================================================
        // COMMUNITY FUNCTIONALITY
        // ================================================

        let currentBoard = 'all';
        let threads = [];
        let threadProfiles = new Map();
        let threadReplyCounts = new Map();
        let activeThreadId = null;
        let activeThreadEvent = null;
        let activeThreadReplies = [];
        let activeThreadProfiles = new Map();
        let isSubmitting = false;
        let communityLoaded = false;

        // ===== Thread List =====

        async function loadThreads(board) {
            board = board || currentBoard;
            const listEl = document.getElementById('thread-list');
            listEl.innerHTML = `<div class="loading-area"><div class="loading-spinner"></div><div>Loading threads...</div></div>`;

            threads = await NostrSocial.fetchCommunityThreads(board);

            if (threads.length === 0) {
                listEl.innerHTML = `<div class="empty-area"><p>No threads yet</p><p class="sub">Start a discussion by creating a new thread</p></div>`;
                return;
            }

            const pubkeys = [...new Set(threads.map(t => t.pubkey))];
            threadProfiles = await NostrSocial.fetchProfiles(pubkeys);

            const threadIds = threads.map(t => t.id);
            threadReplyCounts = await NostrSocial.fetchReplyCounts(threadIds);

            renderThreadList();
        }

        function renderThreadList() {
            const listEl = document.getElementById('thread-list');
            listEl.innerHTML = threads.map(thread => {
                const profile = threadProfiles.get(thread.pubkey) || {};
                const name = profile.name || 'Unknown';
                const initial = name.charAt(0).toUpperCase();
                const subject = thread.tags.find(t => t[0] === 'subject');
                const board = thread.tags.find(t => t[0] === 'board');
                const boardName = board ? board[1] : 'general';
                const subjectText = subject ? subject[1] : 'Untitled';
                const time = NostrSocial.relativeTime(thread.created_at);
                const replyCount = threadReplyCounts.get(thread.id) || 0;
                const preview = thread.content.substring(0, 120) + (thread.content.length > 120 ? '...' : '');

                return `
                    <div class="thread-item" onclick="openThread('${thread.id}')">
                        <div class="thread-item-top">
                            <span class="thread-subject">${escapeHtml(subjectText)}</span>
                            <span class="board-badge ${boardName}">${escapeHtml(boardName)}</span>
                        </div>
                        <div class="thread-preview">${escapeHtml(preview)}</div>
                        <div class="thread-meta">
                            <span class="thread-author">
                                <span class="thread-author-avatar">
                                    ${profile.picture
                                        ? `<img src="${escapeHtml(profile.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${initial}'">`
                                        : initial
                                    }
                                </span>
                                ${escapeHtml(name)}
                            </span>
                            <span>${replyCount} ${replyCount === 1 ? 'reply' : 'replies'}</span>
                            <span>${time}</span>
                        </div>
                    </div>`;
            }).join('');
        }

        function switchBoard(board) {
            if (board === currentBoard) return;
            currentBoard = board;
            document.querySelectorAll('.board-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.board === board);
            });
            loadThreads(board);

            const url = new URL(window.location);
            url.searchParams.set('tab', 'community');
            if (board === 'all') url.searchParams.delete('board');
            else url.searchParams.set('board', board);
            url.searchParams.delete('thread');
            history.replaceState({}, '', url);
        }

        // ===== New Thread =====

        function toggleNewThreadForm() {
            const form = document.getElementById('new-thread-form');
            form.classList.toggle('visible');
        }

        async function submitThread() {
            const subject = document.getElementById('thread-subject').value.trim();
            const content = document.getElementById('thread-content').value.trim();
            const board = document.getElementById('thread-board').value;
            if (!subject || !content || isSubmitting) return;

            const session = SessionManager.getSession();
            if (!session) return;

            isSubmitting = true;
            const btn = document.getElementById('submit-thread-btn');
            btn.disabled = true;
            btn.textContent = 'Posting...';

            try {
                const event = {
                    kind: 1,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [
                        ['app', 'Equaliser'],
                        ['content-type', 'thread'],
                        ['subject', subject],
                        ['board', board]
                    ],
                    content: content
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                document.getElementById('thread-subject').value = '';
                document.getElementById('thread-content').value = '';
                document.getElementById('new-thread-form').classList.remove('visible');

                loadThreads();
            } catch (error) {
                console.error('Thread creation failed:', error);
                alert('Failed to create thread. Please try again.');
            } finally {
                isSubmitting = false;
                btn.disabled = false;
                btn.textContent = 'Post Thread';
            }
        }

        // ===== Thread Detail =====

        async function openThread(threadId) {
            activeThreadId = threadId;
            document.getElementById('community-list-view').style.display = 'none';
            const detailView = document.getElementById('community-detail-view');
            detailView.classList.add('visible');
            document.getElementById('thread-detail-content').innerHTML = `<div class="loading-area"><div class="loading-spinner"></div><div>Loading thread...</div></div>`;

            const url = new URL(window.location);
            url.searchParams.set('tab', 'community');
            url.searchParams.set('thread', threadId);
            history.pushState({}, '', url);

            activeThreadEvent = await NostrSocial.fetchEventById(threadId);
            if (!activeThreadEvent) {
                document.getElementById('thread-detail-content').innerHTML = `<div class="empty-area"><p>Thread not found</p></div>`;
                return;
            }

            activeThreadReplies = await NostrSocial.fetchCommunityReplies(threadId);

            const allPubkeys = new Set([activeThreadEvent.pubkey, ...activeThreadReplies.map(r => r.pubkey)]);
            activeThreadProfiles = await NostrSocial.fetchProfiles([...allPubkeys]);

            renderThreadDetail();
        }

        function renderThreadDetail() {
            const ev = activeThreadEvent;
            const profile = activeThreadProfiles.get(ev.pubkey) || {};
            const name = profile.name || 'Unknown';
            const initial = name.charAt(0).toUpperCase();
            const subject = ev.tags.find(t => t[0] === 'subject');
            const subjectText = subject ? subject[1] : 'Untitled';
            const content = NostrSocial.linkifyContent(escapeHtml(ev.content));
            const date = new Date(ev.created_at * 1000);
            const timeStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            let npub = '';
            try { npub = window.NostrTools.nip19.npubEncode(ev.pubkey); } catch (e) {}

            const session = SessionManager.getSession();
            let composerHtml = '';
            if (session) {
                composerHtml = `
                    <div class="thread-reply-composer">
                        <textarea id="detail-reply-text" placeholder="Write a reply..." maxlength="2000"></textarea>
                        <div class="thread-reply-composer-footer">
                            <button class="form-submit" id="detail-reply-btn" disabled onclick="submitThreadReply()">Reply</button>
                        </div>
                    </div>`;
            } else {
                composerHtml = `<div class="reply-login"><a href="/login.html?return=${encodeURIComponent(window.location.href)}">Log in</a> to reply</div>`;
            }

            let repliesHtml = '';
            if (activeThreadReplies.length > 0) {
                repliesHtml = `<div class="thread-replies-header">${activeThreadReplies.length} ${activeThreadReplies.length === 1 ? 'Reply' : 'Replies'}</div>`;
                repliesHtml += activeThreadReplies.map(reply => {
                    const rp = activeThreadProfiles.get(reply.pubkey) || {};
                    const rName = rp.name || 'Unknown';
                    const rInitial = rName.charAt(0).toUpperCase();
                    const rContent = NostrSocial.linkifyContent(escapeHtml(reply.content));
                    const rTime = NostrSocial.relativeTime(reply.created_at);
                    let rNpub = '';
                    try { rNpub = window.NostrTools.nip19.npubEncode(reply.pubkey); } catch (e) {}

                    return `
                        <div class="thread-reply-item">
                            <div class="thread-reply-inner">
                                <div class="thread-reply-avatar">
                                    ${rNpub ? `<a href="/user.html?npub=${rNpub}" style="display:contents">` : ''}
                                    ${rp.picture
                                        ? `<img src="${escapeHtml(rp.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${rInitial}'">`
                                        : rInitial
                                    }
                                    ${rNpub ? '</a>' : ''}
                                </div>
                                <div class="thread-reply-body">
                                    <div class="thread-reply-header">
                                        <span class="thread-reply-name">${rNpub ? `<a href="/user.html?npub=${rNpub}">${escapeHtml(rName)}</a>` : escapeHtml(rName)}</span>
                                        <span class="thread-reply-time">${rTime}</span>
                                    </div>
                                    <div class="thread-reply-content">${rContent}</div>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            } else {
                repliesHtml = `<div class="thread-replies-empty">No replies yet. Be the first to reply!</div>`;
            }

            const board = ev.tags.find(t => t[0] === 'board');
            const boardName = board ? board[1] : 'general';

            document.getElementById('thread-detail-content').innerHTML = `
                <div class="thread-op">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
                        <span class="board-badge ${boardName}">${escapeHtml(boardName)}</span>
                    </div>
                    <div class="thread-op-subject">${escapeHtml(subjectText)}</div>
                    <div class="thread-op-header">
                        <div class="thread-op-avatar">
                            ${npub ? `<a href="/user.html?npub=${npub}" style="display:contents">` : ''}
                            ${profile.picture
                                ? `<img src="${escapeHtml(profile.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${initial}'">`
                                : initial
                            }
                            ${npub ? '</a>' : ''}
                        </div>
                        <div>
                            <div class="thread-op-author-name">${npub ? `<a href="/user.html?npub=${npub}">${escapeHtml(name)}</a>` : escapeHtml(name)}</div>
                            <div class="thread-op-time">${timeStr}</div>
                        </div>
                    </div>
                    <div class="thread-op-content">${content}</div>
                </div>
                ${composerHtml}
                ${repliesHtml}`;

            if (session) {
                const textarea = document.getElementById('detail-reply-text');
                const replyBtn = document.getElementById('detail-reply-btn');
                if (textarea && replyBtn) {
                    textarea.addEventListener('input', () => {
                        replyBtn.disabled = textarea.value.trim().length === 0 || isSubmitting;
                    });
                    textarea.addEventListener('keydown', (e) => {
                        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                            e.preventDefault();
                            if (!replyBtn.disabled) submitThreadReply();
                        }
                    });
                }
            }
        }

        async function submitThreadReply() {
            const textarea = document.getElementById('detail-reply-text');
            const btn = document.getElementById('detail-reply-btn');
            const content = textarea.value.trim();
            if (!content || isSubmitting) return;

            const session = SessionManager.getSession();
            if (!session) return;

            isSubmitting = true;
            btn.disabled = true;
            btn.textContent = 'Posting...';

            try {
                const event = {
                    kind: 1,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [
                        ['app', 'Equaliser'],
                        ['content-type', 'reply'],
                        ['e', activeThreadId, '', 'root'],
                        ['p', activeThreadEvent.pubkey]
                    ],
                    content: content
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                activeThreadReplies.push(signedEvent);
                if (!activeThreadProfiles.has(signedEvent.pubkey)) {
                    const profiles = await NostrSocial.fetchProfiles([signedEvent.pubkey]);
                    profiles.forEach((v, k) => activeThreadProfiles.set(k, v));
                }

                textarea.value = '';
                renderThreadDetail();
            } catch (error) {
                console.error('Reply failed:', error);
                alert('Failed to post reply. Please try again.');
            } finally {
                isSubmitting = false;
                btn.disabled = false;
                btn.textContent = 'Reply';
            }
        }

        function showCommunityListView() {
            document.getElementById('community-detail-view').classList.remove('visible');
            document.getElementById('community-list-view').style.display = '';
            activeThreadId = null;

            const url = new URL(window.location);
            url.searchParams.delete('thread');
            url.searchParams.set('tab', 'community');
            history.pushState({}, '', url);
        }

        // ================================================
        // INIT
        // ================================================

        SessionManager.init();
        currentFeedTab = SessionManager.hasSession() ? 'following' : 'equaliser';
        ClientSidebar.init();
        initComposer();
        setupComposerEvents();

        // Render feed sub-tabs
        const feedSubTabsEl = document.getElementById('feed-sub-tabs');
        if (SessionManager.hasSession()) {
            feedSubTabsEl.innerHTML = `
                <button class="feed-sub-tab active" data-tab="following" onclick="switchFeedTab('following')">Your Feed</button>
                <button class="feed-sub-tab" data-tab="equaliser" onclick="switchFeedTab('equaliser')">Global Feed</button>`;
        } else {
            feedSubTabsEl.innerHTML = `
                <button class="feed-sub-tab active" data-tab="equaliser">Global Feed</button>`;
        }

        // Show community toolbar if logged in
        if (SessionManager.hasSession()) {
            document.getElementById('community-toolbar').style.display = '';
        }

        // Wire up thread form validation
        const subjectInput = document.getElementById('thread-subject');
        const contentInput = document.getElementById('thread-content');
        const submitBtn = document.getElementById('submit-thread-btn');
        function validateThreadForm() {
            submitBtn.disabled = !subjectInput.value.trim() || !contentInput.value.trim() || isSubmitting;
        }
        subjectInput.addEventListener('input', validateThreadForm);
        contentInput.addEventListener('input', validateThreadForm);

        // Check URL params for initial state
        const params = new URLSearchParams(window.location.search);
        const tabParam = params.get('tab');
        const boardParam = params.get('board');
        const threadParam = params.get('thread');

        if (tabParam === 'community') {
            // Switch to community tab
            activeTopTab = 'community';
            document.querySelectorAll('.social-top-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === 'community');
            });
            document.getElementById('feed-section').classList.add('hidden');
            document.getElementById('community-section').classList.add('visible');

            if (boardParam) {
                currentBoard = boardParam;
                document.querySelectorAll('.board-tab').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.board === boardParam);
                });
            }

            if (threadParam) {
                communityLoaded = true;
                openThread(threadParam);
            } else {
                communityLoaded = true;
                loadThreads();
            }
        }

        // Always load feed (it's the default tab)
        loadFeed().catch(err => {
            console.error('Failed to load feed:', err);
            document.getElementById('feed-list').innerHTML = `
                <div class="empty-area">
                    <p>Could not load feed</p>
                    <p class="sub"><a href="#" onclick="loadFeed(); return false;">Retry</a></p>
                </div>`;
        });

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            const p = new URLSearchParams(window.location.search);
            if (p.get('tab') === 'community') {
                if (activeTopTab !== 'community') switchTopTab('community');
                if (p.get('thread')) {
                    openThread(p.get('thread'));
                } else {
                    showCommunityListView();
                    loadThreads();
                }
            } else {
                if (activeTopTab !== 'feed') switchTopTab('feed');
            }
        });
    </script>
</body>
</html>
