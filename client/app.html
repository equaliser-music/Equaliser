<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - Decentralized Music Platform</title>
    <link id="eq-theme" rel="stylesheet" href="/common/css/theme-classic.css?v=1">
    <script src="/common/js/theme.js?v=1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--eq-font-body);
            background: var(--eq-bg-app);
            color: var(--eq-text-1);
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Page content wrapper - flex container for injected page elements */
        /* Pages inject .main-content (and optionally .nostr-sidebar) as children */
        #page-content {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* Ensure injected .main-content can scroll within the SPA shell */
        #page-content > .main-content {
            overflow-y: auto;
            height: 100%;
        }
        /* Reserve space for the fixed player bar at the bottom */
        .container {
            padding-bottom: 90px;
        }

        /* Loading state */
        .page-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--eq-text-3);
            flex-direction: column;
            gap: 16px;
        }

        .page-loading .loading-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--eq-accent-soft-hover);
            border-top-color: var(--eq-accent);
            border-radius: var(--eq-radius-round);
            animation: spin var(--eq-dur-spin) linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Playlist picker dropdown (used across pages) */
        .eq-playlist-picker {
            width: 250px;
            background: var(--eq-surface-raised);
            backdrop-filter: var(--eq-blur-backdrop);
            border: var(--eq-border);
            border-radius: var(--eq-radius-xl);
            overflow: hidden;
            box-shadow: var(--eq-shadow-2);
        }

        .eq-playlist-picker-header {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--eq-text-2-dim);
            border-bottom: var(--eq-border-soft);
        }

        .eq-playlist-picker-list {
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--eq-border-15) transparent;
        }

        .eq-playlist-picker-empty {
            padding: 16px;
            text-align: center;
            font-size: 13px;
            color: var(--eq-text-4);
        }

        .eq-playlist-picker-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            transition: background var(--eq-dur-fast);
        }

        .eq-playlist-picker-item:hover { background: var(--eq-surface-2); }

        .eq-playlist-picker-item input[type="checkbox"] {
            accent-color: var(--eq-accent);
        }

        .eq-playlist-picker-create {
            border-top: var(--eq-border-soft);
            padding: 10px 16px;
        }

        .eq-playlist-picker-create-btn {
            background: none;
            border: none;
            color: var(--eq-accent);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 0;
        }

        .eq-playlist-picker-create-btn:hover { color: var(--eq-accent-text); }

        .eq-playlist-picker-create-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .eq-playlist-picker-create-input {
            flex: 1;
            padding: 6px 10px;
            background: var(--eq-surface-1-hover);
            border: 1px solid var(--eq-border-15);
            border-radius: var(--eq-radius-sm);
            color: var(--eq-text-1);
            font-size: 13px;
            outline: none;
        }

        .eq-playlist-picker-create-input:focus { border-color: var(--eq-accent); }

        .eq-playlist-picker-create-save {
            padding: 6px 12px;
            background: var(--eq-accent);
            border: none;
            border-radius: var(--eq-radius-sm);
            color: var(--eq-text-1);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .eq-playlist-picker-create-save:disabled { opacity: 0.5; }

        /* Link preview cards (shared across pages) */
        .link-preview {
            display: block;
            margin: 8px 0 12px;
            border-radius: var(--eq-radius-xl);
            overflow: hidden;
            border: var(--eq-border);
            background: var(--eq-surface-1);
            text-decoration: none;
            transition: background var(--eq-dur-quick), border-color var(--eq-dur-quick);
        }
        .link-preview:hover {
            background: var(--eq-surface-1-hover);
            border-color: var(--eq-border-20);
            text-decoration: none;
        }
        .link-preview-image {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--eq-scrim-soft);
            overflow: hidden;
        }
        .link-preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .link-preview-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            background: var(--eq-scrim-strong);
            border-radius: var(--eq-radius-round);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--eq-dur-quick);
        }
        .link-preview:hover .link-preview-play {
            background: var(--eq-brand-youtube);
        }
        .link-preview-meta {
            padding: 10px 14px;
        }
        .link-preview-domain {
            font-size: 12px;
            color: var(--eq-text-4);
        }
        .link-preview-inline-image {
            border: none;
            background: none;
            border-radius: var(--eq-radius-xl);
            overflow: hidden;
        }
        .link-preview-inline-image:hover {
            background: none;
            opacity: 0.9;
        }
        .link-preview-inline-image img {
            display: block;
            max-width: 100%;
            max-height: 400px;
            width: auto;
            border-radius: var(--eq-radius-xl);
            object-fit: contain;
        }

        /* Composer image attach */
        .composer-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .composer-attach-btn {
            background: none;
            border: none;
            color: var(--eq-text-4);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--eq-radius-md);
            transition: color var(--eq-dur-quick), background var(--eq-dur-quick);
            display: flex;
            align-items: center;
        }
        .composer-attach-btn:hover {
            color: var(--eq-accent);
            background: var(--eq-accent-tint-10);
        }
        .composer-image-preview {
            margin-top: 8px;
            position: relative;
            display: inline-block;
        }
        .composer-image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: var(--eq-radius-lg);
            border: var(--eq-border);
        }
        .composer-image-remove {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            background: var(--eq-scrim-strong);
            border: none;
            border-radius: var(--eq-radius-round);
            color: var(--eq-text-1);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .composer-image-remove:hover {
            background: var(--eq-danger-strong);
        }
        .composer-upload-status {
            font-size: 12px;
            color: var(--eq-text-4);
            margin-top: 4px;
        }
        .composer-upload-status.uploading { color: var(--eq-accent); }
        .composer-upload-status.error { color: var(--eq-danger); }

        /* Inline playlist card (expanded) */
        .feed-playlist-tracklist {
            border: 1px solid var(--eq-accent-soft);
            border-top: none;
            border-radius: 0 0 var(--eq-radius-lg) var(--eq-radius-lg);
            background: var(--eq-accent-soft-03);
            margin-top: -1px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .feed-playlist-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-bottom: var(--eq-divider);
        }
        .feed-playlist-play-all {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--eq-accent-soft-20);
            border: none;
            color: var(--eq-accent-text);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: var(--eq-radius-3xl);
            cursor: pointer;
            transition: background var(--eq-dur-quick);
        }
        .feed-playlist-play-all:hover { background: var(--eq-accent-soft-35); }
        .feed-playlist-count {
            font-size: 12px;
            color: var(--eq-text-mute);
        }
        .feed-playlist-open {
            margin-left: auto;
            font-size: 12px;
            color: var(--eq-text-mute);
            text-decoration: none;
        }
        .feed-playlist-open:hover { color: var(--eq-accent-text); }
        .feed-playlist-track {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            cursor: pointer;
            transition: background var(--eq-dur-fast);
        }
        .feed-playlist-track:hover {
            background: var(--eq-accent-soft-08);
        }
        .feed-playlist-track:hover .feed-playlist-track-play { opacity: 1; }
        .feed-playlist-track-cover {
            width: 36px;
            height: 36px;
            border-radius: var(--eq-radius-xs);
            background: var(--eq-accent-soft);
            overflow: hidden;
            flex-shrink: 0;
        }
        .feed-playlist-track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .feed-playlist-track-info {
            flex: 1;
            min-width: 0;
        }
        .feed-playlist-track-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--eq-text-bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .feed-playlist-track-artist {
            font-size: 11px;
            color: var(--eq-text-mute);
        }
        .feed-playlist-track-duration {
            font-size: 12px;
            color: var(--eq-text-faint);
            flex-shrink: 0;
        }
        .feed-playlist-track-play {
            flex-shrink: 0;
            color: var(--eq-accent-text);
            opacity: 0.4;
            transition: opacity var(--eq-dur-fast);
        }

        /* Follow list modal */
        .follow-list-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--eq-scrim);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .follow-list-modal.open { display: flex; }
        .follow-list-modal-content {
            background: var(--eq-surface-modal);
            border: var(--eq-border);
            border-radius: var(--eq-radius-2xl);
            width: 100%;
            max-width: 440px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .follow-list-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--eq-border-08);
        }
        .follow-list-modal-header h3 {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
        }
        .follow-list-modal-close {
            background: none;
            border: none;
            color: var(--eq-text-3);
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .follow-list-modal-close:hover { color: var(--eq-text-1); }
        .follow-list-modal-body {
            overflow-y: auto;
            flex: 1;
        }
        .follow-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            transition: background var(--eq-dur-fast);
        }
        .follow-list-item:hover { background: var(--eq-surface-1); }
        .follow-list-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--eq-radius-round);
            background: var(--eq-grad-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
            overflow: hidden;
            text-decoration: none;
            color: var(--eq-text-1);
        }
        .follow-list-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .follow-list-info {
            flex: 1;
            min-width: 0;
        }
        .follow-list-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--eq-text-1);
            text-decoration: none;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .follow-list-name:hover { text-decoration: underline; }
        .follow-list-bio {
            font-size: 12px;
            color: var(--eq-text-4);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .follow-list-btn {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: var(--eq-radius-3xl);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--eq-dur-quick);
            border: 1px solid var(--eq-accent-mid);
            background: var(--eq-accent-soft-20);
            color: var(--eq-accent-text);
        }
        .follow-list-btn:hover { background: var(--eq-accent-soft-35); }
        .follow-list-btn.following {
            background: transparent;
            border-color: var(--eq-border-15);
            color: var(--eq-text-2-dim);
        }
        .follow-list-btn.following:hover {
            border-color: var(--eq-danger-mid);
            color: var(--eq-danger);
        }
        .follow-list-btn:disabled { opacity: 0.4; cursor: default; }

        /* Release announcement card accent */
        .feed-release-card {
            border-color: var(--eq-success-soft-25);
            background: var(--eq-success-soft-06);
            color: var(--eq-success);
        }
        .feed-release-card:hover { background: var(--eq-success-soft-12); }

        /* Add to Library button */
        .add-to-library-btn {
            margin-left: auto;
            background: none;
            border: 1px solid var(--eq-border-15);
            color: var(--eq-text-3);
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: var(--eq-radius-2xl);
            cursor: pointer;
            transition: all var(--eq-dur-quick);
            white-space: nowrap;
        }
        .add-to-library-btn:hover {
            border-color: var(--eq-accent-mid);
            color: var(--eq-accent-text);
            background: var(--eq-accent-soft-10);
        }
        .add-to-library-btn.added {
            border-color: var(--eq-success-soft-40);
            color: var(--eq-success);
            cursor: default;
        }
        .add-to-library-btn:disabled { opacity: 0.5; cursor: default; }

        /* Reply action buttons (shared across thread and community) */
        .reply-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: -6px;
        }
        .reply-action {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--eq-text-4);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: var(--eq-radius-2xl);
            transition: all var(--eq-dur-quick);
        }
        .reply-action:hover {
            color: var(--eq-text-2);
            background: var(--eq-surface-2);
        }
        .reply-action svg { width: 16px; height: 16px; }
        .reply-action.like-btn.liked { color: var(--eq-danger); }
        .reply-action.repost-btn.reposted { color: var(--eq-success-2); }

        /* Replying-to context label */
        .reply-context {
            font-size: 12px;
            color: var(--eq-text-mute);
            margin-bottom: 4px;
        }

        /* Inline reply composer (reply-to-reply and quote) */
        .reply-inline-composer, .quote-composer {
            padding: 12px 20px 12px 72px;
            border-bottom: var(--eq-divider);
        }
        .reply-inline-composer textarea, .quote-composer textarea {
            width: 100%;
            min-height: 50px;
            padding: 10px;
            background: var(--eq-surface-1);
            border: var(--eq-border);
            border-radius: var(--eq-radius-lg);
            color: var(--eq-text-1);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
        }
        .reply-inline-composer textarea:focus, .quote-composer textarea:focus {
            border-color: var(--eq-focus-ring);
        }
        .reply-inline-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .reply-inline-submit {
            padding: 6px 16px;
            background: var(--eq-grad-accent);
            border: none;
            border-radius: var(--eq-radius-3xl);
            color: var(--eq-text-1);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .reply-inline-submit:disabled { opacity: 0.4; }

        /* Repost dropdown menu */
        .repost-menu {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--eq-surface-raised);
            backdrop-filter: var(--eq-blur-backdrop);
            border: 1px solid var(--eq-border-12);
            border-radius: var(--eq-radius-lg);
            overflow: hidden;
            z-index: 100;
            min-width: 140px;
            box-shadow: var(--eq-shadow-1);
        }
        .repost-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--eq-text-strong);
            cursor: pointer;
            white-space: nowrap;
        }
        .repost-menu-item:hover {
            background: var(--eq-accent-soft);
            color: var(--eq-accent-text);
        }

        /* Quoted post card */
        .quoted-post-card {
            margin: 8px 0 12px;
            border: var(--eq-border);
            border-radius: var(--eq-radius-xl);
            padding: 12px;
            background: var(--eq-surface-0);
            overflow: hidden;
        }
        .quoted-post-card:hover {
            background: var(--eq-surface-0-hover);
            border-color: var(--eq-border-15);
        }
        .quoted-post-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .quoted-post-author img {
            width: 18px;
            height: 18px;
            border-radius: var(--eq-radius-round);
            object-fit: cover;
        }
        .quoted-post-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--eq-text-strong);
        }
        .quoted-post-time {
            font-size: 12px;
            color: var(--eq-text-faint);
        }
        .quoted-post-content {
            font-size: 13px;
            line-height: 1.5;
            color: var(--eq-text-2-dim);
        }
        .quoted-post-content a { color: var(--eq-text-link); text-decoration: none; }

        /* Via NOSTR badge for non-Equaliser tagged posts */
        .feed-nostr-badge {
            font-size: 10px;
            font-weight: 600;
            color: var(--eq-info-dim);
            background: var(--eq-info-soft);
            padding: 2px 6px;
            border-radius: var(--eq-radius-xs);
            white-space: nowrap;
        }

        /* === eq theme hooks (classic-neutral; Signal overrides via tokens) === */
        img { filter: var(--eq-img-filter); }
        a:hover img, .card:hover img, .keepcolor img { filter: var(--eq-img-filter-hover); }
        /* === eq state-note utilities (consumed by JS-rendered markup) === */
        .eq-note { text-align: center; color: var(--eq-text-4); }
        .eq-note--pad24 { padding: 24px; }
        .eq-note--pad32 { padding: 32px; }
        .eq-note--quote { padding: 10px; color: var(--eq-text-faint); font-size: 12px; text-align: left; }
        .eq-note--tracks { padding: 12px; color: var(--eq-text-4); font-size: 13px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar injected by ClientSidebar.init() -->
        <div class="sidebar"></div>

        <!-- Page content area - managed by Router -->
        <div id="page-content">
            <div class="page-loading">
                <div class="loading-spinner"></div>
                <div>Loading...</div>
            </div>
        </div>
    </div>

    <!-- Player bar injected by EqualiserPlayer.init() -->
    <!-- Hidden audio element created by EqualiserPlayer.init() -->

    <!-- Dependencies -->
    <script src="https://unpkg.com/nostr-tools@2.1.4/lib/nostr.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <script src="/common/js/session.js?v=2"></script>
    <script src="/js/sidebar.js?v=2"></script>
    <script src="/js/cache-api.js?v=1"></script>
    <script src="/js/nostr-social.js?v=3"></script>
    <script>
        // Register release card + library globals (used by onclick handlers in rendered HTML)
        window.expandReleaseCard = NostrSocial.expandReleaseCard;
        window.playFromReleaseCard = NostrSocial.playFromReleaseCard;
        window.addReleaseToLibrary = NostrSocial.addReleaseToLibrary;
        window.addPlaylistToLibrary = NostrSocial.addPlaylistToLibrary;
        window.generateQuotedPostCard = NostrSocial.generateQuotedPostCard;
    </script>
    <script src="/js/nostr-dm.js?v=2"></script>
    <script src="/js/nostr-playlists.js?v=2"></script>
    <script src="/js/player.js?v=2"></script>
    <script src="/js/router.js?v=2"></script>

    <script>
        // Initialize the app shell
        SessionManager.init();
        EqualiserPlayer.init();

        // Load server config + user relays BEFORE sidebar/router so profile fetches use them
        (async () => {
            if (typeof NostrSocial !== 'undefined') {
                await NostrSocial.loadServerConfig();
            }
            if (SessionManager.hasSession() && typeof NostrSocial !== 'undefined') {
                await NostrSocial.loadUserRelays(SessionManager.getSession().publicKey);
            }
            ClientSidebar.init();
            Router.init();
        })();
    </script>
</body>
</html>
