<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - Decentralized Music Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Page content wrapper - flex container for injected page elements */
        /* Pages inject .main-content (and optionally .nostr-sidebar) as children */
        #page-content {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* Ensure injected .main-content can scroll within the SPA shell */
        #page-content > .main-content {
            overflow-y: auto;
            height: 100%;
        }

        /* Loading state */
        .page-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: rgba(255, 255, 255, 0.5);
            flex-direction: column;
            gap: 16px;
        }

        .page-loading .loading-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Playlist picker dropdown (used across pages) */
        .eq-playlist-picker {
            width: 250px;
            background: rgba(20, 20, 35, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .eq-playlist-picker-header {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .eq-playlist-picker-list {
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.15) transparent;
        }

        .eq-playlist-picker-empty {
            padding: 16px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .eq-playlist-picker-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }

        .eq-playlist-picker-item:hover { background: rgba(255, 255, 255, 0.05); }

        .eq-playlist-picker-item input[type="checkbox"] {
            accent-color: #a855f7;
        }

        .eq-playlist-picker-create {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 16px;
        }

        .eq-playlist-picker-create-btn {
            background: none;
            border: none;
            color: #a855f7;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 0;
        }

        .eq-playlist-picker-create-btn:hover { color: #c084fc; }

        .eq-playlist-picker-create-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .eq-playlist-picker-create-input {
            flex: 1;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .eq-playlist-picker-create-input:focus { border-color: #a855f7; }

        .eq-playlist-picker-create-save {
            padding: 6px 12px;
            background: #a855f7;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .eq-playlist-picker-create-save:disabled { opacity: 0.5; }

        /* Link preview cards (shared across pages) */
        .link-preview {
            display: block;
            margin: 8px 0 12px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .link-preview:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
        }
        .link-preview-image {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .link-preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .link-preview-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .link-preview:hover .link-preview-play {
            background: rgba(255, 0, 0, 0.85);
        }
        .link-preview-meta {
            padding: 10px 14px;
        }
        .link-preview-domain {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .link-preview-inline-image {
            border: none;
            background: none;
            border-radius: 12px;
            overflow: hidden;
        }
        .link-preview-inline-image:hover {
            background: none;
            opacity: 0.9;
        }
        .link-preview-inline-image img {
            display: block;
            max-width: 100%;
            max-height: 400px;
            width: auto;
            border-radius: 12px;
            object-fit: contain;
        }

        /* Composer image attach */
        .composer-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .composer-attach-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
        }
        .composer-attach-btn:hover {
            color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }
        .composer-image-preview {
            margin-top: 8px;
            position: relative;
            display: inline-block;
        }
        .composer-image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .composer-image-remove {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .composer-image-remove:hover {
            background: rgba(239, 68, 68, 0.8);
        }
        .composer-upload-status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }
        .composer-upload-status.uploading { color: #a855f7; }
        .composer-upload-status.error { color: #ef4444; }

        /* Inline playlist card (expanded) */
        .feed-playlist-tracklist {
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-top: none;
            border-radius: 0 0 10px 10px;
            background: rgba(139, 92, 246, 0.03);
            margin-top: -1px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .feed-playlist-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .feed-playlist-play-all {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(139, 92, 246, 0.2);
            border: none;
            color: #c084fc;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .feed-playlist-play-all:hover { background: rgba(139, 92, 246, 0.35); }
        .feed-playlist-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
        }
        .feed-playlist-open {
            margin-left: auto;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
        }
        .feed-playlist-open:hover { color: #c084fc; }
        .feed-playlist-track {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .feed-playlist-track:hover {
            background: rgba(139, 92, 246, 0.08);
        }
        .feed-playlist-track:hover .feed-playlist-track-play { opacity: 1; }
        .feed-playlist-track-cover {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: rgba(139, 92, 246, 0.15);
            overflow: hidden;
            flex-shrink: 0;
        }
        .feed-playlist-track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .feed-playlist-track-info {
            flex: 1;
            min-width: 0;
        }
        .feed-playlist-track-title {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .feed-playlist-track-artist {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
        }
        .feed-playlist-track-duration {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
        }
        .feed-playlist-track-play {
            flex-shrink: 0;
            color: #c084fc;
            opacity: 0.4;
            transition: opacity 0.15s;
        }

        /* Follow list modal */
        .follow-list-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .follow-list-modal.open { display: flex; }
        .follow-list-modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .follow-list-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .follow-list-modal-header h3 {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
        }
        .follow-list-modal-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .follow-list-modal-close:hover { color: #fff; }
        .follow-list-modal-body {
            overflow-y: auto;
            flex: 1;
        }
        .follow-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            transition: background 0.15s;
        }
        .follow-list-item:hover { background: rgba(255, 255, 255, 0.03); }
        .follow-list-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
            overflow: hidden;
            text-decoration: none;
            color: #fff;
        }
        .follow-list-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .follow-list-info {
            flex: 1;
            min-width: 0;
        }
        .follow-list-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .follow-list-name:hover { text-decoration: underline; }
        .follow-list-bio {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .follow-list-btn {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(139, 92, 246, 0.5);
            background: rgba(139, 92, 246, 0.2);
            color: #c084fc;
        }
        .follow-list-btn:hover { background: rgba(139, 92, 246, 0.35); }
        .follow-list-btn.following {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.6);
        }
        .follow-list-btn.following:hover {
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }
        .follow-list-btn:disabled { opacity: 0.4; cursor: default; }

        /* Release announcement card accent */
        .feed-release-card {
            border-color: rgba(34, 197, 94, 0.25);
            background: rgba(34, 197, 94, 0.06);
            color: #4ade80;
        }
        .feed-release-card:hover { background: rgba(34, 197, 94, 0.12); }

        /* Add to Library button */
        .add-to-library-btn {
            margin-left: auto;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .add-to-library-btn:hover {
            border-color: rgba(139, 92, 246, 0.5);
            color: #c084fc;
            background: rgba(139, 92, 246, 0.1);
        }
        .add-to-library-btn.added {
            border-color: rgba(34, 197, 94, 0.4);
            color: #4ade80;
            cursor: default;
        }
        .add-to-library-btn:disabled { opacity: 0.5; cursor: default; }

        /* Via NOSTR badge for non-Equaliser tagged posts */
        .feed-nostr-badge {
            font-size: 10px;
            font-weight: 600;
            color: rgba(96, 165, 250, 0.7);
            background: rgba(96, 165, 250, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar injected by ClientSidebar.init() -->
        <div class="sidebar"></div>

        <!-- Page content area - managed by Router -->
        <div id="page-content">
            <div class="page-loading">
                <div class="loading-spinner"></div>
                <div>Loading...</div>
            </div>
        </div>
    </div>

    <!-- Player bar injected by EqualiserPlayer.init() -->
    <!-- Hidden audio element created by EqualiserPlayer.init() -->

    <!-- Dependencies -->
    <script src="https://unpkg.com/nostr-tools@2.1.4/lib/nostr.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <script src="/js/session.js?v=2"></script>
    <script src="/js/sidebar.js?v=2"></script>
    <script src="/js/cache-api.js?v=1"></script>
    <script src="/js/nostr-social.js?v=3"></script>
    <script>
        // Register release card + library globals (used by onclick handlers in rendered HTML)
        window.expandReleaseCard = NostrSocial.expandReleaseCard;
        window.playFromReleaseCard = NostrSocial.playFromReleaseCard;
        window.addReleaseToLibrary = NostrSocial.addReleaseToLibrary;
        window.addPlaylistToLibrary = NostrSocial.addPlaylistToLibrary;
    </script>
    <script src="/js/nostr-dm.js?v=2"></script>
    <script src="/js/nostr-playlists.js?v=2"></script>
    <script src="/js/player.js?v=2"></script>
    <script src="/js/router.js?v=2"></script>

    <script>
        // Initialize the app shell
        SessionManager.init();
        EqualiserPlayer.init();

        // Load server config + user relays BEFORE sidebar/router so profile fetches use them
        (async () => {
            if (typeof NostrSocial !== 'undefined') {
                await NostrSocial.loadServerConfig();
            }
            if (SessionManager.hasSession() && typeof NostrSocial !== 'undefined') {
                await NostrSocial.loadUserRelays(SessionManager.getSession().publicKey);
            }
            ClientSidebar.init();
            Router.init();
        })();
    </script>
</body>
</html>
