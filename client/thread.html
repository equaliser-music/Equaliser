<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread - Equaliser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .thread-column {
            width: 100%;
            max-width: 640px;
            padding: 0;
        }

        /* Back Button */
        .thread-back {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .thread-back a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .thread-back a:hover {
            color: #a855f7;
        }

        .thread-back svg {
            width: 16px;
            height: 16px;
        }

        /* Root Post */
        .root-post {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .root-post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .root-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
            overflow: hidden;
        }

        .root-avatar a {
            display: contents;
        }

        .root-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .root-author-info {
            flex: 1;
        }

        .root-display-name {
            font-size: 16px;
            font-weight: 700;
        }

        .root-display-name a {
            color: inherit;
            text-decoration: none;
        }

        .root-display-name a:hover {
            color: #a855f7;
        }

        .root-handle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .root-content {
            font-size: 17px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 16px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .root-content a {
            color: #60a5fa;
            text-decoration: none;
        }

        .root-content a:hover {
            text-decoration: underline;
        }

        .root-time {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .root-stats {
            display: flex;
            gap: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
        }

        .root-stat {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .root-stat strong {
            color: #ffffff;
            font-weight: 700;
        }

        .root-actions {
            display: flex;
            align-items: center;
            gap: 48px;
            justify-content: center;
            padding: 8px 0;
        }

        .root-action {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .root-action:hover {
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
        }

        .root-action svg {
            width: 20px;
            height: 20px;
        }

        .root-action.like-btn.liked {
            color: #ef4444;
        }

        .root-action.repost-btn.reposted {
            color: #22c55e;
        }

        /* Reply Composer */
        .reply-composer {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .reply-composer-inner {
            display: flex;
            gap: 12px;
        }

        .reply-composer-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
            overflow: hidden;
        }

        .reply-composer-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reply-composer-body {
            flex: 1;
        }

        .reply-composer textarea {
            width: 100%;
            min-height: 60px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .reply-composer textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .reply-composer textarea:focus {
            border-color: rgba(168, 85, 247, 0.4);
        }

        .reply-composer-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .reply-btn-submit {
            padding: 6px 20px;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none;
            border-radius: 20px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reply-btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4);
        }

        .reply-btn-submit:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .reply-login {
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .reply-login a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 600;
        }

        .reply-login a:hover {
            text-decoration: underline;
        }

        /* Replies Section */
        .replies-header {
            padding: 16px 20px 12px;
            font-size: 15px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .reply-item {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .reply-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .reply-inner {
            display: flex;
            gap: 12px;
        }

        .reply-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
            overflow: hidden;
        }

        .reply-avatar a {
            display: contents;
        }

        .reply-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reply-body {
            flex: 1;
            min-width: 0;
        }

        .reply-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .reply-name {
            font-size: 14px;
            font-weight: 700;
        }

        .reply-name a {
            color: inherit;
            text-decoration: none;
        }

        .reply-name a:hover {
            color: #a855f7;
        }

        .reply-handle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .reply-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-left: auto;
        }

        .reply-content {
            font-size: 15px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .reply-content a {
            color: #60a5fa;
            text-decoration: none;
        }

        .reply-content a:hover {
            text-decoration: underline;
        }

        .reply-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: -6px;
        }

        .reply-action {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 16px;
            transition: all 0.2s;
        }

        .reply-action:hover {
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
        }

        .reply-action svg {
            width: 16px;
            height: 16px;
        }

        .reply-action.like-btn.liked {
            color: #ef4444;
        }

        /* Loading & Empty */
        .thread-loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .loading-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .thread-error {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .thread-error p {
            font-size: 15px;
            margin-bottom: 6px;
        }

        .thread-error a {
            color: #a855f7;
            text-decoration: none;
        }

        .thread-error a:hover {
            text-decoration: underline;
        }

        .replies-empty {
            padding: 40px 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .thread-column {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="thread-column">
                <div class="thread-back">
                    <a href="/social.html">
                        <svg viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
                        </svg>
                        Back
                    </a>
                </div>

                <div id="thread-content">
                    <div class="thread-loading">
                        <div class="loading-spinner"></div>
                        <div>Loading thread...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/nostr-tools@2.1.4/lib/nostr.bundle.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/nostr-social.js"></script>

    <script>
        // ===== State =====
        let rootEvent = null;
        let rootAuthorPubkey = null;
        let rootEventId = null;
        let threadReplies = [];
        let threadProfiles = new Map();
        let threadReactionData = { likes: {}, reposts: {}, userLiked: new Set(), userReposted: new Set() };
        let isReplying = false;

        const escapeHtml = NostrSocial.escapeHtml;

        // ===== Thread Loading =====

        async function loadThread() {
            const params = new URLSearchParams(window.location.search);
            rootEventId = params.get('id');
            if (!rootEventId) {
                showError('No thread ID provided');
                return;
            }

            // Fetch root event
            rootEvent = await NostrSocial.fetchEventById(rootEventId);
            if (!rootEvent) {
                showError('Thread not found');
                return;
            }
            rootAuthorPubkey = rootEvent.pubkey;

            // Fetch replies
            threadReplies = await NostrSocial.fetchThreadReplies(rootEventId);

            // Fetch all profiles
            const allPubkeys = new Set([rootEvent.pubkey, ...threadReplies.map(r => r.pubkey)]);
            threadProfiles = await NostrSocial.fetchProfiles([...allPubkeys]);

            renderThread();

            // Load reactions non-blocking
            const allIds = [rootEvent.id, ...threadReplies.map(r => r.id)];
            loadReactions(allIds);
        }

        function showError(msg) {
            document.getElementById('thread-content').innerHTML = `
                <div class="thread-error">
                    <p>${msg}</p>
                    <p><a href="/social.html">Back to feed</a></p>
                </div>
            `;
        }

        // ===== Rendering =====

        function renderThread() {
            const profile = threadProfiles.get(rootEvent.pubkey) || {};
            const name = profile.name || 'Nostr User';
            const initial = name.charAt(0).toUpperCase();
            const content = NostrSocial.linkifyContent(escapeHtml(rootEvent.content));

            let npub = '';
            try { npub = window.NostrTools.nip19.npubEncode(rootEvent.pubkey); } catch (e) {}

            const date = new Date(rootEvent.created_at * 1000);
            const timeStr = date.toLocaleDateString('en-GB', {
                day: 'numeric', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            const likeCount = threadReactionData.likes[rootEvent.id] || 0;
            const repostCount = threadReactionData.reposts[rootEvent.id] || 0;
            const userLiked = threadReactionData.userLiked.has(rootEvent.id);
            const userReposted = threadReactionData.userReposted.has(rootEvent.id);

            const session = SessionManager.getSession();

            let composerHtml = '';
            if (session) {
                composerHtml = `
                    <div class="reply-composer">
                        <div class="reply-composer-inner">
                            <div class="reply-composer-avatar" id="reply-avatar">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                            <div class="reply-composer-body">
                                <textarea id="reply-text" placeholder="Post your reply..." maxlength="1000"></textarea>
                                <div class="reply-composer-footer">
                                    <button class="reply-btn-submit" id="reply-submit-btn" disabled onclick="submitReply()">Reply</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                composerHtml = `
                    <div class="reply-login">
                        <a href="/login.html?return=${encodeURIComponent(window.location.href)}">Log in</a> to reply
                    </div>
                `;
            }

            let repliesHtml = '';
            if (threadReplies.length > 0) {
                repliesHtml = `
                    <div class="replies-header">${threadReplies.length} ${threadReplies.length === 1 ? 'Reply' : 'Replies'}</div>
                    ${threadReplies.map(reply => renderReply(reply)).join('')}
                `;
            } else {
                repliesHtml = `<div class="replies-empty">No replies yet. Be the first to reply!</div>`;
            }

            document.getElementById('thread-content').innerHTML = `
                <div class="root-post" data-note-id="${rootEvent.id}">
                    <div class="root-post-header">
                        <div class="root-avatar">
                            ${npub ? `<a href="/user.html?npub=${npub}">` : ''}
                            ${profile.picture
                                ? `<img src="${escapeHtml(profile.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${initial}'">`
                                : initial
                            }
                            ${npub ? '</a>' : ''}
                        </div>
                        <div class="root-author-info">
                            <div class="root-display-name">${npub ? `<a href="/user.html?npub=${npub}">${escapeHtml(name)}</a>` : escapeHtml(name)}</div>
                            <div class="root-handle">${npub ? npub.substring(0, 20) + '...' : ''}</div>
                        </div>
                    </div>
                    <div class="root-content">${content}</div>
                    <div class="root-time">${timeStr}</div>
                    <div class="root-stats">
                        <span class="root-stat"><strong class="reply-count-display">${threadReplies.length}</strong> ${threadReplies.length === 1 ? 'Reply' : 'Replies'}</span>
                        <span class="root-stat"><strong class="like-count-display">${likeCount}</strong> ${likeCount === 1 ? 'Like' : 'Likes'}</span>
                        <span class="root-stat"><strong class="repost-count-display">${repostCount}</strong> ${repostCount === 1 ? 'Repost' : 'Reposts'}</span>
                    </div>
                    <div class="root-actions">
                        <div class="root-action like-btn${userLiked ? ' liked' : ''}" onclick="handleLike('${rootEvent.id}', '${rootEvent.pubkey}')">
                            <svg viewBox="0 0 20 20" fill="${userLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5">
                                <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>
                            </svg>
                        </div>
                        <div class="root-action repost-btn${userReposted ? ' reposted' : ''}" onclick="handleRepost('${rootEvent.id}', '${rootEvent.pubkey}')">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M7 16V4m0 0L3 8m4-4l4 4M13 4v12m0 0l4-4m-4 4l-4-4"/>
                            </svg>
                        </div>
                    </div>
                </div>

                ${composerHtml}
                ${repliesHtml}
            `;

            // Setup composer events
            if (session) {
                setupReplyComposer();
                loadComposerAvatar(session.publicKey);
            }
        }

        function renderReply(reply) {
            const profile = threadProfiles.get(reply.pubkey) || {};
            const name = profile.name || 'Nostr User';
            const initial = name.charAt(0).toUpperCase();
            const time = NostrSocial.relativeTime(reply.created_at);
            const content = NostrSocial.linkifyContent(escapeHtml(reply.content));
            const likeCount = threadReactionData.likes[reply.id] || 0;
            const userLiked = threadReactionData.userLiked.has(reply.id);

            let npub = '';
            try { npub = window.NostrTools.nip19.npubEncode(reply.pubkey); } catch (e) {}

            return `
                <div class="reply-item" data-note-id="${reply.id}">
                    <div class="reply-inner">
                        <div class="reply-avatar">
                            ${npub ? `<a href="/user.html?npub=${npub}">` : ''}
                            ${profile.picture
                                ? `<img src="${escapeHtml(profile.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${initial}'">`
                                : initial
                            }
                            ${npub ? '</a>' : ''}
                        </div>
                        <div class="reply-body">
                            <div class="reply-header">
                                <span class="reply-name">${npub ? `<a href="/user.html?npub=${npub}">${escapeHtml(name)}</a>` : escapeHtml(name)}</span>
                                <span class="reply-handle">${npub ? npub.substring(0, 16) + '...' : ''}</span>
                                <span class="reply-time">${time}</span>
                            </div>
                            <div class="reply-content">${content}</div>
                            <div class="reply-actions">
                                <div class="reply-action like-btn${userLiked ? ' liked' : ''}" onclick="handleLike('${reply.id}', '${reply.pubkey}')">
                                    <svg viewBox="0 0 20 20" fill="${userLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5">
                                        <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>
                                    </svg>
                                    <span>${likeCount || ''}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== Reply Composer =====

        function setupReplyComposer() {
            const textarea = document.getElementById('reply-text');
            const submitBtn = document.getElementById('reply-submit-btn');
            if (!textarea || !submitBtn) return;

            textarea.addEventListener('input', () => {
                submitBtn.disabled = textarea.value.trim().length === 0 || isReplying;
            });

            textarea.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    if (!submitBtn.disabled) submitReply();
                }
            });
        }

        async function loadComposerAvatar(pubkey) {
            const profiles = await NostrSocial.fetchProfiles([pubkey]);
            const p = profiles.get(pubkey);
            const el = document.getElementById('reply-avatar');
            if (!el) return;
            if (p && p.picture) {
                el.innerHTML = `<img src="${escapeHtml(p.picture)}" alt="" onerror="this.style.display='none'">`;
            } else if (p && p.name) {
                const initials = p.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
                el.textContent = initials;
            }
        }

        async function submitReply() {
            const textarea = document.getElementById('reply-text');
            const submitBtn = document.getElementById('reply-submit-btn');
            const content = textarea.value.trim();
            if (!content || isReplying) return;

            const session = SessionManager.getSession();
            if (!session) return;

            isReplying = true;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Posting...';

            try {
                const tags = [
                    ['app', 'Equaliser'],
                    ['content-type', 'post'],
                    ['e', rootEventId, '', 'root'],
                    ['p', rootAuthorPubkey]
                ];

                const event = {
                    kind: 1,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: tags,
                    content: content
                };

                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                // Add to replies and re-render
                threadReplies.push(signedEvent);
                if (!threadProfiles.has(signedEvent.pubkey)) {
                    const profiles = await NostrSocial.fetchProfiles([signedEvent.pubkey]);
                    profiles.forEach((v, k) => threadProfiles.set(k, v));
                }

                textarea.value = '';
                renderThread();
            } catch (error) {
                console.error('Reply failed:', error);
                alert('Failed to post reply. Please try again.');
            } finally {
                isReplying = false;
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reply';
                }
            }
        }

        // ===== Reactions =====

        async function loadReactions(noteIds) {
            if (noteIds.length === 0) return;
            threadReactionData = await NostrSocial.fetchReactions(noteIds);
            renderThread();
        }

        async function handleLike(noteId, authorPubkey) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }
            if (threadReactionData.userLiked.has(noteId)) return;

            try {
                const event = {
                    kind: 7,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [['e', noteId], ['p', authorPubkey]],
                    content: '+'
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                threadReactionData.likes[noteId] = (threadReactionData.likes[noteId] || 0) + 1;
                threadReactionData.userLiked.add(noteId);
                renderThread();
            } catch (error) {
                console.error('Like failed:', error);
            }
        }

        async function handleRepost(noteId, authorPubkey) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }
            if (threadReactionData.userReposted.has(noteId)) return;

            try {
                const event = {
                    kind: 6,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [['e', noteId, NostrSocial.DEFAULT_RELAYS[0]], ['p', authorPubkey]],
                    content: ''
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                threadReactionData.reposts[noteId] = (threadReactionData.reposts[noteId] || 0) + 1;
                threadReactionData.userReposted.add(noteId);
                renderThread();
            } catch (error) {
                console.error('Repost failed:', error);
            }
        }

        // ===== Init =====

        SessionManager.init();
        ClientSidebar.init();
        loadThread().catch(err => {
            console.error('Failed to load thread:', err);
            showError('Could not load thread. <a href="/social.html">Back to feed</a>');
        });
    </script>
</body>
</html>
