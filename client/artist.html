<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist - Equaliser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--eq-font-body);
            background: var(--eq-bg-app);
            color: var(--eq-text-1);
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 240px;
            padding-bottom: 100px;
        }

        /* Banner */
        .artist-banner {
            width: 100%;
            height: 300px;
            background: var(--eq-grad-user-banner);
            position: relative;
            overflow: hidden;
        }

        .artist-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .artist-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: var(--eq-grad-banner-fade);
        }

        /* Artist Header */
        .artist-header {
            padding: 0 32px;
            margin-top: -80px;
            position: relative;
            z-index: 1;
            display: flex;
            gap: 24px;
            align-items: flex-end;
        }

        .artist-avatar {
            width: 180px;
            height: 180px;
            border-radius: var(--eq-radius-round);
            background: var(--eq-grad-avatar);
            border: var(--eq-border-avatar);
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: 700;
        }

        .artist-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .artist-info {
            padding-bottom: 16px;
        }

        .artist-name {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 8px;
            background: var(--eq-grad-display-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .artist-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--eq-text-2-dim);
            font-size: 14px;
            flex-wrap: wrap;
        }

        .artist-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .genre-tag {
            background: var(--eq-accent-soft-20);
            color: var(--eq-accent);
            padding: 4px 12px;
            border-radius: var(--eq-radius-3xl);
            font-size: 12px;
            font-weight: 500;
        }

        .npub-tag {
            background: var(--eq-border-10);
            color: var(--eq-text-2-dim);
            padding: 4px 12px;
            border-radius: var(--eq-radius-3xl);
            font-size: 11px;
            font-family: var(--eq-font-mono);
            cursor: pointer;
            transition: all var(--eq-dur-quick);
        }

        .npub-tag:hover {
            background: var(--eq-border-15);
            color: var(--eq-text-strong);
        }

        /* Artist Actions */
        .artist-actions {
            padding: 24px 32px;
            display: flex;
            gap: 12px;
        }

        .artist-follow-stats {
            padding: 0 32px 20px;
            display: flex;
            gap: 20px;
        }
        .artist-follow-stat {
            font-size: 14px;
            color: var(--eq-text-3);
        }
        .artist-follow-stat strong {
            color: var(--eq-text-1);
            font-weight: 600;
        }

        .btn {
            padding: 12px 32px;
            border-radius: var(--eq-radius-24);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--eq-dur-quick);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border: var(--eq-btn-border);
        }

        .btn-primary {
            background: var(--eq-grad-accent);
            color: var(--eq-text-1);
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-secondary {
            background: var(--eq-border-10);
            color: var(--eq-text-1);
            border: var(--eq-border-strong);
        }

        .btn-secondary:hover {
            background: var(--eq-border-15);
        }

        .btn-following {
            background: var(--eq-accent-soft);
            color: var(--eq-accent);
            border: 1px solid var(--eq-accent-soft-40);
            padding: 12px 32px;
            border-radius: var(--eq-radius-24);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--eq-dur-quick);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-following:hover {
            background: var(--eq-danger-soft-15);
            color: var(--eq-danger);
            border-color: var(--eq-danger-soft-40);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Discography */
        .discography-section {
            padding: 0 32px 32px;
        }

        .discography-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .release-card {
            background: var(--eq-surface-1);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-2xl);
            padding: 14px;
            cursor: pointer;
            transition: all var(--eq-dur-med);
        }

        .release-card:hover {
            background: var(--eq-surface-1-hover);
            border-color: var(--eq-border-10);
            transform: translateY(-4px);
        }

        .release-cover {
            width: 100%;
            aspect-ratio: 1;
            background: var(--eq-grad-accent);
            border-radius: var(--eq-radius-xl);
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .release-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .release-play-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 44px;
            height: 44px;
            background: var(--eq-grad-accent);
            border-radius: var(--eq-radius-round);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all var(--eq-dur-med);
            box-shadow: var(--eq-shadow-play-btn-sm);
            border: none;
            cursor: pointer;
        }

        .release-play-btn svg {
            fill: white;
        }

        .release-card:hover .release-play-btn {
            opacity: 1;
        }

        .release-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .release-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 6px;
        }

        .release-type {
            font-size: 11px;
            color: var(--eq-text-3);
        }

        .release-price {
            font-size: 12px;
            color: var(--eq-accent);
            font-weight: 600;
        }

        .release-year {
            font-size: 11px;
            color: var(--eq-text-4);
        }

        /* Phase G — label badge surfaced on releases signed by a label (managed or signed). */
        .release-label-badge {
            margin-top: 6px;
            display: inline-block;
            padding: 2px 8px;
            border-radius: var(--eq-badge-radius);
            background: var(--eq-accent-tint-15);
            color: var(--eq-accent-light);
            font-size: 11px;
            font-weight: 500;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .discography-loading {
            padding: 32px;
            text-align: center;
            color: var(--eq-text-4);
            font-size: 14px;
        }

        .discography-empty {
            padding: 32px;
            text-align: center;
            color: var(--eq-text-4);
        }

        .discography-empty svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .discography-empty p {
            font-size: 14px;
        }

        /* Track List (expanded release) */
        .release-tracklist {
            padding: 0 32px 32px;
        }

        .tracklist-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .tracklist-cover {
            width: 80px;
            height: 80px;
            border-radius: var(--eq-radius-lg);
            overflow: hidden;
            background: var(--eq-grad-accent);
            flex-shrink: 0;
        }

        .tracklist-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tracklist-info h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tracklist-info span {
            font-size: 13px;
            color: var(--eq-text-3);
        }

        .tracklist-items {
            list-style: none;
        }

        .tracklist-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 12px;
            border-radius: var(--eq-radius-md);
            transition: background var(--eq-dur-quick);
        }

        .tracklist-item:hover {
            background: var(--eq-surface-2);
        }

        .tracklist-num {
            width: 24px;
            text-align: center;
            font-size: 13px;
            color: var(--eq-text-4);
        }

        .tracklist-title {
            flex: 1;
            font-size: 14px;
        }

        .tracklist-duration {
            font-size: 13px;
            color: var(--eq-text-4);
            font-family: var(--eq-font-mono);
        }

        .tracklist-price {
            font-size: 12px;
            color: var(--eq-accent);
            font-weight: 600;
        }

        .tracklist-item .track-add-playlist {
            background: none;
            border: 1px solid var(--eq-border-15);
            color: var(--eq-text-3);
            width: 24px;
            height: 24px;
            border-radius: var(--eq-radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity var(--eq-dur-fast), color var(--eq-dur-fast), border-color var(--eq-dur-fast);
            margin-left: 8px;
        }

        .tracklist-item:hover .track-add-playlist { opacity: 1; }
        .tracklist-item .track-add-playlist:hover { color: var(--eq-accent); border-color: var(--eq-accent); }

        /* Two-column body layout */
        .artist-body {
            display: flex;
            gap: 32px;
            padding: 0 32px 32px;
        }

        .artist-body-left {
            flex: 1;
            min-width: 0;
        }

        .artist-body-right {
            width: 360px;
            flex-shrink: 0;
        }

        /* Override section padding when inside body columns */
        .artist-body-left .discography-section,
        .artist-body-left .release-tracklist,
        .artist-body-left .artist-bio,
        .artist-body-left .info-section {
            padding-left: 0;
            padding-right: 0;
        }

        .artist-body-left .section-header {
            padding-left: 0;
            padding-right: 0;
        }

        /* Feed */
        .feed-section {
            position: sticky;
            top: 0;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .feed-title {
            font-size: 18px;
            font-weight: 700;
        }

        .feed-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feed-item {
            background: var(--eq-surface-1);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-xl);
            padding: 16px;
            transition: border-color var(--eq-dur-quick);
        }

        .feed-item:hover {
            border-color: var(--eq-border-10);
        }

        .feed-item-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .feed-avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--eq-radius-round);
            background: var(--eq-grad-avatar);
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }

        .feed-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .feed-author-name {
            font-size: 13px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .feed-time {
            font-size: 11px;
            color: var(--eq-text-mute);
            flex-shrink: 0;
        }

        .feed-content {
            font-size: 14px;
            line-height: 1.6;
            color: var(--eq-text-bright);
            word-break: break-word;
            white-space: pre-wrap;
        }

        .feed-content a {
            color: var(--eq-accent);
            text-decoration: none;
        }

        .feed-content a:hover {
            text-decoration: underline;
        }

        .feed-actions {
            display: flex;
            gap: 4px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: var(--eq-divider);
        }

        .feed-action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--eq-text-mute);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: var(--eq-radius-sm);
            transition: all var(--eq-dur-quick);
        }

        .feed-action-btn:hover {
            background: var(--eq-surface-2);
        }

        .feed-action-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .feed-action-btn.like-btn:hover,
        .feed-action-btn.like-btn.liked {
            color: var(--eq-danger);
        }

        .feed-action-btn.like-btn.liked svg {
            fill: var(--eq-danger);
        }

        .feed-action-btn.repost-btn:hover,
        .feed-action-btn.repost-btn.reposted {
            color: var(--eq-success-2);
        }

        .feed-empty {
            text-align: center;
            padding: 40px 16px;
            color: var(--eq-text-mute);
        }

        .feed-empty svg {
            width: 40px;
            height: 40px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .feed-empty p {
            font-size: 13px;
        }

        .feed-loading {
            text-align: center;
            padding: 32px 16px;
            color: var(--eq-text-4);
            font-size: 13px;
        }

        @media (max-width: 1100px) {
            .artist-body {
                flex-direction: column;
            }
            .artist-body-right {
                width: 100%;
            }
            .feed-section {
                position: static;
                max-height: none;
            }
        }

        /* Bio Section */
        .artist-bio {
            padding: 0 32px 32px;
        }

        .bio-text {
            color: var(--eq-text-strong);
            line-height: 1.7;
            font-size: 15px;
            max-width: 800px;
            white-space: pre-wrap;
        }

        /* Section Headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 32px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
        }

        /* Info Card */
        .info-section {
            padding: 0 32px 32px;
        }

        .info-card {
            background: var(--eq-surface-1);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-2xl);
            padding: 24px;
            max-width: 600px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: var(--eq-divider);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--eq-text-3);
            font-size: 14px;
        }

        .info-value {
            color: var(--eq-text-1);
            font-size: 14px;
            font-family: var(--eq-font-mono);
            word-break: break-all;
            text-align: right;
            max-width: 300px;
        }

        /* Loading State */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: var(--eq-text-3);
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--eq-border-10);
            border-top-color: var(--eq-accent-2);
            border-radius: var(--eq-radius-round);
            animation: spin var(--eq-dur-spin-1s) linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            text-align: center;
            padding: 60px;
        }

        .error-title {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .error-message {
            color: var(--eq-text-3);
            margin-bottom: 24px;
        }

        /* Search Form */
        .search-section {
            padding: 32px;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .search-subtitle {
            color: var(--eq-text-3);
            margin-bottom: 24px;
            text-align: center;
        }

        .search-form {
            display: flex;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            padding: 14px 20px;
            background: var(--eq-surface-input);
            border: var(--eq-border);
            border-radius: var(--eq-radius-xl);
            color: var(--eq-text-1);
            font-size: 14px;
            font-family: var(--eq-font-mono);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--eq-accent-2);
            background: var(--eq-accent-soft-10);
        }

        .search-input::placeholder {
            color: var(--eq-text-faint);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .artist-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .artist-avatar {
                width: 120px;
                height: 120px;
                font-size: 48px;
            }
            .artist-name {
                font-size: 32px;
            }
            .artist-meta {
                justify-content: center;
            }
        }

        /* === eq extracted inline styles (A10) === */
        .eq-clickable {
            cursor: pointer;
        }

        .eq-link-accent {
            color: var(--eq-accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar injected by ClientSidebar.init() -->
        <div class="sidebar"></div>

        <!-- Main Content -->
        <div class="main-content" id="main-content">
            <!-- Initial state: Search form -->
            <div class="search-section" id="search-section">
                <h2 class="search-title">Find Artist</h2>
                <p class="search-subtitle">Enter an npub to view an artist's profile from the NOSTR relay</p>
                <form class="search-form" onsubmit="searchArtist(event)">
                    <input type="text" class="search-input" id="npub-input" placeholder="npub1..." value="">
                    <button type="submit" class="btn btn-primary">View Profile</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/nostr-tools@2.1.4/lib/nostr.bundle.js"></script>
    <script src="/common/js/session.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/nostr-social.js"></script>

    <script>
        // Configuration — use shared relay list from NostrSocial
        const DEFAULT_RELAYS = NostrSocial.DEFAULT_RELAYS;

        // State
        let artistProfile = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            SessionManager.init();
            ClientSidebar.init();

            // Check URL for npub parameter
            const urlParams = new URLSearchParams(window.location.search);
            const npub = urlParams.get('npub');

            if (npub) {
                document.getElementById('npub-input').value = npub;
                loadArtist(npub);
            }
        });

        // Search artist
        function searchArtist(event) {
            event.preventDefault();
            const npub = document.getElementById('npub-input').value.trim();

            if (!npub) {
                alert('Please enter an npub');
                return;
            }

            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('npub', npub);
            window.history.pushState({}, '', url);

            loadArtist(npub);
        }

        // Load artist from NOSTR relay
        async function loadArtist(npub) {
            const mainContent = document.getElementById('main-content');

            // Show loading state
            mainContent.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>Loading artist profile from NOSTR relay...</span>
                </div>
            `;

            try {
                // Decode npub to hex pubkey
                let pubkeyHex;
                try {
                    const decoded = NostrTools.nip19.decode(npub);
                    if (decoded.type !== 'npub') {
                        throw new Error('Invalid npub format');
                    }
                    pubkeyHex = decoded.data;
                } catch (e) {
                    throw new Error('Invalid npub format. Expected npub1...');
                }

                // Connect to relay and fetch Kind 0 event
                const profile = await fetchProfile(pubkeyHex);

                if (!profile) {
                    throw new Error('Artist not found on relay');
                }

                artistProfile = profile;
                renderArtist(npub, pubkeyHex);

            } catch (error) {
                console.error('Error loading artist:', error);
                mainContent.innerHTML = `
                    <div class="error">
                        <h2 class="error-title">Could not load artist</h2>
                        <p class="error-message">${error.message}</p>
                        <button class="btn btn-secondary" onclick="showSearch()">Try Again</button>
                    </div>
                `;
            }
        }

        // Fetch profile from a single relay
        async function fetchProfile(pubkeyHex) {
            // Try Cache API first (REST — no WebSocket needed)
            if (typeof CacheAPI !== 'undefined') {
                try {
                    const events = await CacheAPI.queryEvents({ kinds: [0], authors: [pubkeyHex], limit: 1 });
                    if (events && events.length > 0) {
                        const profile = JSON.parse(events[0].content);
                        profile._event = events[0];
                        return profile;
                    }
                } catch (e) {}
            }

            // Fallback: WebSocket via NostrSocial
            const events = await NostrSocial.queryRelays({ kinds: [0], authors: [pubkeyHex], limit: 1 });
            if (events && events.length > 0) {
                try {
                    const profile = JSON.parse(events[0].content);
                    profile._event = events[0];
                    return profile;
                } catch (e) {}
            }
            return null;
        }

        function renderArtist(npub, pubkeyHex) {

                    <span class="artist-follow-stat" style="cursor:pointer" onclick="NostrSocial.showFollowListModal(document.getElementById('artist-follow-stats').dataset.pubkey, 'followers')"><strong id="artist-followers-count">0</strong> Followers</span>

                <!-- Two-column body -->
                <div class="artist-body">
                    <div class="artist-body-left">

                        <!-- Profile Info -->
                        <div class="info-section">
                            <div class="section-header">

                                        <span class="info-label">Website</span>
                                        <span class="info-value"><a href="${profile.website}" target="_blank" style="color: #a855f7;" data-eq-allow="dead-script">${profile.website}</a></span>

                                        <span class="info-label">Joined Equaliser</span>

                    <!-- Feed -->
                    <div class="artist-body-right">
                        <div class="feed-section">
                            <div class="feed-header">
                                <h3 class="feed-title">Posts</h3>

            // Update page title
            document.title = `${profile.name || 'Artist'} - Equaliser`;

            // Check follow status (async, updates button when ready)
            if (!isOwnProfile(pubkeyHex)) {
                checkFollowStatus(pubkeyHex);

            // Load discography, feed, and follow counts in parallel
            loadDiscography(pubkeyHex);
            loadFeed(pubkeyHex);
            loadFollowCounts(pubkeyHex);

        // Show search form
        function showSearch() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="search-section" id="search-section">
                    <h2 class="search-title">Find Artist</h2>
                    <p class="search-subtitle">Enter an npub to view an artist's profile from the NOSTR relay</p>
                    <form class="search-form" onsubmit="searchArtist(event)">
                        <input type="text" class="search-input" id="npub-input" placeholder="npub1..." value="">
                        <button type="submit" class="btn btn-primary">View Profile</button>
                    </form>
                </div>
            `;

            // Clear URL parameter
            const url = new URL(window.location);
            url.searchParams.delete('npub');
            window.history.pushState({}, '', url);

            document.title = 'Artist - Equaliser';
        }

        // Copy npub to clipboard
        async function copyNpub(npub) {
            try {
                await navigator.clipboard.writeText(npub);
                alert('npub copied to clipboard!');
            } catch (err) {
                console.error('Copy failed:', err);
            }
        }

        const escapeHtml = NostrSocial.escapeHtml;

        // ==================== Discography ====================

        let artistReleases = []; // Grouped albums/singles
        let selectedReleaseIndex = -1;

        // Fetch Kind 30050 events for a specific artist
        async function fetchArtistTracks(pubkeyHex) {
            // Phase G — use denormalized tracks endpoint so we pick up performer-tagged events
            // (event.pubkey = label, artist_pubkey = performer). Also surfaces label_pubkey.
            if (typeof CacheAPI !== 'undefined') {
                try {
                    const tracks = await CacheAPI.getTracksByArtist(pubkeyHex);
                    if (tracks) {
                        return tracks.map(t => {
                            const ev = t.raw_event || {};
                            ev.__labelPubkey = t.label_pubkey || null;
                            return ev;
                        });
                    }
                } catch (e) {}
            }
            // Secondary: raw events query (only catches self-published)
            if (typeof CacheAPI !== 'undefined') {
                try {
                    const events = await CacheAPI.queryEvents({ kinds: [30050], authors: [pubkeyHex], limit: 500 });
                    if (events) return events;
                } catch (e) {}
            }

            // Fallback: WebSocket via NostrSocial
            const events = await NostrSocial.queryRelays({ kinds: [30050], authors: [pubkeyHex], limit: 500 });
            return events || [];
        }

        function getTagValue(tags, name) {
            const tag = tags.find(t => t[0] === name);
            return tag ? tag[1] : null;
        }

        function parseTrackEvent(event) {
            // Phase G — derive label_pubkey: signer if delegation OR performer tag present.
            // Prefer the denormalized __labelPubkey if attached upstream.
            let labelPubkey = event.__labelPubkey || null;
            if (!labelPubkey) {
                const tags = event.tags || [];
                const hasDelegation = tags.some(t => t[0] === 'delegation' && t.length >= 4);
                const performerTag = tags.find(t => t[0] === 'p' && t[3] === 'performer');
                if (hasDelegation) labelPubkey = event.pubkey;
                else if (performerTag && performerTag[1] && performerTag[1] !== event.pubkey) labelPubkey = event.pubkey;
            }
            return {
                eventId: event.id,
                pubkey: event.pubkey,
                createdAt: event.created_at,
                d: getTagValue(event.tags, 'd') || '',
                title: getTagValue(event.tags, 'title') || 'Untitled',
                artist: getTagValue(event.tags, 'artist') || 'Unknown',
                album: getTagValue(event.tags, 'album') || '',
                releaseType: getTagValue(event.tags, 'release_type') || 'single',
                genre: getTagValue(event.tags, 'genre') || '',
                duration: parseInt(getTagValue(event.tags, 'duration')) || 0,
                previewCid: getTagValue(event.tags, 'ipfs_preview_cid') || '',
                priceAmount: getTagValue(event.tags, 'price') || '',
                priceCurrency: getTagValue(event.tags, 'price_currency') || 'SAT',
                releaseDate: getTagValue(event.tags, 'release_date') || '',
                coverArtCid: getTagValue(event.tags, 'cover_art_cid') || '',
                blossomCoverHash: getTagValue(event.tags, 'blossom_cover_hash') || '',
                blossomCoverUrl: getTagValue(event.tags, 'blossom_cover_url') || '',
                trackNumber: parseInt(getTagValue(event.tags, 'track_number')) || 0,
                labelPubkey
            };
        }

        function groupTracksIntoReleases(trackEvents) {
            const parsed = trackEvents.map(parseTrackEvent);
            const albumMap = new Map();

            parsed.forEach(track => {
                const isAlbumOrEp = track.album && track.releaseType !== 'single';
                const albumKey = isAlbumOrEp
                    ? `${track.pubkey}:${track.album}`
                    : `${track.pubkey}:single:${track.d}`;

                if (!albumMap.has(albumKey)) {
                    albumMap.set(albumKey, {
                        title: isAlbumOrEp ? track.album : track.title,
                        artist: track.artist,
                        pubkey: track.pubkey,
                        releaseType: track.releaseType,
                        genre: track.genre,
                        releaseDate: track.releaseDate,
                        coverArtCid: track.coverArtCid,
                        blossomCoverHash: track.blossomCoverHash,
                        blossomCoverUrl: track.blossomCoverUrl,
                        tracks: [],
                        createdAt: track.createdAt,
                        isSingle: !isAlbumOrEp,
                        labelPubkey: null  // Phase G — pubkey of the label that signed (if any)
                    });
                }

                const album = albumMap.get(albumKey);
                album.tracks.push(track);

                if (!album.blossomCoverUrl && track.blossomCoverUrl) {
                    album.blossomCoverUrl = track.blossomCoverUrl;
                }
                if (!album.blossomCoverHash && track.blossomCoverHash) {
                    album.blossomCoverHash = track.blossomCoverHash;
                }
                if (!album.coverArtCid && track.coverArtCid) {
                    album.coverArtCid = track.coverArtCid;
                }
                if (track.createdAt > album.createdAt) {
                    album.createdAt = track.createdAt;
                }
                if (!album.labelPubkey && track.labelPubkey) {
                    album.labelPubkey = track.labelPubkey;
                }
            });

            // Sort tracks within albums by track_number
            albumMap.forEach(album => {
                album.tracks.sort((a, b) => a.trackNumber - b.trackNumber);
            });

            // Return sorted by newest first
            return Array.from(albumMap.values())
                .sort((a, b) => b.createdAt - a.createdAt);
        }

        function getCoverUrl(blossomUrl, blossomHash, ipfsCid) {
            if (blossomUrl) return blossomUrl;
            if (blossomHash) return `/blossom/${blossomHash}`;
            if (ipfsCid) return `/ipfs/${ipfsCid}`;
            return null;
        }

        function formatPrice(amount, currency) {
            if (!amount || amount === '0') return '';
            const symbols = { USD: '$', GBP: '\u00a3', EUR: '\u20ac', JPY: '\u00a5', SAT: '' };
            const sym = symbols[currency] || '';
            if (currency === 'SAT') return `${amount} sats`;
            return `${sym}${amount}`;
        }

        function formatDuration(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        async function loadDiscography(pubkeyHex) {
            const container = document.getElementById('discography-content');
            if (!container) return;

            const allTracks = await fetchArtistTracks(pubkeyHex);

            if (allTracks.length === 0) {
                container.innerHTML = `
                    <div class="discography-empty">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/>
                        </svg>
                        <p>No releases yet</p>
                    </div>
                `;
                return;
            }

            artistReleases = groupTracksIntoReleases(allTracks);
            renderDiscography();
        }

        // Phase G \u2014 cache for label pubkey \u2192 display name
        const _labelNames = {};

        async function resolveLabelNames(pubkeys) {
            const unresolved = pubkeys.filter(p => !(p in _labelNames));
            if (!unresolved.length) return;
            unresolved.forEach(p => { _labelNames[p] = null; });
            if (typeof CacheAPI === 'undefined') return;

            // 1) Try the denormalized profiles endpoint (fast path \u2014 covers listeners + artists)
            try {
                const profiles = await CacheAPI.getProfiles(unresolved);
                if (profiles) {
                    Object.entries(profiles).forEach(([pk, data]) => {
                        try {
                            const profile = typeof data?.content === 'string'
                                ? JSON.parse(data.content)
                                : (data?.content || {});
                            const name = profile.display_name || profile.name;
                            if (name) _labelNames[pk] = name;
                        } catch (_) {}
                    });
                }
            } catch (_) {}

            // 2) Fall back to raw Kind 0 events for anyone still unresolved (covers labels \u2014
            //    labels don't sit in cached_users / cached_artists denorm tables)
            const stillMissing = unresolved.filter(p => !_labelNames[p]);
            if (stillMissing.length) {
                try {
                    const events = await CacheAPI.queryEvents({ kinds: [0], authors: stillMissing, limit: stillMissing.length });
                    if (events) {
                        events.forEach(ev => {
                            try {
                                const profile = JSON.parse(ev.content || '{}');
                                const name = profile.display_name || profile.name;
                                if (name) _labelNames[ev.pubkey] = name;
                            } catch (_) {}
                        });
                    }
                } catch (_) {}
            }

            // 3) Truncated pubkey as last resort
            unresolved.forEach(p => { if (!_labelNames[p]) _labelNames[p] = `${p.slice(0, 8)}\u2026`; });
        }

        function renderDiscography() {
            const container = document.getElementById('discography-content');
            if (!container) return;

            // Phase G \u2014 resolve label names for any release that has a label_pubkey, then re-render.
            const unresolvedLabels = [...new Set(artistReleases.map(r => r.labelPubkey).filter(Boolean))]
                .filter(p => !(p in _labelNames));
            if (unresolvedLabels.length > 0) {
                unresolvedLabels.forEach(p => { _labelNames[p] = null; });
                resolveLabelNames(unresolvedLabels).then(() => renderDiscography());
            }

            container.innerHTML = `<div class="discography-grid">
                ${artistReleases.map((release, index) => {
                    const coverUrl = getCoverUrl(release.blossomCoverUrl, release.blossomCoverHash, release.coverArtCid);
                    const ipfsFallback = release.coverArtCid && coverUrl !== `/ipfs/${release.coverArtCid}` ? ` data-fallback="/ipfs/${release.coverArtCid}"` : '';
                    const trackCount = release.tracks.length;
                    const typeLabel = release.isSingle ? 'Single' : (release.releaseType === 'ep' ? 'EP' : 'Album');
                    const countLabel = release.isSingle ? 'Single' : `${typeLabel} \u00b7 ${trackCount} track${trackCount !== 1 ? 's' : ''}`;
                    const price = release.tracks[0] ? formatPrice(release.tracks[0].priceAmount, release.tracks[0].priceCurrency) : '';
                    const year = release.releaseDate ? release.releaseDate.substring(0, 4) : '';
                    const labelName = release.labelPubkey
                        ? (_labelNames[release.labelPubkey] || `${release.labelPubkey.slice(0, 8)}\u2026`)
                        : null;
                    const labelBadge = labelName
                        ? `<div class="release-label-badge" title="Published by ${escapeHtml(labelName)}">${escapeHtml(labelName)}</div>`
                        : '';

                    return `
                        <div class="release-card" onclick="selectRelease(${index})">
                            <div class="release-cover">
                                ${coverUrl ? `<img src="${coverUrl}" alt="${escapeHtml(release.title)}"${ipfsFallback} onerror="if(this.dataset.fallback){this.onerror=null;this.src=this.dataset.fallback}else{this.style.display='none'}">` : ''}
                                <button class="release-play-btn" onclick="event.stopPropagation(); selectRelease(${index})">
                                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
                                        <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="release-title">${escapeHtml(release.title)}</div>
                            <div class="release-meta">
                                <span class="release-type">${countLabel}${year ? ` \u00b7 ${year}` : ''}</span>
                                ${price ? `<span class="release-price">${price}</span>` : ''}
                            </div>
                            ${labelBadge}
                        </div>
                    `;
                }).join('')}
            </div>`;
        }

        function selectRelease(index) {
            const release = artistReleases[index];
            if (!release) return;

            const tracklist = document.getElementById('release-tracklist');

            // Toggle off if already selected
            if (selectedReleaseIndex === index) {
                selectedReleaseIndex = -1;
                tracklist.style.display = 'none';
                return;
            }

            selectedReleaseIndex = index;
            const coverUrl = getCoverUrl(release.blossomCoverUrl, release.blossomCoverHash, release.coverArtCid);
            const ipfsFallback = release.coverArtCid && coverUrl !== `/ipfs/${release.coverArtCid}` ? ` data-fallback="/ipfs/${release.coverArtCid}"` : '';
            const totalSeconds = release.tracks.reduce((sum, t) => sum + t.duration, 0);
            const trackCount = release.tracks.length;

            tracklist.innerHTML = `
                <div class="tracklist-header">
                    <div class="tracklist-cover">
                        ${coverUrl ? `<img src="${coverUrl}" alt="${escapeHtml(release.title)}"${ipfsFallback} onerror="if(this.dataset.fallback){this.onerror=null;this.src=this.dataset.fallback}else{this.style.display='none'}">` : ''}
                    </div>
                    <div class="tracklist-info">
                        <h3>${escapeHtml(release.title)}</h3>
                        <span>${trackCount} track${trackCount !== 1 ? 's' : ''} \u00b7 ${Math.floor(totalSeconds / 60)} min</span>
                    </div>
                </div>
                <ul class="tracklist-items">
                    ${release.tracks.map((track, i) => {
                        const price = formatPrice(track.priceAmount, track.priceCurrency);
                        return `
                            <li class="tracklist-item">
                                <span class="tracklist-num">${i + 1}</span>
                                <span class="tracklist-title">${escapeHtml(track.title)}</span>
                                ${price ? `<span class="tracklist-price">${price}</span>` : ''}
                                <span class="tracklist-duration">${track.duration ? formatDuration(track.duration) : ''}</span>
                            </li>
                        `;
                    }).join('')}
                </ul>
            `;
            tracklist.style.display = '';

            // Scroll to tracklist
            tracklist.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ==================== Feed ====================

        // Feed state
        let feedNotes = []; // Raw note events for repost content
        let reactionData = { likes: {}, reposts: {}, userLiked: new Set(), userReposted: new Set() };

        async function loadFeed(pubkeyHex) {
            const container = document.getElementById('feed-content');
            if (!container) return;

            let allNotes = await NostrSocial.fetchNotes({ kinds: [1], authors: [pubkeyHex], limit: 50 });

            // Only show Equaliser-tagged events
            allNotes = allNotes.filter(n => NostrSocial.isEqualiiserEvent(n));

            if (allNotes.length === 0) {
                container.innerHTML = `
                    <div class="feed-empty">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
                        </svg>
                        <p>No posts yet</p>
                    </div>
                `;
                return;
            }

            feedNotes = allNotes;
            renderFeed(allNotes);

            // Fetch reactions in background
            const noteIds = allNotes.map(n => n.id);
            loadReactions(noteIds);
        }

        function renderFeed(notes) {
            const container = document.getElementById('feed-content');
            if (!container) return;

            const profile = artistProfile || {};
            const avatarInitial = (profile.name || 'A').charAt(0).toUpperCase();

            container.innerHTML = `<div class="feed-items">
                ${notes.map(note => {
                    const content = NostrSocial.linkifyContent(escapeHtml(note.content));
                    const time = NostrSocial.relativeTime(note.created_at);
                    const likeCount = reactionData.likes[note.id] || 0;
                    const repostCount = reactionData.reposts[note.id] || 0;
                    const userLiked = reactionData.userLiked.has(note.id);
                    const userReposted = reactionData.userReposted.has(note.id);

                    return `
                        <div class="feed-item" data-note-id="${note.id}">
                            <div class="feed-item-header">
                                <div class="feed-avatar">
                                    ${profile.picture
                                        ? `<img src="${profile.picture}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${avatarInitial}'">`
                                        : avatarInitial
                                    }
                                </div>
                                <span class="feed-author-name">${escapeHtml(profile.name || 'Artist')}</span>
                                <span class="feed-time">${time}</span>
                            </div>
                            <div class="feed-content">${content}</div>
                            <div class="feed-actions">
                                <button class="feed-action-btn like-btn${userLiked ? ' liked' : ''}" onclick="handleLike('${note.id}', '${note.pubkey}')">
                                    <svg viewBox="0 0 20 20" fill="${userLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5">
                                        <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>
                                    </svg>
                                    <span class="like-count">${likeCount || ''}</span>
                                </button>
                                <button class="feed-action-btn repost-btn${userReposted ? ' reposted' : ''}" onclick="handleRepost('${note.id}', '${note.pubkey}')">
                                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M7 16V4m0 0L3 8m4-4l4 4M13 4v12m0 0l4-4m-4 4l-4-4"/>
                                    </svg>
                                    <span class="repost-count">${repostCount || ''}</span>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>`;
        }

        async function loadReactions(noteIds) {
            if (noteIds.length === 0) return;
            reactionData = await NostrSocial.fetchReactions(noteIds);
            updateReactionUI();
        }

        function updateReactionUI() {
            document.querySelectorAll('.feed-item').forEach(item => {
                const noteId = item.dataset.noteId;
                if (!noteId) return;

                const likeBtn = item.querySelector('.like-btn');
                const repostBtn = item.querySelector('.repost-btn');

                if (likeBtn) {
                    const count = reactionData.likes[noteId] || 0;
                    likeBtn.querySelector('.like-count').textContent = count || '';
                    const liked = reactionData.userLiked.has(noteId);
                    likeBtn.classList.toggle('liked', liked);
                    const svg = likeBtn.querySelector('svg');
                    svg.setAttribute('fill', liked ? 'currentColor' : 'none');
                }

                if (repostBtn) {
                    const count = reactionData.reposts[noteId] || 0;
                    repostBtn.querySelector('.repost-count').textContent = count || '';
                    repostBtn.classList.toggle('reposted', reactionData.userReposted.has(noteId));
                }
            });
        }

        // Like a note (Kind 7 reaction)
        async function handleLike(noteId, authorPubkey) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }

            // Already liked — do nothing (NIP-25 doesn't define unlike)
            if (reactionData.userLiked.has(noteId)) return;

            try {
                const event = {
                    kind: 7,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [
                        ['e', noteId],
                        ['p', authorPubkey]
                    ],
                    content: '+'
                };

                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                reactionData.likes[noteId] = (reactionData.likes[noteId] || 0) + 1;
                reactionData.userLiked.add(noteId);
                updateReactionUI();
            } catch (error) {
                console.error('Like failed:', error);
            }
        }

        // Repost a note (Kind 6)
        async function handleRepost(noteId, authorPubkey) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }

            if (reactionData.userReposted.has(noteId)) return;

            try {
                const originalNote = feedNotes.find(n => n.id === noteId);
                const event = {
                    kind: 6,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [['e', noteId, DEFAULT_RELAYS[0]], ['p', authorPubkey]],
                    content: originalNote ? JSON.stringify(originalNote) : ''
                };

                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                reactionData.reposts[noteId] = (reactionData.reposts[noteId] || 0) + 1;
                reactionData.userReposted.add(noteId);
                updateReactionUI();
            } catch (error) {
                console.error('Repost failed:', error);
            }
        }

        // ==================== Follow System ====================

        // Follow state
        let isFollowing = false;
        let userContactTags = []; // Full tags array from Kind 3
        let userContactContent = ''; // Preserve content field (relay prefs)

        // Check if viewing own profile
        function isOwnProfile(pubkeyHex) {
            const session = SessionManager.getSession();
            return session && session.publicKey === pubkeyHex;
        }

        // Check if current user follows this artist
        async function loadFollowCounts(pubkeyHex) {
            try {
                const [followingEvents, followerEvents] = await Promise.all([
                    (typeof CacheAPI !== 'undefined')
                        ? CacheAPI.queryEvents({ kinds: [3], authors: [pubkeyHex], limit: 1 })
                        : NostrSocial.queryRelays({ kinds: [3], authors: [pubkeyHex], limit: 1 }),
                    (typeof CacheAPI !== 'undefined')
                        ? CacheAPI.queryEvents({ kinds: [3], '#p': [pubkeyHex], limit: 500 })
                        : NostrSocial.queryRelays({ kinds: [3], '#p': [pubkeyHex], limit: 500 })
                ]);

                if (followingEvents && followingEvents.length > 0) {
                    const count = followingEvents[0].tags.filter(t => t[0] === 'p').length;
                    const el = document.getElementById('artist-following-count');
                    if (el) el.textContent = count;
                }

                if (followerEvents) {
                    const uniqueFollowers = new Set(followerEvents.map(ev => ev.pubkey));
                    const el = document.getElementById('artist-followers-count');
                    if (el) el.textContent = uniqueFollowers.size;
                }
            } catch (err) {
                console.error('Failed to load follow counts:', err);
            }
        }

        async function checkFollowStatus(artistPubkeyHex) {
            const session = SessionManager.getSession();
            if (!session) {
                // Not logged in - enable button, will redirect on click
                const btn = document.getElementById('follow-btn');
                if (btn) btn.disabled = false;
                return;
            }

            try {
                const contactList = await fetchContactList(session.publicKey);
                userContactTags = contactList.tags;
                userContactContent = contactList.content;
                isFollowing = userContactTags.some(tag => tag[0] === 'p' && tag[1] === artistPubkeyHex);
                updateFollowButton();
            } catch (err) {
                console.error('Failed to check follow status:', err);
            }

            const btn = document.getElementById('follow-btn');
            if (btn) btn.disabled = false;
        }

        // Fetch contact list as raw event (needed for follow toggle to preserve tags/content)
        async function fetchContactList(pubkeyHex) {
            const events = await NostrSocial.fetchNotes({ kinds: [3], authors: [pubkeyHex], limit: 1 });
            if (events.length > 0) {
                return { tags: events[0].tags || [], content: events[0].content || '' };
            }
            return { tags: [], content: '' };
        }

        // Toggle follow/unfollow
        async function toggleFollow(artistPubkeyHex) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }

            const btn = document.getElementById('follow-btn');
            if (btn) btn.disabled = true;

            try {
                if (isFollowing) {
                    // Unfollow: remove the p tag
                    userContactTags = userContactTags.filter(tag => !(tag[0] === 'p' && tag[1] === artistPubkeyHex));
                } else {
                    // Follow: add p tag
                    userContactTags.push(['p', artistPubkeyHex]);
                }

                // Create Kind 3 event
                const event = {
                    kind: 3,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: userContactTags,
                    content: userContactContent
                };

                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                isFollowing = !isFollowing;
                updateFollowButton();
            } catch (error) {
                console.error('Follow error:', error);
                alert('Failed to update follow: ' + error.message);
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        // Update follow button appearance
        function updateFollowButton() {
            const btn = document.getElementById('follow-btn');
            if (!btn) return;

            if (isFollowing) {
                btn.className = 'btn btn-following';
                btn.innerHTML = `
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                    Following`;

                // Hover: show "Unfollow"
                btn.onmouseenter = () => {
                    btn.innerHTML = `
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z"/>
                            <path d="M16 8a1 1 0 01-1 1h-2a1 1 0 110-2h2a1 1 0 011 1z"/>
                        </svg>
                        Unfollow`;
                };
                btn.onmouseleave = () => {
                    btn.innerHTML = `
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                        </svg>
                        Following`;
                };
            } else {
                btn.className = 'btn btn-primary';
                btn.innerHTML = `
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z"/>
                        <path d="M16 7a1 1 0 10-2 0v1h-1a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7z"/>
                    </svg>
                    Follow`;
                btn.onmouseenter = null;
                btn.onmouseleave = null;
            }
        }
    </script>
</body>
