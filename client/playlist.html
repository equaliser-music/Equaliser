<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - Equaliser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--eq-font-body);
            background: var(--eq-bg-app);
            color: var(--eq-text-1);
            overflow-x: hidden;
        }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; overflow-y: auto; padding: 32px; padding-bottom: 120px; }

        .playlist-loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--eq-text-4);
            font-size: 14px;
        }

        .playlist-not-found {
            text-align: center;
            padding: 60px 20px;
            color: var(--eq-text-4);
        }

        .playlist-not-found h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--eq-text-2-dim);
        }

        .playlist-header {
            display: flex;
            gap: 32px;
            margin-bottom: 32px;
            align-items: flex-start;
        }

        .playlist-cover {
            width: 220px;
            height: 220px;
            border-radius: var(--eq-radius-xl);
            overflow: hidden;
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            background: var(--eq-grad-playlist-cover);
        }

        .playlist-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-cover .cover-placeholder {
            grid-column: 1 / -1;
            grid-row: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .playlist-cover .cover-placeholder svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
        }

        .playlist-info { flex: 1; min-width: 0; }

        .playlist-info h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .playlist-creator {
            font-size: 14px;
            color: var(--eq-text-2-dim);
            margin-bottom: 4px;
        }

        .playlist-creator a {
            color: var(--eq-accent);
            text-decoration: none;
        }

        .playlist-creator a:hover { text-decoration: underline; }

        .playlist-meta {
            font-size: 13px;
            color: var(--eq-text-4);
            margin-bottom: 8px;
        }

        .playlist-description {
            font-size: 14px;
            color: var(--eq-text-2-dim);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .playlist-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .playlist-btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--eq-radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity var(--eq-dur-quick);
        }

        .playlist-btn:hover { opacity: 0.85; }

        .playlist-btn-primary {
            background: var(--eq-grad-accent);
            color: var(--eq-text-1);
        }

        .playlist-btn-secondary {
            background: var(--eq-surface-2-hover);
            color: var(--eq-text-strong);
        }

        .playlist-btn-danger {
            background: var(--eq-danger-vivid-soft-15);
            color: var(--eq-danger-vivid);
        }

        .playlist-btn-follow {
            background: var(--eq-accent-tint-15);
            color: var(--eq-accent);
        }

        .playlist-btn-following {
            background: var(--eq-accent-tint-30);
            color: var(--eq-accent-light);
        }

        /* Track list */
        .playlist-tracks {
            border-top: 1px solid var(--eq-surface-1-hover);
        }

        .playlist-track-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 8px;
            border-radius: var(--eq-radius-md);
            cursor: pointer;
            transition: background var(--eq-dur-fast);
        }

        .playlist-track-item:hover {
            background: var(--eq-surface-2);
        }

        .playlist-track-item.playing {
            background: var(--eq-accent-soft-12);
        }

        .playlist-track-number {
            width: 28px;
            text-align: center;
            font-size: 13px;
            color: var(--eq-text-4);
            flex-shrink: 0;
        }

        .playlist-track-item.playing .playlist-track-number {
            color: var(--eq-accent);
        }

        .playlist-track-cover {
            width: 48px;
            height: 48px;
            border-radius: var(--eq-radius-sm);
            overflow: hidden;
            flex-shrink: 0;
            background: var(--eq-surface-2);
        }

        .playlist-track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-track-info {
            flex: 1;
            min-width: 0;
        }

        .playlist-track-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-track-item.playing .playlist-track-title {
            color: var(--eq-accent);
        }

        .playlist-track-artist {
            font-size: 12px;
            color: var(--eq-text-3);
        }

        .playlist-track-artist a {
            color: var(--eq-text-3);
            text-decoration: none;
        }

        .playlist-track-artist a:hover {
            color: var(--eq-accent);
            text-decoration: underline;
        }

        .playlist-track-duration {
            font-size: 12px;
            color: var(--eq-text-4);
            flex-shrink: 0;
            min-width: 40px;
            text-align: right;
        }

        .playlist-track-remove {
            background: none;
            border: none;
            color: var(--eq-border-20);
            font-size: 16px;
            cursor: pointer;
            padding: 4px 6px;
            opacity: 0;
            transition: opacity var(--eq-dur-fast), color var(--eq-dur-fast);
        }

        .playlist-track-item:hover .playlist-track-remove { opacity: 1; }
        .playlist-track-remove:hover { color: var(--eq-danger-vivid); }

        .playlist-empty-tracks {
            text-align: center;
            padding: 40px 20px;
            color: var(--eq-text-4);
            font-size: 14px;
        }

        /* Edit mode */
        .playlist-edit-field {
            background: var(--eq-surface-1-hover);
            border: var(--eq-border);
            border-radius: var(--eq-radius-md);
            color: var(--eq-text-1);
            font-size: inherit;
            font-family: inherit;
            padding: 8px 12px;
            outline: none;
            width: 100%;
        }

        .playlist-edit-field:focus { border-color: var(--eq-accent); }

        /* Share modal */
        .share-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--eq-scrim);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .share-modal.open { display: flex; }

        .share-modal-content {
            background: var(--eq-surface-modal);
            border: var(--eq-border);
            border-radius: var(--eq-radius-2xl);
            padding: 32px;
            width: 100%;
            max-width: 480px;
        }

        .share-modal-content h2 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .share-modal-content textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            background: var(--eq-surface-1-hover);
            border: var(--eq-border);
            border-radius: var(--eq-radius-md);
            color: var(--eq-text-1);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 16px;
            outline: none;
        }

        .share-modal-content textarea:focus { border-color: var(--eq-accent); }

        .share-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .share-modal-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: var(--eq-radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Toast */
        .eq-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--eq-panel-bg-95);
            border: var(--eq-border);
            color: var(--eq-text-1);
            padding: 10px 20px;
            border-radius: var(--eq-radius-md);
            font-size: 13px;
            z-index: 10001;
            animation: toastFade var(--eq-dur-pulse) ease forwards;
        }

        @keyframes toastFade {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .playlist-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .playlist-cover { width: 180px; height: 180px; }
            .playlist-actions { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div id="playlist-content">
            <div class="playlist-loading">Loading playlist...</div>
        </div>

        <!-- Share modal -->
        <div class="share-modal" id="share-modal">
            <div class="share-modal-content">
                <h2>Share Playlist</h2>
                <textarea id="share-message" placeholder="Write a message..."></textarea>
                <div class="share-modal-actions">
                    <button class="btn-cancel" id="share-cancel" onclick="document.getElementById('share-modal').classList.remove('open')">Cancel</button>
                    <button class="btn-create" id="share-submit">Post to Feed</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
