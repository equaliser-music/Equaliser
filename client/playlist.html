<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - Equaliser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; overflow-y: auto; padding: 32px; padding-bottom: 120px; }

        .playlist-loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .playlist-not-found {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .playlist-not-found h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
        }

        .playlist-header {
            display: flex;
            gap: 32px;
            margin-bottom: 32px;
            align-items: flex-start;
        }

        .playlist-cover {
            width: 220px;
            height: 220px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            background: linear-gradient(135deg, #1a1a2e, #2d1b69);
        }

        .playlist-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-cover .cover-placeholder {
            grid-column: 1 / -1;
            grid-row: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .playlist-cover .cover-placeholder svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
        }

        .playlist-info { flex: 1; min-width: 0; }

        .playlist-info h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .playlist-creator {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .playlist-creator a {
            color: #a855f7;
            text-decoration: none;
        }

        .playlist-creator a:hover { text-decoration: underline; }

        .playlist-meta {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
        }

        .playlist-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .playlist-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .playlist-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .playlist-btn:hover { opacity: 0.85; }

        .playlist-btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: #fff;
        }

        .playlist-btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        .playlist-btn-danger {
            background: rgba(255, 59, 48, 0.15);
            color: #ff6b6b;
        }

        .playlist-btn-follow {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }

        .playlist-btn-following {
            background: rgba(168, 85, 247, 0.3);
            color: #d8b4fe;
        }

        /* Track list */
        .playlist-tracks {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .playlist-track-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .playlist-track-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .playlist-track-item.playing {
            background: rgba(139, 92, 246, 0.12);
        }

        .playlist-track-number {
            width: 28px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
        }

        .playlist-track-item.playing .playlist-track-number {
            color: #a855f7;
        }

        .playlist-track-cover {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
        }

        .playlist-track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-track-info {
            flex: 1;
            min-width: 0;
        }

        .playlist-track-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-track-item.playing .playlist-track-title {
            color: #a855f7;
        }

        .playlist-track-artist {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .playlist-track-artist a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
        }

        .playlist-track-artist a:hover {
            color: #a855f7;
            text-decoration: underline;
        }

        .playlist-track-duration {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
            min-width: 40px;
            text-align: right;
        }

        .playlist-track-remove {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            font-size: 16px;
            cursor: pointer;
            padding: 4px 6px;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }

        .playlist-track-item:hover .playlist-track-remove { opacity: 1; }
        .playlist-track-remove:hover { color: #ff6b6b; }

        .playlist-empty-tracks {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        /* Edit mode */
        .playlist-edit-field {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: inherit;
            font-family: inherit;
            padding: 8px 12px;
            outline: none;
            width: 100%;
        }

        .playlist-edit-field:focus { border-color: #a855f7; }

        /* Share modal */
        .share-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .share-modal.open { display: flex; }

        .share-modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
        }

        .share-modal-content h2 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .share-modal-content textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 16px;
            outline: none;
        }

        .share-modal-content textarea:focus { border-color: #a855f7; }

        .share-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .share-modal-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Toast */
        .eq-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 10001;
            animation: toastFade 2s ease forwards;
        }

        @keyframes toastFade {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .playlist-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .playlist-cover { width: 180px; height: 180px; }
            .playlist-actions { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div id="playlist-content">
            <div class="playlist-loading">Loading playlist...</div>
        </div>

        <!-- Share modal -->
        <div class="share-modal" id="share-modal">
            <div class="share-modal-content">
                <h2>Share Playlist</h2>
                <textarea id="share-message" placeholder="Write a message..."></textarea>
                <div class="share-modal-actions">
                    <button class="btn-cancel" id="share-cancel" onclick="document.getElementById('share-modal').classList.remove('open')">Cancel</button>
                    <button class="btn-create" id="share-submit">Post to Feed</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
