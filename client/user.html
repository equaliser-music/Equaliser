<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Equaliser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 240px;
            padding-bottom: 100px;
        }

        /* Banner */
        .user-banner {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(168, 85, 247, 0.2));
            position: relative;
            overflow: hidden;
        }

        .user-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(transparent, rgba(10, 10, 15, 1));
        }

        /* User Header */
        .user-header {
            padding: 0 32px;
            margin-top: -60px;
            position: relative;
            z-index: 1;
            display: flex;
            gap: 24px;
            align-items: flex-end;
        }

        .user-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: 4px solid rgba(10, 10, 15, 1);
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            padding-bottom: 12px;
        }

        .user-name {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            flex-wrap: wrap;
        }

        .npub-tag {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .npub-tag:hover {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
        }

        /* Actions */
        .user-actions {
            padding: 20px 32px;
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-following {
            background: rgba(139, 92, 246, 0.15);
            color: #a855f7;
            border: 1px solid rgba(139, 92, 246, 0.4);
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-following:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Bio */
        .user-bio {
            padding: 0 32px 24px;
        }

        .bio-text {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            font-size: 15px;
            max-width: 700px;
            white-space: pre-wrap;
        }

        /* Posts Section */
        .posts-section {
            padding: 0 32px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Feed Items */
        .feed-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .feed-item-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .feed-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            flex-shrink: 0;
        }

        .feed-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .feed-author-name {
            font-weight: 600;
            font-size: 14px;
        }

        .feed-time {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-left: auto;
        }

        .feed-content {
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
            font-size: 14px;
            word-wrap: break-word;
        }

        .feed-content a {
            color: #a855f7;
            text-decoration: none;
        }

        .feed-content a:hover {
            text-decoration: underline;
        }

        .feed-actions {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .feed-action-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            transition: color 0.2s;
            padding: 4px 0;
        }

        .feed-action-btn:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .feed-action-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .feed-action-btn.like-btn:hover,
        .feed-action-btn.like-btn.liked {
            color: #ef4444;
        }

        .feed-action-btn.like-btn.liked svg {
            fill: #ef4444;
        }

        .feed-action-btn.repost-btn:hover,
        .feed-action-btn.repost-btn.reposted {
            color: #22c55e;
        }

        .feed-empty {
            text-align: center;
            padding: 48px 16px;
            color: rgba(255, 255, 255, 0.35);
        }

        .feed-empty svg {
            width: 40px;
            height: 40px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .feed-empty p {
            font-size: 13px;
        }

        /* Loading & Error States */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.5);
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 60px;
        }

        .error-title {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .error-message {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 24px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .user-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .user-avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }
            .user-name {
                font-size: 24px;
            }
            .user-meta {
                justify-content: center;
            }
            .user-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar injected by ClientSidebar.init() -->

        <div class="main-content" id="main-content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <span>Loading profile...</span>
            </div>
        </div>
    </div>

    <!-- External dependencies -->
    <script src="https://unpkg.com/nostr-tools@2.1.4/lib/nostr.bundle.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/nostr-social.js"></script>

    <script>
        const DEFAULT_RELAYS = NostrSocial.DEFAULT_RELAYS;
        const escapeHtml = NostrSocial.escapeHtml;

        // State
        let userProfile = null;
        let feedNotes = [];
        let reactionData = { likes: {}, reposts: {}, userLiked: new Set(), userReposted: new Set() };

        // Follow state
        let isFollowing = false;
        let userContactTags = [];
        let userContactContent = '';

        // ===== Init =====

        async function loadUser(npub) {
            const mainContent = document.getElementById('main-content');

            try {
                // Decode npub to hex
                let pubkeyHex;
                try {
                    const decoded = NostrTools.nip19.decode(npub);
                    if (decoded.type !== 'npub') throw new Error('Invalid npub');
                    pubkeyHex = decoded.data;
                } catch (e) {
                    throw new Error('Invalid npub format');
                }

                // Fetch profile (Kind 0)
                const profile = await fetchProfile(pubkeyHex);

                // Check for tracks (Kind 30050) - just need 1 to know they're an artist
                const tracks = await checkForTracks(pubkeyHex);
                if (tracks.length > 0) {
                    // Artist - redirect
                    window.location.replace('artist.html?npub=' + npub);
                    return;
                }

                if (!profile) {
                    throw new Error('User not found on relay');
                }

                userProfile = profile;
                document.title = (profile.name || 'User') + ' - Equaliser';
                renderUser(npub, pubkeyHex);

                // Check follow status (non-blocking)
                checkFollowStatus(pubkeyHex);

                // Load feed (non-blocking)
                loadFeed(pubkeyHex);

            } catch (error) {
                console.error('Error loading user:', error);
                mainContent.innerHTML = `
                    <div class="error">
                        <h2 class="error-title">Could not load profile</h2>
                        <p class="error-message">${escapeHtml(error.message)}</p>
                        <button class="btn btn-primary" onclick="history.back()">Go Back</button>
                    </div>
                `;
            }
        }

        // ===== Relay Queries =====

        function fetchProfileFromRelay(relayUrl, pubkeyHex) {
            return new Promise((resolve) => {
                const ws = new WebSocket(relayUrl);
                let profile = null;
                const timeout = setTimeout(() => { ws.close(); resolve(null); }, 8000);

                ws.onopen = () => {
                    ws.send(JSON.stringify(['REQ', 'profile-' + Date.now(), { kinds: [0], authors: [pubkeyHex], limit: 1 }]));
                };

                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data[0] === 'EVENT') {
                        try { profile = JSON.parse(data[2].content); profile._event = data[2]; } catch (err) {}
                    }
                    if (data[0] === 'EOSE') { clearTimeout(timeout); ws.close(); resolve(profile); }
                };

                ws.onerror = () => { clearTimeout(timeout); resolve(null); };
            });
        }

        async function fetchProfile(pubkeyHex) {
            const results = await Promise.all(DEFAULT_RELAYS.map(r => fetchProfileFromRelay(r, pubkeyHex)));
            for (const profile of results) {
                if (profile) return profile;
            }
            return null;
        }

        function checkForTracks(pubkeyHex) {
            return new Promise((resolve) => {
                const relayUrl = DEFAULT_RELAYS[0];
                const ws = new WebSocket(relayUrl);
                const tracks = [];
                const timeout = setTimeout(() => { ws.close(); resolve(tracks); }, 5000);

                ws.onopen = () => {
                    ws.send(JSON.stringify(['REQ', 'tracks-' + Date.now(), { kinds: [30050], authors: [pubkeyHex], limit: 1 }]));
                };

                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data[0] === 'EVENT') tracks.push(data[2]);
                    if (data[0] === 'EOSE') { clearTimeout(timeout); ws.close(); resolve(tracks); }
                };

                ws.onerror = () => { clearTimeout(timeout); resolve(tracks); };
            });
        }

        // ===== Render =====

        function renderUser(npub, pubkeyHex) {
            const mainContent = document.getElementById('main-content');
            const profile = userProfile;

            const initials = (profile.name || 'U')
                .split(' ')
                .map(w => w[0])
                .join('')
                .substring(0, 2)
                .toUpperCase();

            const shortNpub = npub.substring(0, 12) + '...' + npub.substring(npub.length - 6);

            mainContent.innerHTML = `
                <!-- Banner -->
                <div class="user-banner">
                    ${profile.banner ? `<img src="${profile.banner}" alt="">` : ''}
                </div>

                <!-- Header -->
                <div class="user-header">
                    <div class="user-avatar">
                        ${profile.picture
                            ? `<img src="${profile.picture}" alt="${escapeHtml(profile.name || '')}">`
                            : initials
                        }
                    </div>
                    <div class="user-info">
                        <h1 class="user-name">${escapeHtml(profile.name || profile.display_name || 'Unknown')}</h1>
                        <div class="user-meta">
                            ${profile.nip05 ? `<span>${escapeHtml(profile.nip05)}</span>` : ''}
                            <span class="npub-tag" onclick="copyNpub('${npub}')" title="Click to copy">${shortNpub}</span>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="user-actions">
                    ${!isOwnProfile(pubkeyHex) ? `
                        <button class="btn btn-primary" id="follow-btn" onclick="toggleFollow('${pubkeyHex}')" disabled>
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z"/>
                                <path d="M16 7a1 1 0 10-2 0v1h-1a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7z"/>
                            </svg>
                            Follow
                        </button>
                    ` : ''}
                    <button class="btn btn-secondary" onclick="copyNpub('${npub}')">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/>
                            <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/>
                        </svg>
                        Copy npub
                    </button>
                </div>

                <!-- Bio -->
                ${profile.about ? `
                    <div class="user-bio">
                        <div class="bio-text">${NostrSocial.linkifyContent(escapeHtml(profile.about))}</div>
                    </div>
                ` : ''}

                <!-- Posts -->
                <div class="posts-section">
                    <h2 class="section-title">Posts</h2>
                    <div id="feed-content">
                        <div class="loading">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== Feed =====

        async function loadFeed(pubkeyHex) {
            const container = document.getElementById('feed-content');
            if (!container) return;

            const allNotes = await NostrSocial.fetchNotes({ kinds: [1], authors: [pubkeyHex], limit: 50 });

            if (allNotes.length === 0) {
                container.innerHTML = `
                    <div class="feed-empty">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
                        </svg>
                        <p>No posts yet</p>
                    </div>
                `;
                return;
            }

            feedNotes = allNotes;
            renderFeed(allNotes);

            const noteIds = allNotes.map(n => n.id);
            loadReactions(noteIds);
        }

        function renderFeed(notes) {
            const container = document.getElementById('feed-content');
            if (!container) return;

            const profile = userProfile || {};
            const avatarInitial = (profile.name || 'U').charAt(0).toUpperCase();

            container.innerHTML = notes.map(note => {
                const content = NostrSocial.linkifyContent(escapeHtml(note.content));
                const time = NostrSocial.relativeTime(note.created_at);
                const likeCount = reactionData.likes[note.id] || 0;
                const repostCount = reactionData.reposts[note.id] || 0;
                const userLiked = reactionData.userLiked.has(note.id);
                const userReposted = reactionData.userReposted.has(note.id);

                return `
                    <div class="feed-item" data-note-id="${note.id}">
                        <div class="feed-item-header">
                            <div class="feed-avatar">
                                ${profile.picture
                                    ? `<img src="${profile.picture}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${avatarInitial}'">`
                                    : avatarInitial
                                }
                            </div>
                            <span class="feed-author-name">${escapeHtml(profile.name || 'User')}</span>
                            <span class="feed-time">${time}</span>
                        </div>
                        <div class="feed-content">${content}</div>
                        <div class="feed-actions">
                            <button class="feed-action-btn like-btn${userLiked ? ' liked' : ''}" onclick="handleLike('${note.id}', '${note.pubkey}')">
                                <svg viewBox="0 0 20 20" fill="${userLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5">
                                    <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>
                                </svg>
                                <span class="like-count">${likeCount || ''}</span>
                            </button>
                            <button class="feed-action-btn repost-btn${userReposted ? ' reposted' : ''}" onclick="handleRepost('${note.id}', '${note.pubkey}')">
                                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M7 16V4m0 0L3 8m4-4l4 4M13 4v12m0 0l4-4m-4 4l-4-4"/>
                                </svg>
                                <span class="repost-count">${repostCount || ''}</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== Reactions =====

        async function loadReactions(noteIds) {
            if (noteIds.length === 0) return;
            reactionData = await NostrSocial.fetchReactions(noteIds);
            updateReactionUI();
        }

        function updateReactionUI() {
            document.querySelectorAll('.feed-item').forEach(item => {
                const noteId = item.dataset.noteId;
                if (!noteId) return;

                const likeBtn = item.querySelector('.like-btn');
                const repostBtn = item.querySelector('.repost-btn');

                if (likeBtn) {
                    const count = reactionData.likes[noteId] || 0;
                    likeBtn.querySelector('.like-count').textContent = count || '';
                    const liked = reactionData.userLiked.has(noteId);
                    likeBtn.classList.toggle('liked', liked);
                    likeBtn.querySelector('svg').setAttribute('fill', liked ? 'currentColor' : 'none');
                }

                if (repostBtn) {
                    const count = reactionData.reposts[noteId] || 0;
                    repostBtn.querySelector('.repost-count').textContent = count || '';
                    repostBtn.classList.toggle('reposted', reactionData.userReposted.has(noteId));
                }
            });
        }

        async function handleLike(noteId, authorPubkey) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }
            if (reactionData.userLiked.has(noteId)) return;

            try {
                const event = {
                    kind: 7,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [['e', noteId], ['p', authorPubkey]],
                    content: '+'
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                reactionData.likes[noteId] = (reactionData.likes[noteId] || 0) + 1;
                reactionData.userLiked.add(noteId);
                updateReactionUI();
            } catch (error) {
                console.error('Like failed:', error);
            }
        }

        async function handleRepost(noteId, authorPubkey) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }
            if (reactionData.userReposted.has(noteId)) return;

            try {
                const originalNote = feedNotes.find(n => n.id === noteId);
                const event = {
                    kind: 6,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [['e', noteId, DEFAULT_RELAYS[0]], ['p', authorPubkey]],
                    content: originalNote ? JSON.stringify(originalNote) : ''
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                reactionData.reposts[noteId] = (reactionData.reposts[noteId] || 0) + 1;
                reactionData.userReposted.add(noteId);
                updateReactionUI();
            } catch (error) {
                console.error('Repost failed:', error);
            }
        }

        // ===== Follow System =====

        function isOwnProfile(pubkeyHex) {
            const session = SessionManager.getSession();
            return session && session.publicKey === pubkeyHex;
        }

        async function checkFollowStatus(targetPubkeyHex) {
            const session = SessionManager.getSession();
            if (!session) {
                const btn = document.getElementById('follow-btn');
                if (btn) btn.disabled = false;
                return;
            }

            try {
                const contactList = await fetchContactListRaw(session.publicKey);
                userContactTags = contactList.tags;
                userContactContent = contactList.content;
                isFollowing = userContactTags.some(tag => tag[0] === 'p' && tag[1] === targetPubkeyHex);
                updateFollowButton();
            } catch (err) {
                console.error('Failed to check follow status:', err);
            }

            const btn = document.getElementById('follow-btn');
            if (btn) btn.disabled = false;
        }

        async function fetchContactListRaw(pubkeyHex) {
            const events = await NostrSocial.fetchNotes({ kinds: [3], authors: [pubkeyHex], limit: 1 });
            if (events.length > 0) {
                return { tags: events[0].tags || [], content: events[0].content || '' };
            }
            return { tags: [], content: '' };
        }

        async function toggleFollow(targetPubkeyHex) {
            const session = SessionManager.getSession();
            if (!session) {
                window.location.href = `/login.html?return=${encodeURIComponent(window.location.href)}`;
                return;
            }

            const btn = document.getElementById('follow-btn');
            if (btn) btn.disabled = true;

            try {
                if (isFollowing) {
                    userContactTags = userContactTags.filter(tag => !(tag[0] === 'p' && tag[1] === targetPubkeyHex));
                } else {
                    userContactTags.push(['p', targetPubkeyHex]);
                }

                const event = {
                    kind: 3,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: userContactTags,
                    content: userContactContent
                };

                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                isFollowing = !isFollowing;
                updateFollowButton();
            } catch (error) {
                console.error('Follow error:', error);
                alert('Failed to update follow: ' + error.message);
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        function updateFollowButton() {
            const btn = document.getElementById('follow-btn');
            if (!btn) return;

            if (isFollowing) {
                btn.className = 'btn btn-following';
                btn.innerHTML = `
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                    Following`;
                btn.onmouseenter = () => {
                    btn.innerHTML = `
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z"/>
                            <path d="M16 8a1 1 0 01-1 1h-2a1 1 0 110-2h2a1 1 0 011 1z"/>
                        </svg>
                        Unfollow`;
                };
                btn.onmouseleave = () => {
                    btn.innerHTML = `
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                        </svg>
                        Following`;
                };
            } else {
                btn.className = 'btn btn-primary';
                btn.innerHTML = `
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z"/>
                        <path d="M16 7a1 1 0 10-2 0v1h-1a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7z"/>
                    </svg>
                    Follow`;
                btn.onmouseenter = null;
                btn.onmouseleave = null;
            }
        }

        // ===== Utilities =====

        function copyNpub(npub) {
            navigator.clipboard.writeText(npub).then(() => {
                const tag = document.querySelector('.npub-tag');
                if (tag) {
                    const original = tag.textContent;
                    tag.textContent = 'Copied!';
                    setTimeout(() => { tag.textContent = original; }, 1500);
                }
            });
        }

        // ===== Start =====

        SessionManager.init();
        ClientSidebar.init();

        const params = new URLSearchParams(window.location.search);
        const npub = params.get('npub');

        if (npub) {
            loadUser(npub);
        } else {
            document.getElementById('main-content').innerHTML = `
                <div class="error">
                    <h2 class="error-title">No user specified</h2>
                    <p class="error-message">Please provide an npub in the URL</p>
                    <button class="btn btn-primary" onclick="history.back()">Go Back</button>
                </div>
            `;
        }
    </script>
</body>
</html>
