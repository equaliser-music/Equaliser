<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - Equaliser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; overflow-y: auto; display: flex; justify-content: center; }
        .community-column { width: 100%; max-width: 800px; padding: 0; }

        /* Page Header */
        .community-header { padding: 24px 24px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .community-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

        /* Board Tabs */
        .board-tabs { display: flex; gap: 0; overflow-x: auto; }
        .board-tab {
            padding: 12px 16px; background: none; border: none;
            border-bottom: 2px solid transparent; color: rgba(255, 255, 255, 0.4);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .board-tab:hover { color: rgba(255, 255, 255, 0.7); }
        .board-tab.active { color: #a855f7; border-bottom-color: #a855f7; }

        /* New Thread Button */
        .new-thread-btn {
            padding: 8px 20px; background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none; border-radius: 20px; color: #ffffff; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .new-thread-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4); }

        /* Thread List */
        .thread-list { padding: 0; }
        .thread-item {
            padding: 16px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer; transition: background 0.2s;
        }
        .thread-item:hover { background: rgba(255, 255, 255, 0.02); }
        .thread-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .thread-subject { font-size: 16px; font-weight: 700; flex: 1; }
        .board-badge {
            padding: 2px 10px; border-radius: 12px; font-size: 11px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
        }
        .board-badge.general { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
        .board-badge.music { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .board-badge.production { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .board-badge.gigs { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        .thread-meta {
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; color: rgba(255, 255, 255, 0.4);
        }
        .thread-author { display: flex; align-items: center; gap: 6px; }
        .thread-author-avatar {
            width: 20px; height: 20px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 600; overflow: hidden;
        }
        .thread-author-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .thread-preview {
            font-size: 14px; color: rgba(255, 255, 255, 0.5); margin-top: 6px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 600px;
        }

        /* New Thread Form */
        .new-thread-form {
            padding: 20px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: none;
        }
        .new-thread-form.visible { display: block; }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; font-size: 13px; font-weight: 600; color: rgba(255, 255, 255, 0.6); margin-bottom: 6px; }
        .form-row select, .form-row input, .form-row textarea {
            width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px;
            color: #ffffff; font-size: 14px; font-family: inherit; outline: none;
            transition: border-color 0.2s;
        }
        .form-row select:focus, .form-row input:focus, .form-row textarea:focus { border-color: rgba(168, 85, 247, 0.4); }
        .form-row textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
        .form-row select { appearance: none; cursor: pointer; }
        .form-row select option { background: #1a1a2e; color: #ffffff; }
        .form-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .form-cancel {
            padding: 8px 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; color: rgba(255, 255, 255, 0.7); font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .form-cancel:hover { background: rgba(255, 255, 255, 0.1); }
        .form-submit {
            padding: 8px 24px; background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none; border-radius: 20px; color: #ffffff; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .form-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4); }
        .form-submit:disabled { opacity: 0.4; cursor: default; }

        /* Thread Detail View */
        .thread-detail { display: none; }
        .thread-detail.visible { display: block; }
        .thread-detail-back {
            padding: 16px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .thread-detail-back a {
            color: rgba(255, 255, 255, 0.6); text-decoration: none; font-size: 14px;
            display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s;
        }
        .thread-detail-back a:hover { color: #a855f7; }
        .thread-detail-back svg { width: 16px; height: 16px; }
        .thread-op { padding: 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .thread-op-subject { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .thread-op-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .thread-op-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 600; overflow: hidden; flex-shrink: 0;
        }
        .thread-op-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .thread-op-author-name { font-weight: 700; font-size: 15px; }
        .thread-op-author-name a { color: inherit; text-decoration: none; }
        .thread-op-author-name a:hover { color: #a855f7; }
        .thread-op-time { font-size: 13px; color: rgba(255, 255, 255, 0.4); }
        .thread-op-content { font-size: 15px; line-height: 1.7; color: rgba(255, 255, 255, 0.9); word-wrap: break-word; }
        .thread-op-content a { color: #60a5fa; text-decoration: none; }
        .thread-op-content a:hover { text-decoration: underline; }

        /* Thread Reply Composer */
        .thread-reply-composer { padding: 16px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .thread-reply-composer textarea {
            width: 100%; min-height: 60px; padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; color: #ffffff; font-size: 14px; font-family: inherit;
            line-height: 1.5; resize: vertical; outline: none; transition: border-color 0.2s;
        }
        .thread-reply-composer textarea::placeholder { color: rgba(255, 255, 255, 0.3); }
        .thread-reply-composer textarea:focus { border-color: rgba(168, 85, 247, 0.4); }
        .thread-reply-composer-footer { display: flex; justify-content: flex-end; margin-top: 8px; }

        /* Thread Replies */
        .thread-replies-header {
            padding: 16px 24px 12px; font-size: 15px; font-weight: 700;
            color: rgba(255, 255, 255, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .thread-reply-item { padding: 16px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .thread-reply-inner { display: flex; gap: 12px; }
        .thread-reply-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; overflow: hidden; flex-shrink: 0;
        }
        .thread-reply-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .thread-reply-body { flex: 1; min-width: 0; }
        .thread-reply-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
        .thread-reply-name { font-size: 14px; font-weight: 700; }
        .thread-reply-name a { color: inherit; text-decoration: none; }
        .thread-reply-name a:hover { color: #a855f7; }
        .thread-reply-time { font-size: 12px; color: rgba(255, 255, 255, 0.4); margin-left: auto; }
        .thread-reply-content { font-size: 14px; line-height: 1.5; color: rgba(255, 255, 255, 0.85); word-wrap: break-word; }
        .thread-reply-content a { color: #60a5fa; text-decoration: none; }

        /* Loading & Empty */
        .community-loading { text-align: center; padding: 60px 20px; color: rgba(255, 255, 255, 0.5); font-size: 14px; }
        .loading-spinner {
            display: inline-block; width: 32px; height: 32px;
            border: 3px solid rgba(139, 92, 246, 0.3); border-top-color: #a855f7;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .community-empty { text-align: center; padding: 60px 20px; color: rgba(255, 255, 255, 0.4); }
        .community-empty p { font-size: 15px; margin-bottom: 6px; }
        .community-empty .sub { font-size: 13px; color: rgba(255, 255, 255, 0.3); }
        .thread-replies-empty { padding: 40px 24px; text-align: center; color: rgba(255, 255, 255, 0.3); font-size: 14px; }
        .reply-login { padding: 16px 24px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.5); font-size: 14px; }
        .reply-login a { color: #a855f7; text-decoration: none; font-weight: 600; }

        @media (max-width: 768px) { .community-column { max-width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar"></div>
        <div class="main-content">
            <div class="community-column">
                <!-- Thread List View -->
                <div id="list-view">
                    <div class="community-header">
                        <div class="community-title">
                            <span>Community</span>
                            <button class="new-thread-btn" id="new-thread-btn" style="display:none" onclick="toggleNewThreadForm()">New Thread</button>
                        </div>
                        <div class="board-tabs" id="board-tabs">
                            <button class="board-tab active" data-board="all" onclick="switchBoard('all')">All</button>
                            <button class="board-tab" data-board="general" onclick="switchBoard('general')">General</button>
                            <button class="board-tab" data-board="music" onclick="switchBoard('music')">Music</button>
                            <button class="board-tab" data-board="production" onclick="switchBoard('production')">Production</button>
                            <button class="board-tab" data-board="gigs" onclick="switchBoard('gigs')">Gigs</button>
                        </div>
                    </div>

                    <div class="new-thread-form" id="new-thread-form">
                        <div class="form-row">
                            <label>Board</label>
                            <select id="thread-board">
                                <option value="general">General</option>
                                <option value="music">Music</option>
                                <option value="production">Production</option>
                                <option value="gigs">Gigs</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <label>Subject</label>
                            <input type="text" id="thread-subject" placeholder="Thread subject..." maxlength="200">
                        </div>
                        <div class="form-row">
                            <label>Content</label>
                            <textarea id="thread-content" placeholder="Write your post..." maxlength="5000"></textarea>
                        </div>
                        <div class="form-actions">
                            <button class="form-cancel" onclick="toggleNewThreadForm()">Cancel</button>
                            <button class="form-submit" id="submit-thread-btn" onclick="submitThread()" disabled>Post Thread</button>
                        </div>
                    </div>

                    <div id="thread-list">
                        <div class="community-loading">
                            <div class="loading-spinner"></div>
                            <div>Loading threads...</div>
                        </div>
                    </div>
                </div>

                <!-- Thread Detail View -->
                <div id="detail-view" class="thread-detail">
                    <div class="thread-detail-back">
                        <a href="#" onclick="showListView(); return false;">
                            <svg viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
                            </svg>
                            Back to threads
                        </a>
                    </div>
                    <div id="thread-detail-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/nostr-tools@2.1.4/lib/nostr.bundle.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/nostr-social.js"></script>

    <script>
        // State
        let currentBoard = 'all';
        let threads = [];
        let threadProfiles = new Map();
        let threadReplyCounts = new Map();
        let activeThreadId = null;
        let activeThreadEvent = null;
        let activeThreadReplies = [];
        let activeThreadProfiles = new Map();
        let isSubmitting = false;

        const escapeHtml = NostrSocial.escapeHtml;

        // ===== Thread List =====

        async function loadThreads(board) {
            board = board || currentBoard;
            const listEl = document.getElementById('thread-list');
            listEl.innerHTML = `<div class="community-loading"><div class="loading-spinner"></div><div>Loading threads...</div></div>`;

            threads = await NostrSocial.fetchCommunityThreads(board);

            if (threads.length === 0) {
                listEl.innerHTML = `<div class="community-empty"><p>No threads yet</p><p class="sub">Start a discussion by creating a new thread</p></div>`;
                return;
            }

            const pubkeys = [...new Set(threads.map(t => t.pubkey))];
            threadProfiles = await NostrSocial.fetchProfiles(pubkeys);

            // Load reply counts
            const threadIds = threads.map(t => t.id);
            threadReplyCounts = await NostrSocial.fetchReplyCounts(threadIds);

            renderThreadList();
        }

        function renderThreadList() {
            const listEl = document.getElementById('thread-list');
            listEl.innerHTML = threads.map(thread => {
                const profile = threadProfiles.get(thread.pubkey) || {};
                const name = profile.name || 'Unknown';
                const initial = name.charAt(0).toUpperCase();
                const subject = thread.tags.find(t => t[0] === 'subject');
                const board = thread.tags.find(t => t[0] === 'board');
                const boardName = board ? board[1] : 'general';
                const subjectText = subject ? subject[1] : 'Untitled';
                const time = NostrSocial.relativeTime(thread.created_at);
                const replyCount = threadReplyCounts.get(thread.id) || 0;
                const preview = thread.content.substring(0, 120) + (thread.content.length > 120 ? '...' : '');

                return `
                    <div class="thread-item" onclick="openThread('${thread.id}')">
                        <div class="thread-item-top">
                            <span class="thread-subject">${escapeHtml(subjectText)}</span>
                            <span class="board-badge ${boardName}">${escapeHtml(boardName)}</span>
                        </div>
                        <div class="thread-preview">${escapeHtml(preview)}</div>
                        <div class="thread-meta">
                            <span class="thread-author">
                                <span class="thread-author-avatar">
                                    ${profile.picture
                                        ? `<img src="${escapeHtml(profile.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${initial}'">`
                                        : initial
                                    }
                                </span>
                                ${escapeHtml(name)}
                            </span>
                            <span>${replyCount} ${replyCount === 1 ? 'reply' : 'replies'}</span>
                            <span>${time}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchBoard(board) {
            if (board === currentBoard) return;
            currentBoard = board;
            document.querySelectorAll('.board-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.board === board);
            });
            loadThreads(board);

            // Update URL without reload
            const url = new URL(window.location);
            if (board === 'all') url.searchParams.delete('board');
            else url.searchParams.set('board', board);
            url.searchParams.delete('thread');
            history.replaceState({}, '', url);
        }

        // ===== New Thread =====

        function toggleNewThreadForm() {
            const form = document.getElementById('new-thread-form');
            form.classList.toggle('visible');
        }

        async function submitThread() {
            const subject = document.getElementById('thread-subject').value.trim();
            const content = document.getElementById('thread-content').value.trim();
            const board = document.getElementById('thread-board').value;
            if (!subject || !content || isSubmitting) return;

            const session = SessionManager.getSession();
            if (!session) return;

            isSubmitting = true;
            const btn = document.getElementById('submit-thread-btn');
            btn.disabled = true;
            btn.textContent = 'Posting...';

            try {
                const event = {
                    kind: 1,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [
                        ['app', 'Equaliser'],
                        ['content-type', 'thread'],
                        ['subject', subject],
                        ['board', board]
                    ],
                    content: content
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                // Clear form and hide
                document.getElementById('thread-subject').value = '';
                document.getElementById('thread-content').value = '';
                document.getElementById('new-thread-form').classList.remove('visible');

                // Reload threads
                loadThreads();
            } catch (error) {
                console.error('Thread creation failed:', error);
                alert('Failed to create thread. Please try again.');
            } finally {
                isSubmitting = false;
                btn.disabled = false;
                btn.textContent = 'Post Thread';
            }
        }

        // ===== Thread Detail =====

        async function openThread(threadId) {
            activeThreadId = threadId;
            document.getElementById('list-view').style.display = 'none';
            const detailView = document.getElementById('detail-view');
            detailView.classList.add('visible');
            document.getElementById('thread-detail-content').innerHTML = `<div class="community-loading"><div class="loading-spinner"></div><div>Loading thread...</div></div>`;

            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('thread', threadId);
            history.pushState({}, '', url);

            // Fetch thread event
            activeThreadEvent = await NostrSocial.fetchEventById(threadId);
            if (!activeThreadEvent) {
                document.getElementById('thread-detail-content').innerHTML = `<div class="community-empty"><p>Thread not found</p></div>`;
                return;
            }

            // Fetch replies
            activeThreadReplies = await NostrSocial.fetchCommunityReplies(threadId);

            // Fetch profiles
            const allPubkeys = new Set([activeThreadEvent.pubkey, ...activeThreadReplies.map(r => r.pubkey)]);
            activeThreadProfiles = await NostrSocial.fetchProfiles([...allPubkeys]);

            renderThreadDetail();
        }

        function renderThreadDetail() {
            const ev = activeThreadEvent;
            const profile = activeThreadProfiles.get(ev.pubkey) || {};
            const name = profile.name || 'Unknown';
            const initial = name.charAt(0).toUpperCase();
            const subject = ev.tags.find(t => t[0] === 'subject');
            const subjectText = subject ? subject[1] : 'Untitled';
            const content = NostrSocial.linkifyContent(escapeHtml(ev.content));
            const date = new Date(ev.created_at * 1000);
            const timeStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            let npub = '';
            try { npub = window.NostrTools.nip19.npubEncode(ev.pubkey); } catch (e) {}

            const session = SessionManager.getSession();
            let composerHtml = '';
            if (session) {
                composerHtml = `
                    <div class="thread-reply-composer">
                        <textarea id="detail-reply-text" placeholder="Write a reply..." maxlength="2000"></textarea>
                        <div class="thread-reply-composer-footer">
                            <button class="form-submit" id="detail-reply-btn" disabled onclick="submitThreadReply()">Reply</button>
                        </div>
                    </div>`;
            } else {
                composerHtml = `<div class="reply-login"><a href="/login.html?return=${encodeURIComponent(window.location.href)}">Log in</a> to reply</div>`;
            }

            let repliesHtml = '';
            if (activeThreadReplies.length > 0) {
                repliesHtml = `<div class="thread-replies-header">${activeThreadReplies.length} ${activeThreadReplies.length === 1 ? 'Reply' : 'Replies'}</div>`;
                repliesHtml += activeThreadReplies.map(reply => {
                    const rp = activeThreadProfiles.get(reply.pubkey) || {};
                    const rName = rp.name || 'Unknown';
                    const rInitial = rName.charAt(0).toUpperCase();
                    const rContent = NostrSocial.linkifyContent(escapeHtml(reply.content));
                    const rTime = NostrSocial.relativeTime(reply.created_at);
                    let rNpub = '';
                    try { rNpub = window.NostrTools.nip19.npubEncode(reply.pubkey); } catch (e) {}

                    return `
                        <div class="thread-reply-item">
                            <div class="thread-reply-inner">
                                <div class="thread-reply-avatar">
                                    ${rNpub ? `<a href="/user.html?npub=${rNpub}" style="display:contents">` : ''}
                                    ${rp.picture
                                        ? `<img src="${escapeHtml(rp.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${rInitial}'">`
                                        : rInitial
                                    }
                                    ${rNpub ? '</a>' : ''}
                                </div>
                                <div class="thread-reply-body">
                                    <div class="thread-reply-header">
                                        <span class="thread-reply-name">${rNpub ? `<a href="/user.html?npub=${rNpub}">${escapeHtml(rName)}</a>` : escapeHtml(rName)}</span>
                                        <span class="thread-reply-time">${rTime}</span>
                                    </div>
                                    <div class="thread-reply-content">${rContent}</div>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            } else {
                repliesHtml = `<div class="thread-replies-empty">No replies yet. Be the first to reply!</div>`;
            }

            const board = ev.tags.find(t => t[0] === 'board');
            const boardName = board ? board[1] : 'general';

            document.getElementById('thread-detail-content').innerHTML = `
                <div class="thread-op">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
                        <span class="board-badge ${boardName}">${escapeHtml(boardName)}</span>
                    </div>
                    <div class="thread-op-subject">${escapeHtml(subjectText)}</div>
                    <div class="thread-op-header">
                        <div class="thread-op-avatar">
                            ${npub ? `<a href="/user.html?npub=${npub}" style="display:contents">` : ''}
                            ${profile.picture
                                ? `<img src="${escapeHtml(profile.picture)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${initial}'">`
                                : initial
                            }
                            ${npub ? '</a>' : ''}
                        </div>
                        <div>
                            <div class="thread-op-author-name">${npub ? `<a href="/user.html?npub=${npub}">${escapeHtml(name)}</a>` : escapeHtml(name)}</div>
                            <div class="thread-op-time">${timeStr}</div>
                        </div>
                    </div>
                    <div class="thread-op-content">${content}</div>
                </div>
                ${composerHtml}
                ${repliesHtml}
            `;

            // Wire up reply composer
            if (session) {
                const textarea = document.getElementById('detail-reply-text');
                const replyBtn = document.getElementById('detail-reply-btn');
                if (textarea && replyBtn) {
                    textarea.addEventListener('input', () => {
                        replyBtn.disabled = textarea.value.trim().length === 0 || isSubmitting;
                    });
                    textarea.addEventListener('keydown', (e) => {
                        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                            e.preventDefault();
                            if (!replyBtn.disabled) submitThreadReply();
                        }
                    });
                }
            }
        }

        async function submitThreadReply() {
            const textarea = document.getElementById('detail-reply-text');
            const btn = document.getElementById('detail-reply-btn');
            const content = textarea.value.trim();
            if (!content || isSubmitting) return;

            const session = SessionManager.getSession();
            if (!session) return;

            isSubmitting = true;
            btn.disabled = true;
            btn.textContent = 'Posting...';

            try {
                const event = {
                    kind: 1,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [
                        ['app', 'Equaliser'],
                        ['content-type', 'reply'],
                        ['e', activeThreadId, '', 'root'],
                        ['p', activeThreadEvent.pubkey]
                    ],
                    content: content
                };
                const signedEvent = await SessionManager.signEvent(event);
                await NostrSocial.publishEvent(signedEvent);

                activeThreadReplies.push(signedEvent);
                if (!activeThreadProfiles.has(signedEvent.pubkey)) {
                    const profiles = await NostrSocial.fetchProfiles([signedEvent.pubkey]);
                    profiles.forEach((v, k) => activeThreadProfiles.set(k, v));
                }

                textarea.value = '';
                renderThreadDetail();
            } catch (error) {
                console.error('Reply failed:', error);
                alert('Failed to post reply. Please try again.');
            } finally {
                isSubmitting = false;
                btn.disabled = false;
                btn.textContent = 'Reply';
            }
        }

        function showListView() {
            document.getElementById('detail-view').classList.remove('visible');
            document.getElementById('list-view').style.display = '';
            activeThreadId = null;

            const url = new URL(window.location);
            url.searchParams.delete('thread');
            history.pushState({}, '', url);
        }

        // ===== Init =====

        SessionManager.init();
        ClientSidebar.init();

        // Show new thread button if logged in
        if (SessionManager.hasSession()) {
            document.getElementById('new-thread-btn').style.display = '';
        }

        // Wire up form validation
        const subjectInput = document.getElementById('thread-subject');
        const contentInput = document.getElementById('thread-content');
        const submitBtn = document.getElementById('submit-thread-btn');
        function validateForm() {
            submitBtn.disabled = !subjectInput.value.trim() || !contentInput.value.trim() || isSubmitting;
        }
        subjectInput.addEventListener('input', validateForm);
        contentInput.addEventListener('input', validateForm);

        // Check URL params
        const params = new URLSearchParams(window.location.search);
        const threadParam = params.get('thread');
        const boardParam = params.get('board');

        if (boardParam) {
            currentBoard = boardParam;
            document.querySelectorAll('.board-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.board === boardParam);
            });
        }

        if (threadParam) {
            openThread(threadParam);
        } else {
            loadThreads();
        }

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            const p = new URLSearchParams(window.location.search);
            if (p.get('thread')) {
                openThread(p.get('thread'));
            } else {
                showListView();
                loadThreads();
            }
        });
    </script>
</body>
</html>
