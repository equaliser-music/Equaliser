<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Equaliser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }
        .container { display: flex; height: 100vh; }
        .main-content { flex: 1; overflow-y: auto; padding: 32px; padding-bottom: 120px; }

        .library-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .library-title { font-size: 24px; font-weight: 700; }

        .library-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 24px;
        }

        .library-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .library-tab:hover { color: rgba(255, 255, 255, 0.7); }
        .library-tab.active {
            color: #ffffff;
            border-bottom-color: #a855f7;
        }

        .library-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        .library-create-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .library-create-btn:hover { opacity: 0.9; }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        .playlist-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .playlist-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .playlist-card-cover {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #1a1a2e, #2d1b69);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden;
        }

        .playlist-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-card-cover .cover-placeholder {
            grid-column: 1 / -1;
            grid-row: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .playlist-card-cover .cover-placeholder svg {
            width: 48px;
            height: 48px;
            opacity: 0.3;
        }

        .playlist-card-info {
            padding: 14px;
        }

        .playlist-card-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .playlist-card-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .playlist-card-link {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 2px;
            transition: color 0.2s;
        }

        .playlist-card-link:hover { color: #ffffff; }

        .library-empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .library-empty h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
        }

        .library-empty p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .library-loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .library-login-prompt {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .library-login-prompt h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
        }

        .library-login-prompt a {
            color: #a855f7;
            text-decoration: none;
        }

        /* Create playlist modal */
        .create-playlist-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .create-playlist-modal.open { display: flex; }

        .create-playlist-form {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
        }

        .create-playlist-form h2 {
            font-size: 20px;
            margin-bottom: 24px;
        }

        .create-playlist-form label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
        }

        .create-playlist-form input[type="text"],
        .create-playlist-form textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 16px;
            outline: none;
        }

        .create-playlist-form input[type="text"]:focus,
        .create-playlist-form textarea:focus {
            border-color: #a855f7;
        }

        .create-playlist-form textarea { resize: vertical; min-height: 60px; }

        .create-playlist-visibility {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .create-playlist-visibility label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .create-playlist-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .create-playlist-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-cancel:hover { background: rgba(255, 255, 255, 0.12); }

        .btn-create {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: #fff;
        }

        .btn-create:hover { opacity: 0.9; }
        .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Toast */
        .eq-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 10001;
            animation: toastFade 2s ease forwards;
        }

        @keyframes toastFade {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="library-header">
            <h1 class="library-title">Library</h1>
        </div>

        <div class="library-tabs" id="library-tabs">
            <button class="library-tab active" data-tab="my">My Playlists</button>
            <button class="library-tab" data-tab="following">Following</button>
        </div>

        <div class="library-toolbar" id="library-toolbar">
            <button class="library-create-btn" id="library-create-btn">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
                New Playlist
            </button>
        </div>

        <div id="library-content">
            <div class="library-loading">Loading playlists...</div>
        </div>

        <!-- Create playlist modal -->
        <div class="create-playlist-modal" id="create-modal">
            <div class="create-playlist-form">
                <h2>New Playlist</h2>
                <label for="create-title">Title</label>
                <input type="text" id="create-title" placeholder="My Playlist" maxlength="100" autofocus>
                <label for="create-desc">Description (optional)</label>
                <textarea id="create-desc" placeholder="Add a description..." maxlength="500"></textarea>
                <label>Visibility</label>
                <div class="create-playlist-visibility">
                    <label><input type="radio" name="create-visibility" value="public" checked> Public</label>
                    <label><input type="radio" name="create-visibility" value="private"> Private</label>
                </div>
                <div class="create-playlist-actions">
                    <button class="btn-cancel" id="create-cancel">Cancel</button>
                    <button class="btn-create" id="create-submit">Create</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
