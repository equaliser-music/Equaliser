<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            margin-left: 240px;
            max-width: 800px;
            padding-bottom: 60px;
        }

        /* Banner */
        .profile-banner {
            height: 200px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(255, 0, 110, 0.2), rgba(59, 130, 246, 0.2));
            position: relative;
            overflow: hidden;
        }

        .profile-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Profile Header */
        .profile-header {
            padding: 0 32px;
            position: relative;
        }

        .profile-avatar-wrapper {
            margin-top: -48px;
            margin-bottom: 16px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: 4px solid #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .edit-profile-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #ffffff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .edit-profile-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* Profile Info */
        .profile-info {
            padding: 0 32px;
        }

        .profile-display-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-identifiers {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .profile-npub {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: color 0.2s;
        }

        .profile-npub:hover {
            color: #a855f7;
        }

        .profile-nip05 {
            font-size: 13px;
            color: #a855f7;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .profile-nip05 svg {
            width: 14px;
            height: 14px;
        }

        .profile-lud16 {
            font-size: 13px;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .profile-lud16 svg {
            width: 14px;
            height: 14px;
        }

        .profile-bio {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        /* Stats */
        .profile-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 28px;
        }

        .profile-stat {
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .profile-stat:hover {
            opacity: 0.8;
        }

        .profile-stat-value {
            font-weight: 700;
            font-size: 16px;
            margin-right: 4px;
        }

        .profile-stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Tabs */
        .profile-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0 32px;
            margin-bottom: 24px;
        }

        .profile-tab {
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .profile-tab:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .profile-tab.active {
            color: #ffffff;
            border-bottom-color: #a855f7;
        }

        /* Activity Feed */
        .profile-feed {
            padding: 0 32px;
        }

        .empty-feed {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-feed svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-feed p {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-feed .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Loading State */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .loading-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 64px;
            }

            .profile-banner {
                height: 140px;
            }

            .profile-avatar {
                width: 72px;
                height: 72px;
                font-size: 24px;
                margin-top: -36px;
            }

            .profile-header,
            .profile-info,
            .profile-tabs,
            .profile-feed {
                padding-left: 20px;
                padding-right: 20px;
            }

            .profile-display-name {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <!-- Loading state -->
            <div id="loading-state" class="loading-state">
                <div class="loading-spinner"></div>
            </div>

            <!-- Profile content (hidden until loaded) -->
            <div id="profile-content" style="display: none;">
                <div class="profile-banner" id="profile-banner"></div>

                <div class="profile-header">
                    <div class="profile-avatar-wrapper">
                        <div class="profile-avatar" id="profile-avatar">
                            <svg width="40" height="40" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <a href="/settings.html" class="edit-profile-btn" id="edit-btn" style="display: none;">
                            Edit Profile
                        </a>
                    </div>
                </div>

                <div class="profile-info">
                    <div class="profile-display-name" id="profile-name">Unknown</div>
                    <div class="profile-identifiers">
                        <span class="profile-npub" id="profile-npub" title="Click to copy" onclick="copyNpub()"></span>
                        <span class="profile-nip05" id="profile-nip05" style="display: none;">
                            <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                            <span id="nip05-text"></span>
                        </span>
                        <span class="profile-lud16" id="profile-lud16" style="display: none;">
                            <svg fill="currentColor" viewBox="0 0 20 20"><path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"/></svg>
                            <span id="lud16-text"></span>
                        </span>
                    </div>
                    <div class="profile-bio" id="profile-bio"></div>
                    <div class="profile-stats">
                        <div class="profile-stat">
                            <span class="profile-stat-value" id="following-count">0</span>
                            <span class="profile-stat-label">Following</span>
                        </div>
                        <div class="profile-stat">
                            <span class="profile-stat-value" id="followers-count">0</span>
                            <span class="profile-stat-label">Followers</span>
                        </div>
                    </div>
                </div>

                <div class="profile-tabs">
                    <div class="profile-tab active">Posts</div>
                    <div class="profile-tab">Likes</div>
                </div>

                <div class="profile-feed" id="profile-feed">
                    <div class="empty-feed">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
                        </svg>
                        <p>No posts yet</p>
                        <p class="sub">Activity will appear here as you interact with the community</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/nostr-tools@2.1.4/lib/nostr.bundle.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/sidebar.js"></script>

    <script>
        // Config
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const relayUrl = `${wsProtocol}//${window.location.host}/relay`;

        // State
        let profilePubkey = null;
        let isOwnProfile = false;
        let fullNpub = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            SessionManager.init();
            ClientSidebar.init();

            // Determine which profile to show
            const urlParams = new URLSearchParams(window.location.search);
            const npubParam = urlParams.get('npub');

            if (npubParam) {
                // Viewing someone else's (or own) profile via npub
                try {
                    const decoded = NostrTools.nip19.decode(npubParam);
                    if (decoded.type !== 'npub') throw new Error('Invalid npub');
                    profilePubkey = decoded.data;
                    fullNpub = npubParam;
                } catch (e) {
                    console.error('Invalid npub:', e);
                    document.getElementById('loading-state').innerHTML = '<p style="color: rgba(255,255,255,0.5);">Invalid profile link</p>';
                    return;
                }

                // Check if this is the logged-in user's own profile
                const session = SessionManager.getSession();
                if (session && session.publicKey === profilePubkey) {
                    isOwnProfile = true;
                }
            } else if (SessionManager.hasSession()) {
                // No npub param + logged in = own profile
                const session = SessionManager.getSession();
                profilePubkey = session.publicKey;
                fullNpub = session.npub;
                isOwnProfile = true;
            } else {
                // Not logged in, no npub = redirect to login
                window.location.href = '/login.html?return=' + encodeURIComponent(window.location.href);
                return;
            }

            // Show edit button for own profile
            if (isOwnProfile) {
                document.getElementById('edit-btn').style.display = '';
            }

            // Set npub display
            document.getElementById('profile-npub').textContent =
                fullNpub.substring(0, 16) + '...' + fullNpub.substring(fullNpub.length - 8);

            // Fetch profile data
            await loadProfile();
            await loadFollowCounts();

            // Show content
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('profile-content').style.display = '';
        });

        // Fetch Kind 0 profile
        async function loadProfile() {
            return new Promise((resolve) => {
                const ws = new WebSocket(relayUrl);
                const subId = 'profile-' + Math.random().toString(36).substring(7);

                const timeout = setTimeout(() => {
                    try { ws.close(); } catch(e) {}
                    resolve();
                }, 8000);

                ws.onopen = () => {
                    ws.send(JSON.stringify(['REQ', subId, {
                        kinds: [0],
                        authors: [profilePubkey],
                        limit: 1
                    }]));
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg[0] === 'EVENT' && msg[1] === subId && msg[2]) {
                            const profile = JSON.parse(msg[2].content);
                            renderProfile(profile);
                        }
                        if (msg[0] === 'EOSE') {
                            clearTimeout(timeout);
                            ws.close();
                            resolve();
                        }
                    } catch (e) {}
                };

                ws.onerror = () => {
                    clearTimeout(timeout);
                    resolve();
                };
            });
        }

        function renderProfile(profile) {
            // Name
            const name = profile.display_name || profile.name || 'Unknown';
            document.getElementById('profile-name').textContent = name;
            document.title = `${name} - Equaliser`;

            // Avatar
            const avatarEl = document.getElementById('profile-avatar');
            if (profile.picture) {
                avatarEl.innerHTML = `<img src="${profile.picture}" alt="${name}" onerror="this.style.display='none'">`;
            } else {
                const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
                avatarEl.textContent = initials;
            }

            // Banner
            if (profile.banner) {
                document.getElementById('profile-banner').innerHTML =
                    `<img src="${profile.banner}" alt="Banner" onerror="this.style.display='none'">`;
            }

            // Bio
            if (profile.about) {
                document.getElementById('profile-bio').textContent = profile.about;
            }

            // NIP-05
            if (profile.nip05) {
                document.getElementById('profile-nip05').style.display = '';
                document.getElementById('nip05-text').textContent = profile.nip05;
            }

            // Lightning
            if (profile.lud16) {
                document.getElementById('profile-lud16').style.display = '';
                document.getElementById('lud16-text').textContent = profile.lud16;
            }
        }

        // Fetch follow counts from Kind 3
        async function loadFollowCounts() {
            return new Promise((resolve) => {
                const ws = new WebSocket(relayUrl);
                const subId = 'follows-' + Math.random().toString(36).substring(7);

                const timeout = setTimeout(() => {
                    try { ws.close(); } catch(e) {}
                    resolve();
                }, 8000);

                ws.onopen = () => {
                    // Fetch this user's contact list (who they follow)
                    ws.send(JSON.stringify(['REQ', subId, {
                        kinds: [3],
                        authors: [profilePubkey],
                        limit: 1
                    }]));
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg[0] === 'EVENT' && msg[1] === subId && msg[2]) {
                            const followingCount = msg[2].tags.filter(t => t[0] === 'p').length;
                            document.getElementById('following-count').textContent = followingCount;
                        }
                        if (msg[0] === 'EOSE') {
                            clearTimeout(timeout);
                            ws.close();
                            resolve();
                        }
                    } catch (e) {}
                };

                ws.onerror = () => {
                    clearTimeout(timeout);
                    resolve();
                };
            });
        }

        // Copy npub
        async function copyNpub() {
            if (!fullNpub) return;
            try {
                await navigator.clipboard.writeText(fullNpub);
                const el = document.getElementById('profile-npub');
                const original = el.textContent;
                el.textContent = 'Copied!';
                el.style.color = '#22c55e';
                setTimeout(() => {
                    el.textContent = original;
                    el.style.color = '';
                }, 1500);
            } catch (e) {}
        }
    </script>
</body>
</html>
