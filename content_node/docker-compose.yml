services:
  # IPFS daemon for decentralised content storage
  ipfs:
    image: ipfs/kubo:latest
    container_name: equaliser-ipfs
    ports:
      - "4001:4001"   # P2P swarm (libp2p)
      - "127.0.0.1:5001:5001"   # API (localhost only — orchestrator uses Docker network)
    volumes:
      - ipfs-data:/data/ipfs
      - ./ipfs/configure-gateway.sh:/configure-gateway.sh:ro
    # Configure gateway after IPFS initializes, then start daemon
    # This ensures /ipfs/CID URLs work through our nginx proxy (no subdomain redirects)
    entrypoint: ["/bin/sh", "-c", "ipfs init --profile=server 2>/dev/null || true && /configure-gateway.sh && ipfs daemon --migrate=true"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ipfs dag stat /ipfs/QmUNLLsPACCz1vLxQVkXqqLX5R1X345qqfHbsf67hvA3Nn || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx web server - serves static files and routes requests
  web:
    image: nginx:alpine
    container_name: equaliser-web
    ports:
      - "80:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client:/usr/share/nginx/html/client:ro
      - ./orchestrator:/usr/share/nginx/html/admin:ro
    depends_on:
      - equaliser-relay
      - ipfs
      - orchestrator
      - blossom
    restart: unless-stopped

  # PostgreSQL database - owned exclusively by Equaliser Relay
  postgres:
    image: postgres:15-alpine
    container_name: equaliser-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-equaliser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-equaliser}
      - POSTGRES_DB=${POSTGRES_DB:-equaliser}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equaliser"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Equaliser Relay - NOSTR relay with PostgreSQL storage and full tag indexing
  equaliser-relay:
    build: ./equaliser-relay
    container_name: equaliser-relay
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-equaliser}:${POSTGRES_PASSWORD:-equaliser}@postgres:5432/${POSTGRES_DB:-equaliser}
      - WS_PORT=8080
      - RELAY_NAME=Equaliser Content Node Relay
      - RELAY_DESCRIPTION=A NOSTR relay for the Equaliser music platform content node
      - REST_API_PORT=8008
      - EVENT_POLICY=equaliser_only
      - PEER_RELAYS=               # comma-separated Equaliser node URLs (#app filter)
      - STANDARD_RELAYS=${STANDARD_RELAYS:-}    # comma-separated standard NOSTR relays (pubkey filter)
      - SYNC_INTERVAL=60                # seconds between periodic full syncs (low for testing)
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Blossom binary storage - hash-addressed HTTP file server
  blossom:
    image: ghcr.io/hzrd149/blossom-server:master
    container_name: equaliser-blossom
    volumes:
      - blossom-data:/app/data
      - ./config/blossom/config.yml:/app/config.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Standard NOSTR relay (nostr-rs-relay) - open relay for user data caching
  # The Equaliser Relay syncer connects to this as a STANDARD_RELAY to pull
  # Kind 0/1/3/5 events for registered users from the wider NOSTR network.
  nostr-rs-relay:
    image: scsibug/nostr-rs-relay:latest
    container_name: equaliser-nostr-rs-relay
    ports:
      - "127.0.0.1:7700:8080"
    volumes:
      - nostr-rs-data:/usr/src/app/db
      - ./config/nostr-rs-relay/config.toml:/usr/src/app/config.toml:ro
    restart: unless-stopped

  # Orchestrator API - handles track uploads, encoding, and NOSTR publishing
  orchestrator:
    build: ./orchestrator/api
    container_name: equaliser-orchestrator
    environment:
      - IPFS_API_URL=http://ipfs:5001
      - NOSTR_RELAY_URL=ws://equaliser-relay:8080
      - RELAY_API_URL=http://equaliser-relay:8008
      - BLOSSOM_URL=http://blossom:3000
      - PUBLIC_BASE_URL=
      - STANDARD_RELAYS=${STANDARD_RELAYS:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      - DATABASE_PATH=/data/drafts.db
    volumes:
      - orchestrator-uploads:/tmp/equaliser/uploads
      - drafts-data:/data
      - blossom-data:/blossom-data:rw
    depends_on:
      - ipfs
      - equaliser-relay
      - blossom
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
    driver: local
  ipfs-data:
    driver: local
  orchestrator-uploads:
    driver: local
  drafts-data:
    driver: local
  blossom-data:
    driver: local
  nostr-rs-data:
    driver: local
