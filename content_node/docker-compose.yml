services:
  # Nginx web server - serves static files and routes requests
  web:
    image: nginx:alpine
    container_name: equaliser-web
    ports:
      - "80:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client:/usr/share/nginx/html/client:ro
      - ./orchestrator:/usr/share/nginx/html/admin:ro
    depends_on:
      - nostr-relay
    restart: unless-stopped

  # NOSTR relay
  nostr-relay:
    image: scsibug/nostr-rs-relay:latest
    container_name: equaliser-nostr-relay
    volumes:
      - nostr-data:/usr/src/app/db
      - ./nostr-relay/config.toml:/usr/src/app/config.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  nostr-data:
    driver: local
