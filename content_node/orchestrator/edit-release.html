<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - Edit Release</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--eq-font-body);
            background: var(--eq-bg-app);
            color: var(--eq-text-1);
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
        }

        .main-content {
            flex: 1;
            margin-left: 240px;
            padding: 32px;
            padding-bottom: 100px;
            max-width: 1000px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: var(--eq-border);
            border-radius: var(--eq-radius-lg);
            background: var(--eq-surface-2);
            color: var(--eq-text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--eq-dur-quick);
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--eq-accent-soft-20);
            border-color: var(--eq-accent-soft-hover);
            color: var(--eq-text-1);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
        }

        .page-description {
            color: var(--eq-text-3);
            font-size: 14px;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: var(--eq-btn-border);
            border-radius: var(--eq-radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--eq-dur-quick);
            text-decoration: none;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--eq-grad-accent);
            color: var(--eq-text-1);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--eq-shadow-glow);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--eq-border-10);
            color: var(--eq-text-1);
        }

        .btn-secondary:hover {
            background: var(--eq-border-15);
        }

        .btn-release {
            background: var(--eq-grad-release);
            color: var(--eq-text-1);
        }

        .btn-release:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--eq-shadow-glow-release);
        }

        .btn-danger {
            background: var(--eq-grad-danger);
            color: var(--eq-text-1);
        }

        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--eq-shadow-danger);
        }

        .draft-banner {
            background: var(--eq-amber-soft-10);
            border: 1px solid var(--eq-amber-soft-30);
            border-radius: var(--eq-radius-xl);
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .draft-banner svg {
            width: 24px;
            height: 24px;
            color: var(--eq-amber-400);
            flex-shrink: 0;
        }

        .draft-banner-text {
            flex: 1;
        }

        .draft-banner-title {
            font-weight: 600;
            color: var(--eq-amber-400);
            margin-bottom: 4px;
        }

        .draft-banner-description {
            font-size: 13px;
            color: var(--eq-text-2-dim);
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        /* Sections */
        .edit-section {
            background: var(--eq-surface-1);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-2xl);
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            color: var(--eq-accent);
        }

        /* Form Elements */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-row-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--eq-text-2);
            margin-bottom: 8px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--eq-surface-2);
            border: var(--eq-border);
            border-radius: var(--eq-radius-lg);
            color: var(--eq-text-1);
            font-size: 14px;
            transition: all var(--eq-dur-quick);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--eq-accent);
            background: var(--eq-accent-soft-10);
        }

        .form-input::placeholder, .form-textarea::placeholder {
            color: var(--eq-text-faint);
        }

        .form-select option {
            background: var(--eq-surface-inverse);
            color: var(--eq-text-1);
        }

        /* Cover Art */
        .cover-section {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .cover-preview {
            width: 180px;
            height: 180px;
            border-radius: var(--eq-radius-xl);
            background: var(--eq-surface-2);
            border: 2px dashed var(--eq-border-10);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
            transition: all var(--eq-dur-quick);
        }

        .cover-preview:hover {
            border-color: var(--eq-accent-mid);
        }

        .cover-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-preview svg {
            width: 48px;
            height: 48px;
            color: var(--eq-text-faint);
        }

        .cover-info {
            flex: 1;
        }

        .cover-info h4 {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .cover-info p {
            font-size: 12px;
            color: var(--eq-text-3);
            margin-bottom: 12px;
        }

        /* Tracklist Editor */
        .tracklist-header {
            display: flex;
            padding: 12px 16px;
            background: var(--eq-surface-0);
            border-radius: var(--eq-radius-top-md);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--eq-text-4);
            border: var(--eq-divider);
            border-bottom: none;
        }

        .tracklist-header .col-move { width: 60px; }
        .tracklist-header .col-num { width: 40px; text-align: center; }
        .tracklist-header .col-title { flex: 1; }
        .tracklist-header .col-duration { width: 70px; text-align: right; }
        .tracklist-header .col-price { width: 120px; }
        .tracklist-header .col-actions { width: 50px; }

        .tracklist-editor {
            background: var(--eq-scrim-20);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-bottom-md);
            min-height: 100px;
            max-height: 500px;
            overflow-y: auto;
        }

        .tracklist-row {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: var(--eq-divider);
            transition: background var(--eq-dur-quick);
        }

        .tracklist-row:last-child {
            border-bottom: none;
        }

        .tracklist-row:hover {
            background: var(--eq-surface-1);
        }

        .col-move {
            width: 60px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .move-btn {
            background: none;
            border: var(--eq-border);
            border-radius: var(--eq-radius-xs);
            color: var(--eq-text-3);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--eq-dur-fast);
        }

        .move-btn:hover {
            color: var(--eq-accent);
            border-color: var(--eq-accent-tint-40);
            background: var(--eq-accent-tint-10);
        }

        .move-btn:disabled {
            opacity: 0.2;
            cursor: default;
            pointer-events: none;
        }

        .move-btn svg {
            width: 14px;
            height: 14px;
        }

        .tracklist-row.active-track {
            background: var(--eq-accent-tint-08);
            border-left: 3px solid var(--eq-accent);
            padding-left: 13px;
        }

        .tracklist-row.active-track .col-num {
            color: var(--eq-accent);
            font-weight: 600;
        }

        .col-num {
            width: 40px;
            font-size: 14px;
            color: var(--eq-text-4);
            text-align: center;
        }

        .col-title {
            flex: 1;
            min-width: 0;
            padding-right: 16px;
        }

        .track-title-input {
            background: var(--eq-surface-2);
            border: var(--eq-border);
            border-radius: var(--eq-radius-sm);
            padding: 8px 12px;
            color: var(--eq-text-1);
            font-size: 14px;
            width: 100%;
        }

        .track-title-input:focus {
            outline: none;
            border-color: var(--eq-accent);
        }

        .col-duration {
            width: 70px;
            font-size: 13px;
            color: var(--eq-text-3);
            text-align: right;
            padding-right: 16px;
        }

        .col-price {
            width: 120px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .price-input {
            background: var(--eq-surface-2);
            border: var(--eq-border);
            border-radius: var(--eq-radius-sm);
            padding: 8px 10px;
            color: var(--eq-text-1);
            font-size: 13px;
            width: 70px;
            text-align: right;
        }

        .price-input:focus {
            outline: none;
            border-color: var(--eq-accent);
        }

        .price-label {
            font-size: 12px;
            color: var(--eq-text-4);
        }

        .col-actions {
            width: 50px;
            display: flex;
            justify-content: center;
        }

        .remove-btn {
            width: 32px;
            height: 32px;
            border: var(--eq-btn-border);
            border-radius: var(--eq-radius-sm);
            background: transparent;
            color: var(--eq-text-faint);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--eq-dur-quick);
        }

        .remove-btn:hover {
            background: var(--eq-danger-soft-20);
            color: var(--eq-danger);
        }

        .remove-btn svg {
            width: 16px;
            height: 16px;
        }

        .tracklist-empty {
            padding: 48px;
            text-align: center;
            color: var(--eq-text-4);
            font-size: 14px;
        }

        .add-track-btn {
            flex: 1;
            padding: 14px;
            margin-top: 0;
            background: var(--eq-surface-1);
            border: 1px dashed var(--eq-border-15);
            border-radius: var(--eq-radius-md);
            color: var(--eq-text-3);
            font-size: 14px;
            cursor: pointer;
            transition: all var(--eq-dur-quick);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-track-btn:hover {
            background: var(--eq-accent-soft-10);
            border-color: var(--eq-accent-soft-hover);
            color: var(--eq-accent);
        }

        .add-track-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Add Track Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--eq-scrim-strong);
            backdrop-filter: var(--eq-blur-4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--eq-surface-modal);
            border: var(--eq-border);
            border-radius: var(--eq-radius-2xl);
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--eq-text-3);
            cursor: pointer;
            padding: 4px;
        }

        .modal-close:hover {
            color: var(--eq-text-1);
        }

        .modal-description {
            color: var(--eq-text-3);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .add-track-list {
            max-height: 300px;
            overflow-y: auto;
            background: var(--eq-scrim-20);
            border: var(--eq-border);
            border-radius: var(--eq-radius-lg);
            margin-bottom: 16px;
        }

        .add-track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: var(--eq-divider);
            cursor: pointer;
            transition: background var(--eq-dur-quick);
        }

        .add-track-item:last-child {
            border-bottom: none;
        }

        .add-track-item:hover {
            background: var(--eq-accent-soft-10);
        }

        .add-track-item.selected {
            background: var(--eq-accent-soft-20);
        }

        .add-track-info {
            flex: 1;
            min-width: 0;
        }

        .add-track-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .add-track-meta {
            font-size: 12px;
            color: var(--eq-text-4);
        }

        .add-track-check {
            width: 20px;
            height: 20px;
            border: 2px solid var(--eq-border-20);
            border-radius: var(--eq-radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .add-track-item.selected .add-track-check {
            background: var(--eq-accent);
            border-color: var(--eq-accent);
        }

        .add-track-check svg {
            width: 12px;
            height: 12px;
            color: var(--eq-text-1);
            display: none;
        }

        .add-track-item.selected .add-track-check svg {
            display: block;
        }

        .no-tracks-available {
            padding: 32px;
            text-align: center;
            color: var(--eq-text-4);
            font-size: 13px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions .btn {
            flex: 1;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--eq-accent-soft-20);
            border-top-color: var(--eq-accent);
            border-radius: var(--eq-radius-round);
            animation: spin var(--eq-dur-spin-1s) linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--eq-panel-bg-95);
            border: var(--eq-border);
            border-radius: var(--eq-radius-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1100;
            transform: translateX(120%);
            transition: transform var(--eq-dur-med);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-color: var(--eq-success-soft-30);
        }

        .notification.error {
            border-color: var(--eq-danger-soft-30);
        }

        .notification-icon {
            width: 24px;
            height: 24px;
        }

        .notification.success .notification-icon {
            color: var(--eq-success-2);
        }

        .notification.error .notification-icon {
            color: var(--eq-danger);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 16px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions .btn {
                flex: 1;
            }

            .form-row-3 {
                grid-template-columns: 1fr;
            }

            .cover-section {
                flex-direction: column;
            }

            .cover-preview {
                width: 100%;
                max-width: 200px;
            }
        }

        /* === eq extracted inline styles (A18) === */
        .eq-error-icon {
            color: var(--eq-text-faint);
        }

        .eq-error-desc {
            color: var(--eq-text-3);
        }

        .eq-dup-track {
            background: var(--eq-border-10);
            border-radius: var(--eq-radius-2px);
        }

        .eq-dup-bar {
            background: var(--eq-grad-dup-progress);
            border-radius: var(--eq-radius-2px);
            transition: width var(--eq-dur-med) ease;
        }

        .eq-announce-cover-img {
            border-radius: var(--eq-radius-lg);
            border: var(--eq-border);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="header">
                <div class="header-left">
                    <a href="releases.html" class="back-btn" title="Back to Releases">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
                        </svg>
                    </a>
                    <div>
                        <h1 class="page-title">Edit Release</h1>
                        <p class="page-description" id="release-subtitle">Loading...</p>
                    </div>
                </div>
                <div class="header-actions" id="header-actions">
                    <a href="releases.html" class="btn btn-secondary">Cancel</a>
                    <button type="button" class="btn btn-primary" id="save-btn" onclick="saveRelease()">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                        </svg>
                        Save Changes
                    </button>
                </div>
            </div>

            <div id="content-area">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Loading release...</p>
                </div>
            </div>
        </div>

    <!-- Add Track Modal (inside .container so the SPA router extracts it) -->
    <div class="modal-overlay" id="add-track-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Add Tracks</h2>
                <button class="modal-close" onclick="closeAddTrackModal()">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
            <p class="modal-description">Select singles to add to this release. Each track is duplicated with independent storage.</p>
            <input type="text" class="form-input" id="add-track-search" placeholder="Search tracks..." style="margin-bottom: 12px;">
            <div class="add-track-list" id="add-track-list"></div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeAddTrackModal()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="confirmAddTracks()">Add Selected</button>
            </div>
        </div>
    </div>

    <!-- Release Announcement Modal -->
    <div class="modal-overlay" id="announce-modal">
        <div class="modal" style="max-width: 500px;">
            <div class="modal-header">
                <h2 class="modal-title">Announce Release</h2>
                <button class="modal-close" onclick="skipAnnouncement()">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
            <p class="modal-description">Share this release with your fans on the social feed.</p>
            <div id="announce-cover-preview" style="margin-bottom: 12px; text-align: center;"></div>
            <textarea class="form-input" id="announce-message" rows="3" maxlength="500" style="resize: vertical;"></textarea>
            <div class="modal-actions" style="margin-top: 16px;">
                <button type="button" class="btn btn-secondary" onclick="skipAnnouncement()">Skip</button>
                <button type="button" class="btn btn-primary" id="announce-btn" onclick="postAnnouncement()">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20" style="margin-right: 6px;">
