<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - IPFS Storage</title>
    <style>
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-tile {
            background: var(--eq-surface-1);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-xl);
            padding: 18px;
        }
        .stat-tile .stat-value { font-size: 22px; font-weight: 700; }
        .stat-tile .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--eq-text-3); margin-top: 4px; }
        .id-row {
            background: var(--eq-surface-0);
            padding: 14px 18px;
            border-radius: var(--eq-radius-lg);
            margin-bottom: 16px;
            font-family: var(--eq-font-mono-generic);
            font-size: 12px;
            color: var(--eq-text-2-dim);
            word-break: break-all;
        }
        .pin-cell { font-family: var(--eq-font-mono-generic); font-size: 12px; color: var(--eq-role-artist-text); }
        .section h2 { font-size: 18px; font-weight: 600; margin: 24px 0 12px; }
        /* === eq extracted inline styles (A13) === */
        .eq-strong-label { color: var(--eq-text-2); font-family: inherit; font-weight: 600; }
        .eq-muted-14 { color: var(--eq-text-4); font-size: 14px; font-weight: 400; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <div>
                    <h1 class="page-title">IPFS Storage</h1>
                    <p class="page-description">Local IPFS node storage and pin overview</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="loadStats()">Refresh</button>
                </div>
            </div>

            <div id="notice-area"></div>
            <div id="content"><div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div></div>
        </div>
    </div>

</body>
</html>
