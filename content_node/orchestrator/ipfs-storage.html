<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - IPFS Storage</title>
    <link rel="stylesheet" href="/common/css/admin-base.css?v=1">
    <style>
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-tile {
            background: var(--eq-surface-1);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-xl);
            padding: 18px;
        }
        .stat-tile .stat-value { font-size: 22px; font-weight: 700; }
        .stat-tile .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--eq-text-3); margin-top: 4px; }
        .id-row {
            background: var(--eq-surface-0);
            padding: 14px 18px;
            border-radius: var(--eq-radius-lg);
            margin-bottom: 16px;
            font-family: var(--eq-font-mono-generic);
            font-size: 12px;
            color: var(--eq-text-2-dim);
            word-break: break-all;
        }
        .pin-cell { font-family: var(--eq-font-mono-generic); font-size: 12px; color: var(--eq-role-artist-text); }
        .section h2 { font-size: 18px; font-weight: 600; margin: 24px 0 12px; }
        /* === eq extracted inline styles (A13) === */
        .eq-strong-label { color: var(--eq-text-2); font-family: inherit; font-weight: 600; }
        .eq-muted-14 { color: var(--eq-text-4); font-size: 14px; font-weight: 400; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <div>
                    <h1 class="page-title">IPFS Storage</h1>
                    <p class="page-description">Local IPFS node storage and pin overview</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="loadStats()">Refresh</button>
                </div>
            </div>

            <div id="notice-area"></div>
            <div id="content"><div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div></div>
        </div>
    </div>

    <script src="https://unpkg.com/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
    <script src="/common/js/session.js"></script>
    <script src="/common/js/admin-sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            SessionManager.init();
            if (!SessionManager.requireSession('ipfs-storage.html')) return;
            AdminSidebar.init();
            await SessionManager.fetchRole();
            if (SessionManager.getRole() !== 'operator') {
                showNotice('error', 'You need an operator role to view this page.');
                document.getElementById('content').innerHTML = '';
                return;
            }
            await loadStats();
        });

        async function loadStats() {
            const content = document.getElementById('content');
            content.innerHTML = '<div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div>';
            try {
                const resp = await SessionManager.authFetch('/api/operator/ipfs/stats');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                render(await resp.json());
            } catch (e) {
                content.innerHTML = '';
                showNotice('error', `Failed to load IPFS stats: ${e.message}`);
            }
        }

        function render(data) {
            const repo = data.repo || {};
            const tiles = [
                { label: 'Repo Size', value: humanBytes(repo.RepoSize) },
                { label: 'Storage Max', value: humanBytes(repo.StorageMax) },
                { label: 'Objects', value: repo.NumObjects ?? '—' },
                { label: 'Pinned (recursive)', value: data.pin_count ?? '—' },
                { label: 'Swarm Peers', value: data.swarm_peer_count ?? '—' },
            ];

            document.getElementById('content').innerHTML = `
                <div class="id-row" data-testid="ipfs-peer-id">
                    <strong class="eq-strong-label">Peer ID:</strong> ${escapeHtml(data.peer_id || '—')}
                    ${data.agent_version ? `<br><strong class="eq-strong-label">Agent:</strong> ${escapeHtml(data.agent_version)}` : ''}
                    <br><strong class="eq-strong-label">API URL:</strong> ${escapeHtml(data.api_url || '')}
                </div>

                <div class="stat-grid" data-testid="ipfs-stats">
                    ${tiles.map(t => `
                        <div class="stat-tile">
                            <div class="stat-value">${t.value}</div>
                            <div class="stat-label">${t.label}</div>
                        </div>
                    `).join('')}
                </div>

                <div class="section">
                    <h2>Recent Pinned CIDs <span class="eq-muted-14">(sample of ${(data.pins_sample || []).length})</span></h2>
                    ${(data.pins_sample || []).length === 0 ? `
                        <div class="empty-state"><h3>No pinned content</h3><p>Pinned CIDs will appear here once tracks are uploaded.</p></div>
                    ` : `
                        <table class="data-table">
                            <thead><tr><th>CID</th><th style="text-align:right">Actions</th></tr></thead>
                            <tbody>
                                ${(data.pins_sample || []).map(cid => `
                                    <tr>
                                        <td><span class="pin-cell">${escapeHtml(cid)}</span></td>
                                        <td><div class="row-actions">
                                            <a class="btn btn-small btn-secondary" target="_blank" rel="noopener" href="/ipfs/${encodeURIComponent(cid)}">View</a>
                                        </div></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `}
                </div>
            `;
        }

        function humanBytes(n) {
            if (typeof n !== 'number') return '—';
            const u = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0;
            while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
            return `${n.toFixed(i === 0 ? 0 : 2)} ${u[i]}`;
        }
        function showNotice(type, msg) {
            const area = document.getElementById('notice-area');
            area.innerHTML = `<div class="notice notice-${type}">${escapeHtml(msg)}</div>`;
            if (type !== 'error') setTimeout(() => { area.innerHTML = ''; }, 4000);
        }
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }
    </script>
</body>
</html>
