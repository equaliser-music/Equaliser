<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - Sync Manager</title>
    <style>
        .section { margin-bottom: 32px; }
        .section h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
        .relay-list-simple {
            background: var(--eq-surface-0);
            border-radius: var(--eq-radius-lg);
            padding: 12px;
        }
        .relay-list-simple .relay-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--eq-radius-sm);
        }
        .relay-list-simple .relay-row + .relay-row { border-top: 1px solid var(--eq-surface-0-hover); }
        .relay-url-mono { font-family: var(--eq-font-mono-generic); font-size: 13px; }
        .badge-connected { background: var(--eq-emerald-20); color: var(--eq-role-operator-text); }
        .badge-disconnected { background: var(--eq-border-10); color: var(--eq-text-2-dim); }
        .badge-error { background: var(--eq-danger-soft-15); color: var(--eq-danger-light); }
        /* === eq extracted inline styles (A13) === */
        .eq-muted-14 { color: var(--eq-text-4); font-size: 14px; font-weight: 400; }
        .eq-error-help { color: var(--eq-danger-light); cursor: help; }
        .eq-dim-13 { color: var(--eq-text-3); font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <div>
                    <h1 class="page-title">Sync Manager</h1>
                    <p class="page-description">Peer relay connections and standard NOSTR relay configuration</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="loadSync()">Refresh</button>
                </div>
            </div>

            <div id="notice-area"></div>
            <div id="content"><div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div></div>
        </div>
    </div>

</body>
</html>
