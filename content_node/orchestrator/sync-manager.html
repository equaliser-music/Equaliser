<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - Sync Manager</title>
    <link rel="stylesheet" href="css/admin-base.css">
    <style>
        .section { margin-bottom: 32px; }
        .section h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
        .relay-list-simple {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 12px;
        }
        .relay-list-simple .relay-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 6px;
        }
        .relay-list-simple .relay-row + .relay-row { border-top: 1px solid rgba(255, 255, 255, 0.04); }
        .relay-url-mono { font-family: monospace; font-size: 13px; }
        .badge-connected { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .badge-disconnected { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.6); }
        .badge-error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <div>
                    <h1 class="page-title">Sync Manager</h1>
                    <p class="page-description">Peer relay connections and standard NOSTR relay configuration</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="loadSync()">Refresh</button>
                </div>
            </div>

            <div id="notice-area"></div>
            <div id="content"><div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div></div>
        </div>
    </div>

    <script src="https://unpkg.com/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
    <script src="/common/js/session.js"></script>
    <script src="/common/js/admin-sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            SessionManager.init();
            if (!SessionManager.requireSession('sync-manager.html')) return;
            AdminSidebar.init();
            await SessionManager.fetchRole();
            if (SessionManager.getRole() !== 'operator') {
                showNotice('error', 'You need an operator role to view this page.');
                document.getElementById('content').innerHTML = '';
                return;
            }
            await loadSync();
        });

        async function loadSync() {
            const content = document.getElementById('content');
            content.innerHTML = '<div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div>';
            try {
                const resp = await SessionManager.authFetch('/api/operator/sync/peers');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                render(await resp.json());
            } catch (e) {
                content.innerHTML = '';
                showNotice('error', `Failed to load sync state: ${e.message}`);
            }
        }

        function render(data) {
            const peers = data.peer_relays || [];
            const std = data.standard_relays || [];
            const localUrl = data.local_relay_url || '';

            document.getElementById('content').innerHTML = `
                <div class="section">
                    <h2>Equaliser Peer Relays <span style="color:rgba(255,255,255,0.4); font-size:14px; font-weight:400">(${peers.length})</span></h2>
                    <p class="page-description" style="margin-bottom:12px">Other Equaliser content nodes this relay syncs music metadata with. Configure via <code>PEER_RELAYS</code> env var.</p>
                    ${peers.length === 0 ? `
                        <div class="empty-state"><h3>No peer relays configured</h3><p>This node operates standalone. To peer with other Equaliser nodes, set the <code>PEER_RELAYS</code> environment variable.</p></div>
                    ` : `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>URL</th>
                                    <th>Status</th>
                                    <th>Events</th>
                                    <th>Errors</th>
                                    <th>Last Connected</th>
                                    <th>Last Event</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${peers.map(p => renderPeerRow(p)).join('')}
                            </tbody>
                        </table>
                    `}
                </div>

                <div class="section">
                    <h2>Standard NOSTR Relays <span style="color:rgba(255,255,255,0.4); font-size:14px; font-weight:400">(${std.length})</span></h2>
                    <p class="page-description" style="margin-bottom:12px">Open NOSTR relays the syncer pulls user-cache data from (Kind 0/1/3/5/6/7 for registered listeners). Configure via <code>STANDARD_RELAYS</code> env var.</p>
                    ${std.length === 0 ? `
                        <div class="empty-state"><h3>No standard relays configured</h3><p>Set <code>STANDARD_RELAYS</code> to enable user-cache backfill from the wider NOSTR network.</p></div>
                    ` : `
                        <div class="relay-list-simple">
                            ${std.map(url => `
                                <div class="relay-row">
                                    <span class="relay-url-mono">${escapeHtml(url)}</span>
                                    <span class="badge badge-active">configured</span>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>

                <div class="section">
                    <h2>Local Relay</h2>
                    <div class="relay-list-simple">
                        <div class="relay-row">
                            <span class="relay-url-mono">${escapeHtml(localUrl)}</span>
                            <span class="badge badge-active">in-process</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPeerRow(p) {
            const lastConn = p.last_connected_at ? new Date(p.last_connected_at).toLocaleString() : '—';
            const lastEvt = p.last_event_at ? new Date(p.last_event_at * 1000).toLocaleString() : '—';
            return `
                <tr>
                    <td><span class="relay-url-mono">${escapeHtml(p.url)}</span></td>
                    <td><span class="badge badge-${p.status}">${p.status}</span></td>
                    <td>${p.event_count ?? 0}</td>
                    <td>${p.error_count ?? 0}${p.last_error ? ` <span title="${escapeHtml(p.last_error)}" style="color:#fca5a5; cursor:help">(?)</span>` : ''}</td>
                    <td style="color:rgba(255,255,255,0.5); font-size:13px">${lastConn}</td>
                    <td style="color:rgba(255,255,255,0.5); font-size:13px">${lastEvt}</td>
                </tr>
            `;
        }

        function showNotice(type, msg) {
            const area = document.getElementById('notice-area');
            area.innerHTML = `<div class="notice notice-${type}">${escapeHtml(msg)}</div>`;
            if (type !== 'error') setTimeout(() => { area.innerHTML = ''; }, 4000);
        }
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }
    </script>
</body>
</html>
