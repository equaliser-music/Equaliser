<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - Node Settings</title>
    <style>
        .settings-section {
            background: var(--eq-surface-1);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-xl);
            padding: 20px 24px;
            margin-bottom: 16px;
        }
        .settings-section h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--eq-text-90);
        }
        .setting-row {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 16px;
            padding: 10px 0;
            border-bottom: 1px solid var(--eq-surface-0-hover);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-key { color: var(--eq-text-2-dim); font-size: 13px; font-weight: 500; }
        .setting-value { font-family: var(--eq-font-mono-generic); font-size: 13px; word-break: break-all; }
        .setting-value.empty { color: var(--eq-text-faint); font-style: italic; font-family: inherit; }
        .setting-list { display: flex; flex-direction: column; gap: 4px; }
        .read-only-banner {
            background: var(--eq-blue-soft-10);
            border: 1px solid var(--eq-blue-soft-20);
            color: var(--eq-role-label-text);
            padding: 12px 16px;
            border-radius: var(--eq-radius-lg);
            margin-bottom: 24px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <div>
                    <h1 class="page-title">Node Settings</h1>
                    <p class="page-description">Read-only view of this node's configuration</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="loadSettings()">Refresh</button>
                </div>
            </div>

            <div id="notice-area"></div>
            <div id="content"><div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div></div>
        </div>
    </div>

</body>
</html>
