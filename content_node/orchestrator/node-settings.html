<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equaliser - Node Settings</title>
    <link rel="stylesheet" href="/common/css/admin-base.css?v=1">
    <style>
        .settings-section {
            background: var(--eq-surface-1);
            border: var(--eq-divider);
            border-radius: var(--eq-radius-xl);
            padding: 20px 24px;
            margin-bottom: 16px;
        }
        .settings-section h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--eq-text-90);
        }
        .setting-row {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 16px;
            padding: 10px 0;
            border-bottom: 1px solid var(--eq-surface-0-hover);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-key { color: var(--eq-text-2-dim); font-size: 13px; font-weight: 500; }
        .setting-value { font-family: var(--eq-font-mono-generic); font-size: 13px; word-break: break-all; }
        .setting-value.empty { color: var(--eq-text-faint); font-style: italic; font-family: inherit; }
        .setting-list { display: flex; flex-direction: column; gap: 4px; }
        .read-only-banner {
            background: var(--eq-blue-soft-10);
            border: 1px solid var(--eq-blue-soft-20);
            color: var(--eq-role-label-text);
            padding: 12px 16px;
            border-radius: var(--eq-radius-lg);
            margin-bottom: 24px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <div>
                    <h1 class="page-title">Node Settings</h1>
                    <p class="page-description">Read-only view of this node's configuration</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="loadSettings()">Refresh</button>
                </div>
            </div>

            <div id="notice-area"></div>
            <div id="content"><div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div></div>
        </div>
    </div>

    <script src="https://unpkg.com/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
    <script src="/common/js/session.js"></script>
    <script src="/common/js/admin-sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            SessionManager.init();
            if (!SessionManager.requireSession('node-settings.html')) return;
            AdminSidebar.init();
            await SessionManager.fetchRole();
            if (SessionManager.getRole() !== 'operator') {
                showNotice('error', 'You need an operator role to view this page.');
                document.getElementById('content').innerHTML = '';
                return;
            }
            await loadSettings();
        });

        async function loadSettings() {
            const content = document.getElementById('content');
            content.innerHTML = '<div style="text-align:center; padding:40px"><span class="loading-spinner"></span></div>';
            try {
                const resp = await SessionManager.authFetch('/api/operator/settings');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                render(await resp.json());
            } catch (e) {
                content.innerHTML = '';
                showNotice('error', `Failed to load settings: ${e.message}`);
            }
        }

        function render(data) {
            document.getElementById('content').innerHTML = `
                <div class="read-only-banner">
                    Settings are sourced from environment variables on the orchestrator. Edit your <code>docker-compose.yml</code> or <code>.env</code> file and restart containers to change these.
                </div>

                ${section('Node', data.node, {
                    name: 'RELAY_NAME',
                    public_base_url: 'PUBLIC_BASE_URL',
                })}

                ${section('Service URLs', data.services, {
                    ipfs_api_url: 'IPFS_API_URL',
                    blossom_url: 'BLOSSOM_URL',
                    relay_rest_url: 'RELAY_API_URL',
                    relay_ws_url: 'NOSTR_RELAY_URL',
                })}

                ${listSection('Standard NOSTR Relays', data.relays?.standard_relays, 'STANDARD_RELAYS')}
                ${listSection('Allowed CORS Origins', data.cors?.allowed_origins, 'ALLOWED_ORIGINS')}
            `;
        }

        function section(title, obj, envMap) {
            if (!obj) return '';
            const rows = Object.entries(envMap).map(([key, env]) => {
                const value = obj[key];
                return `
                    <div class="setting-row">
                        <div class="setting-key">${escapeHtml(env)}</div>
                        <div class="setting-value ${value ? '' : 'empty'}">${value ? escapeHtml(String(value)) : '(not set)'}</div>
                    </div>
                `;
            }).join('');
            return `<div class="settings-section"><h2>${escapeHtml(title)}</h2>${rows}</div>`;
        }

        function listSection(title, list, envName) {
            const items = (list || []);
            return `
                <div class="settings-section">
                    <h2>${escapeHtml(title)}</h2>
                    <div class="setting-row">
                        <div class="setting-key">${escapeHtml(envName)}</div>
                        <div class="setting-list">
                            ${items.length === 0
                                ? '<span class="setting-value empty">(none configured)</span>'
                                : items.map(v => `<span class="setting-value">${escapeHtml(v)}</span>`).join('')
                            }
                        </div>
                    </div>
                </div>
            `;
        }

        function showNotice(type, msg) {
            const area = document.getElementById('notice-area');
            area.innerHTML = `<div class="notice notice-${type}">${escapeHtml(msg)}</div>`;
            if (type !== 'error') setTimeout(() => { area.innerHTML = ''; }, 4000);
        }
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }
    </script>
</body>
</html>
