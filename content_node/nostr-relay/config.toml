# nostr-rs-relay configuration

[info]
name = "Equaliser Content Node Relay"
description = "A NOSTR relay for the Equaliser music platform content node"
pubkey = ""
contact = ""

[database]
data_directory = "/usr/src/app/db"

[network]
address = "0.0.0.0"
port = 8080

[limits]
max_event_bytes = 131072
max_conn = 4096

# Only accept event kinds that Equaliser uses.
# Prevents non-Equaliser clients from filling the relay with irrelevant events.
#   0     = Profile metadata
#   1     = Notes, posts, replies, playlist shares
#   3     = Contact list (follows)
#   4     = DMs (NIP-04)
#   5     = Deletion events
#   6     = Reposts
#   7     = Reactions
#   10002 = Relay list (NIP-65)
#   24242 = Blossom auth (BUD-03, ephemeral)
#   30001 = Playlists (NIP-51)
#   30050 = Tracks
#   30051 = Releases/albums
event_kind_allowlist = [0, 1, 3, 4, 5, 6, 7, 10002, 24242, 30001, 30050, 30051]
