server {
    listen 80;
    server_name localhost;

    # Client static files
    location / {
        root /usr/share/nginx/html/client;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin/orchestrator static files
    location /admin {
        alias /usr/share/nginx/html/admin;
        index index.html onboarding.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # API proxy to orchestrator (uncomment when orchestrator service is added)
    # location /api {
    #     proxy_pass http://orchestrator:8000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # WebSocket proxy to NOSTR relay
    # Note: trailing slash on proxy_pass strips the /relay prefix
    location /relay {
        proxy_pass http://nostr-relay:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
