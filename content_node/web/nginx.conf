# IPFS content cache - CID-addressed content is immutable, safe to cache forever
proxy_cache_path /var/cache/nginx/ipfs levels=1:2 keys_zone=ipfs_cache:10m max_size=2g inactive=30d;

server {
    listen 80;
    server_name localhost;

    # API proxy to orchestrator (must be before static files to take precedence)
    location /api {
        proxy_pass http://orchestrator:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (music files)
        client_max_body_size 500M;

        # Increase timeouts for encoding operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # SPA page routes - serve app shell for browser navigation
    # Direct URL access to page routes loads the app shell, which then fetches content
    location ~ ^/(home|social|profile|artist|user|thread|messages|settings|library|playlist)\.html$ {
        root /usr/share/nginx/html/client;
        try_files /app.html =404;
    }

    # Raw page templates for the SPA router to fetch HTML content
    location /raw/ {
        alias /usr/share/nginx/html/client/;
        add_header Cache-Control "no-cache";
    }

    # Client static files
    location / {
        root /usr/share/nginx/html/client;
        index app.html;
        try_files $uri $uri/ /app.html;
    }

    # Client JS files are mutable — always revalidate (304 is cheap)
    # HTML is already handled by SPA routes and /raw/ (which has no-cache)
    location ~* \.js$ {
        root /usr/share/nginx/html/client;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Admin/orchestrator static files (^~ gives priority over regex .js location)
    location ^~ /admin {
        alias /usr/share/nginx/html/admin;
        index dashboard.html;
        try_files $uri $uri/ /admin/dashboard.html;
    }

    # WebSocket proxy to Equaliser Relay
    # Note: trailing slash on proxy_pass strips the /relay prefix
    location /relay {
        proxy_pass http://equaliser-relay:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Blossom binary storage - serves files by SHA-256 hash
    location /blossom/ {
        proxy_pass http://blossom:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hash-addressed content is immutable - cache aggressively
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Allow large files (original audio uploads)
        client_max_body_size 500M;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # IPFS gateway proxy - serves content by CID
    # CID = content hash, so responses are immutable and safe to cache
    location /ipfs {
        proxy_pass http://ipfs:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Nginx proxy cache - serves cached content directly, bypassing IPFS gateway
        proxy_cache ipfs_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_key $uri;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Increase timeouts for large file transfers
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Allow large files (music/video content)
        client_max_body_size 500M;
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/vnd.apple.mpegurl;
    gzip_min_length 1000;
}
