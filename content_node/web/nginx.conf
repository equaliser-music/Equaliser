server {
    listen 80;
    server_name localhost;

    # API proxy to orchestrator (must be before static files to take precedence)
    location /api {
        proxy_pass http://orchestrator:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (music files)
        client_max_body_size 500M;

        # Increase timeouts for encoding operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Client static files
    location / {
        root /usr/share/nginx/html/client;
        index home.html index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin/orchestrator static files
    location /admin {
        alias /usr/share/nginx/html/admin;
        index dashboard.html;
        try_files $uri $uri/ /admin/dashboard.html;
    }

    # WebSocket proxy to NOSTR relay
    # Note: trailing slash on proxy_pass strips the /relay prefix
    location /relay {
        proxy_pass http://nostr-relay:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Blossom binary storage - serves files by SHA-256 hash
    location /blossom/ {
        proxy_pass http://blossom:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hash-addressed content is immutable - cache aggressively
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Allow large files (original audio uploads)
        client_max_body_size 500M;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # IPFS gateway proxy - serves content by CID
    location /ipfs {
        proxy_pass http://ipfs:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for large file transfers
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Allow large files (music/video content)
        client_max_body_size 500M;
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
